<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario - Tavernetta da Kevin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .calendar-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .calendar-title{
      margin:0;
      color:var(--brown);
      font-size:22px;
      text-transform:capitalize;
    }

    .calendar-nav{
      display:flex;
      gap:10px;
    }

    .calendar-nav button{
      border:0;
      background:var(--brown);
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      font-size:16px;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
    }

    .calendar-head{
      background:#fff7eb;
      border-radius:10px;
      padding:10px;
      text-align:center;
      font-weight:bold;
      color:var(--brown);
    }

    .calendar-day{
      background:#fff7eb;
      border-radius:10px;
      min-height:86px;
      padding:8px;
      border:1px solid rgba(107,62,38,.12);
      position:relative;
    }

    .calendar-day.empty{
      background:transparent;
      border:0;
    }

    .calendar-day .num{
      font-size:14px;
      font-weight:bold;
    }

    .calendar-day.has-event{
      background:var(--card);
      cursor:pointer;
    }

    .calendar-day.has-event:hover{
      outline:2px solid var(--brown);
    }

    .calendar-day .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--brown);
      margin:10px auto 0;
    }

    #calendarDetail{
      margin-top:18px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <img src="img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="serate.html">Serate</a>
      <a href="calendario.html">Calendario</a>
      <a href="dove.html">Dove siamo</a>
      <a href="contatti.html">Contattaci</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <div class="calendar-toolbar">
        <h2 id="calendarTitle" class="calendar-title">Calendario</h2>
        <div class="calendar-nav">
          <button id="prevMonthBtn" type="button">←</button>
          <button id="nextMonthBtn" type="button">→</button>
        </div>
      </div>

      <div id="calendarMount" class="calendar-grid"></div>
      <div id="calendarDetail"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
