<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Evento – Tavernetta da Kevin</title>
  <link rel="icon" type="image/png" href="../img/logoapp.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .event-shell{display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}
    .left-panel,.right-panel{display:flex;flex-direction:column;gap:16px;min-width:0}
    .summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .summary-mini{background:#fffaf2;border:1px solid #ead6b1;border-radius:12px;padding:12px}.summary-mini .k{font-size:13px;opacity:.8;margin-bottom:4px}.summary-mini .v{font-size:24px;font-weight:700;color:var(--brown);line-height:1.1}
    .compact-list{display:flex;flex-direction:column;gap:8px;max-height:72vh;overflow:auto;padding-right:4px}
    .compact-item{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:10px 12px;cursor:pointer;border:1px solid transparent;transition:.15s}.compact-item:hover{border-color:#d6b98a}.compact-item.active{border-color:#b7834b;background:#fffaf2}
    .compact-head{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:14px;font-weight:700;color:var(--brown)}
    .detail-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px}.detail-card h3{margin:0 0 10px;color:var(--brown)}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.detail-box{background:#fffaf2;border:1px solid #ead6b1;border-radius:12px;padding:10px;font-size:14px;word-break:break-word}.detail-box strong{display:block;margin-bottom:4px;color:var(--brown)}
    .detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .field{margin-top:10px}.field label{display:block;margin-bottom:6px;font-weight:700;color:var(--brown)}.field input,.field textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #d6b98a;font-family:inherit;font-size:15px;background:#fff}.field textarea{min-height:78px;resize:vertical}
    .table-layout{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);overflow:hidden;position:relative}
    .seat-legend{display:flex;gap:14px;flex-wrap:wrap;margin:4px 0 14px;font-size:14px}.legend-item{display:flex;align-items:center;gap:8px}.legend-dot{width:16px;height:16px;border-radius:50%;display:inline-block}.dot-free{background:#2e9d50}.dot-taken{background:#c43b2f}.dot-selected{background:#d4a017}
    .zoom-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.zoom-controls .button{min-width:auto;padding:8px 12px}
    .viewport{width:100%;min-height:700px;overflow:hidden;position:relative;touch-action:none;border-radius:12px;background:rgba(255,255,255,.25)}
    .zoom-surface{transform-origin:0 0;will-change:transform;width:max-content;min-width:100%;padding:10px;position:relative}
    .room-layout{min-width:860px;display:flex;flex-direction:column;gap:28px;align-items:center}.plan-block{width:100%;display:flex;justify-content:center}
    .seat{min-width:42px;height:42px;padding:0 10px;border-radius:50px;border:0;color:#fff;font-weight:bold;cursor:pointer;transition:.2s;font-size:14px}.seat.free{background:#2e9d50}.seat.taken{background:#c43b2f}.seat.selected{background:#d4a017;color:#111}.seat.free:hover,.seat.taken:hover{transform:scale(1.06)}
    .seat-row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:nowrap}.simple-table-wrap{width:fit-content;display:grid;grid-template-columns:48px auto 48px;grid-template-rows:auto 96px auto;gap:8px;align-items:center;justify-items:center}.top-seats,.bottom-seats{display:flex;gap:10px;width:auto;justify-content:center;flex-wrap:nowrap}.left-seat,.right-seat{display:flex;align-items:center;justify-content:center}
    .rect-table{width:var(--table-width,340px);background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);border-radius:22px;height:96px;box-shadow:inset 0 0 0 4px rgba(255,255,255,.14),0 8px 20px rgba(0,0,0,.12)}
    .internal-wrap{width:100%;display:grid;grid-template-columns:auto 1fr auto;grid-template-rows:auto auto auto auto;column-gap:16px;row-gap:14px;align-items:center;justify-items:center}.top-divans{grid-column:2;grid-row:1;width:100%;display:flex;justify-content:flex-end;padding-right:70px}.right-side{grid-column:3;grid-row:2 / span 2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}.right-side .seat-col{display:flex;flex-direction:column;gap:10px;align-items:center}.bottom-divans{grid-column:2;grid-row:4;width:100%;display:flex;justify-content:flex-end;padding-right:18px}
    .external-wrap{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%}
    .garden-wrap{display:grid;grid-template-columns:auto auto;column-gap:18px;align-items:center;justify-items:center;width:fit-content}.garden-table-wrap{display:grid;grid-template-columns:56px 96px 56px;grid-template-rows:auto auto var(--garden-mid,120px) auto auto;column-gap:14px;row-gap:10px;align-items:center;justify-items:center;width:fit-content}.garden-table{grid-column:2;grid-row:2 / span 3;width:96px;height:var(--garden-height,220px);background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);border-radius:22px;box-shadow:inset 0 0 0 4px rgba(255,255,255,.14),0 8px 20px rgba(0,0,0,.12)}.g-top{grid-column:2;grid-row:1}.g-bottom{grid-column:2;grid-row:5}.g-left-col,.g-right-col{display:flex;flex-direction:column;justify-content:space-between;align-items:center;height:var(--garden-height,220px)}.g-left-col{grid-column:1;grid-row:2 / span 3}.g-right-col{grid-column:3;grid-row:2 / span 3}.garden-right-poltrone{display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-width:56px}
    .seat-popup{position:absolute;background:#fff;border-radius:12px;padding:12px;box-shadow:0 10px 25px rgba(0,0,0,.22);width:260px;z-index:2000;border:1px solid #ead6b1}.seat-popup h4{margin:0 0 8px;color:var(--brown)}.seat-popup input{width:100%;padding:8px;border-radius:8px;border:1px solid #d6b98a;margin-top:6px;font-family:inherit}.seat-popup .popup-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .danger{background:#b9382f !important;color:#fff !important;border:none !important}.mini-note{font-size:13px;opacity:.8}
    @media (max-width:1100px){.event-shell{grid-template-columns:1fr}.compact-list{max-height:none}.viewport{min-height:540px}.room-layout{min-width:760px}}
  </style>
</head>
<body>
  <div class="top-bar"><img src="../img/logoapp.png" alt="Tavernetta Manager" class="logo-top"><button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button></div>
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
  <aside id="sidebar" class="sidebar"><img src="../img/logoapp.png" alt="Logo" class="side-logo"><nav><a href="index.html">Dashboard</a><a href="serate.html">Serate</a><a href="storico.html">Storico eventi</a><a href="settimana.html">Programmazione settimana</a><a href="inventario.html">Inventario</a><a href="../index.html">Sito pubblico</a><a href="#" id="logoutBtn">Esci</a></nav></aside>
  <main class="page">
    <section class="section"><h2>Gestione serata</h2><div id="eventDetail"></div></section>
    <section class="section"><div class="event-shell"><div class="left-panel"><div class="card"><h3 class="event-title">Riepilogo serata</h3><div id="eventSummaryGrid" class="summary-grid"></div><div class="detail-actions" style="margin-top:12px;"><button id="exportPdfBtn" class="button secondary" type="button">Esporta PDF</button></div></div>
      <div class="card"><h3 class="event-title">Nuova prenotazione</h3><p id="salaInfoText" class="mini-note"></p><div id="quotaBox" class="summary-box"></div><div class="field"><label for="nomeInput">Nome e cognome</label><input id="nomeInput" type="text"></div><div class="field"><label for="telefonoInput">Telefono</label><input id="telefonoInput" type="text"></div><div class="field"><label for="emailInput">Email</label><input id="emailInput" type="email"></div><div class="field"><label for="allergieInput">Allergie e intolleranze</label><textarea id="allergieInput"></textarea></div><div class="field"><label for="richiesteInput">Richieste</label><textarea id="richiesteInput"></textarea></div><div class="summary-box"><div><strong>Posti selezionati:</strong> <span id="selectedSeatsText">nessuno</span></div><div style="margin-top:6px;"><strong>Totale posti:</strong> <span id="selectedCountText">0</span></div></div><button id="bookBtn" class="button">Salva prenotazione</button><p id="bookingMsg" class="note"></p></div>
      <div class="card"><h3 class="event-title">Prenotazioni</h3><div id="compactPrenList" class="compact-list"></div></div><div id="bookingDetailCard" class="detail-card" style="display:none;"></div></div>
      <div class="right-panel"><div class="table-layout"><div class="seat-legend"><div class="legend-item"><span class="legend-dot dot-free"></span> Disponibile</div><div class="legend-item"><span class="legend-dot dot-selected"></span> Selezionato</div><div class="legend-item"><span class="legend-dot dot-taken"></span> Occupato</div></div><div class="zoom-controls"><button id="zoomInBtn" type="button" class="button secondary">+</button><button id="zoomOutBtn" type="button" class="button secondary">−</button><button id="zoomResetBtn" type="button" class="button secondary">Reset</button></div><div id="viewport" class="viewport"><div id="zoomSurface" class="zoom-surface"><div id="roomLayout" class="room-layout"></div><div id="seatPopup" class="seat-popup" style="display:none;"></div></div></div></div></div></div></section>
  </main>
  <script src="manager-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/site.js"></script>
  <script>
    const params=new URLSearchParams(window.location.search); const serataId=params.get('id');
    let currentEvent=null, occupiedSeats=[], selectedSeats=[], saleConfig={}, prenotazioniData=[], seatBookingMap={}, openedBookingId=null;
    const INTERNAL_EXTRA=['D1','D2','D3','D4','D5','D6','D7','S1','D8','S2'];
    const viewport=document.getElementById('viewport'), zoomSurface=document.getElementById('zoomSurface'), seatPopup=document.getElementById('seatPopup');
    let scale=1, translateX=0, translateY=0, isDragging=false, dragStartX=0, dragStartY=0;
    seatPopup.addEventListener('pointerdown',e=>e.stopPropagation()); seatPopup.addEventListener('click',e=>e.stopPropagation());
    function applyTransform(){ zoomSurface.style.transform=`translate(${translateX}px, ${translateY}px) scale(${scale})`; } function resetTransform(){ scale=1; translateX=0; translateY=0; applyTransform(); } function clampScale(v){ return Math.min(2.5, Math.max(0.6,v)); }
    document.getElementById('zoomInBtn').addEventListener('click',()=>{ scale=clampScale(scale+0.15); applyTransform();}); document.getElementById('zoomOutBtn').addEventListener('click',()=>{ scale=clampScale(scale-0.15); applyTransform();}); document.getElementById('zoomResetBtn').addEventListener('click', resetTransform);
    viewport.addEventListener('wheel', e=>{ e.preventDefault(); scale=clampScale(scale + (e.deltaY>0?-0.1:0.1)); applyTransform(); }, {passive:false});
    viewport.addEventListener('pointerdown', e=>{ const seatBtn=e.target.closest('.seat'); if(seatBtn || seatPopup.contains(e.target)) return; isDragging=true; dragStartX=e.clientX-translateX; dragStartY=e.clientY-translateY; viewport.setPointerCapture(e.pointerId); hideSeatPopup(); });
    viewport.addEventListener('pointermove', e=>{ if(!isDragging) return; translateX=e.clientX-dragStartX; translateY=e.clientY-dragStartY; applyTransform(); }); viewport.addEventListener('pointerup', ()=>isDragging=false); viewport.addEventListener('pointercancel', ()=>isDragging=false);
    document.addEventListener('click', e=>{ if(!seatPopup.contains(e.target) && !e.target.closest('.seat')) hideSeatPopup(); });
    function formatCurrency(v){ return `€ ${Number(v||0).toFixed(2)}`; }
    function getSeatMeta(id){ if(/^\d+$/.test(id)) return {sala:'interna', tipo:'tavolo'}; if(/^D\d+$/.test(id)||/^S\d+$/.test(id)) return {sala:'interna', tipo:'divano'}; if(/^E\d+$/.test(id)) return {sala:'esterna', tipo:'tavolo'}; if(/^M\d+$/.test(id)) return {sala:'esterna', tipo:'muretto'}; if(/^G\d+$/.test(id)) return {sala:'giardino', tipo:'tavolo'}; if(/^P\d+$/.test(id)) return {sala:'giardino', tipo:'poltrona'}; return {sala:'', tipo:''}; }
    function seatCategoryRank(id){ if(/^\d+$/.test(id)) return 1; if(/^E\d+$/.test(id)) return 2; if(/^G\d+$/.test(id)) return 3; if(/^D\d+$/.test(id)) return 4; if(/^S\d+$/.test(id)) return 5; if(/^M\d+$/.test(id)) return 6; if(/^P\d+$/.test(id)) return 7; return 99; }
    function seatNumber(id){ const m=String(id).match(/(\d+)$/); return m?Number(m[1]):0; }
    function seatSort(a,b){ const ra=seatCategoryRank(a), rb=seatCategoryRank(b); return ra!==rb ? ra-rb : seatNumber(a)-seatNumber(b); }
    function countSeatsForPayment(seats){ let tav=0,dop=0; seats.forEach(id=>{ if(getSeatMeta(id).tipo==='tavolo') tav++; else dop++; }); return {tavolo:tav, dopocena:dop}; }
    function calculateBookingAmounts(seats){ const c=countSeatsForPayment(seats); const totale=c.tavolo*Number(currentEvent?.quota_tavolo||0)+c.dopocena*Number(currentEvent?.quota_dopocena||0); return {...c, totale}; }
    function shortLabelFromName(fullName){ const parts=String(fullName||'').trim().split(/\s+/).filter(Boolean); if(!parts.length) return ''; if(parts[0].length<=6) return parts[0]; if(parts.length===1) return parts[0].slice(0,2).toUpperCase(); return `${parts[0][0]||''}${parts[parts.length-1][0]||''}`.toUpperCase(); }
    function updateSelectedInfo(){ const ordered=[...selectedSeats].sort(seatSort); document.getElementById('selectedSeatsText').textContent=ordered.length?ordered.join(', '):'nessuno'; document.getElementById('selectedCountText').textContent=ordered.length; updateQuotaInfo(ordered); }
    function updateQuotaInfo(seats=[]){ const box=document.getElementById('quotaBox'); const {tavolo,dopocena,totale}=calculateBookingAmounts(seats); box.innerHTML=`<h4>Quota prenotazione</h4><div><strong>Quota tavolo:</strong> ${formatCurrency(currentEvent?.quota_tavolo||0)}</div><div><strong>Quota dopocena:</strong> ${formatCurrency(currentEvent?.quota_dopocena||0)}</div><div style="margin-top:8px;"><strong>Posti tavolo selezionati:</strong> ${tavolo}</div><div><strong>Posti dopocena selezionati:</strong> ${dopocena}</div><div style="margin-top:8px;"><strong>Totale da pagare:</strong> ${formatCurrency(totale)}</div>`; }
    function createSeatButton(id){ const booking=seatBookingMap[id]||null; const btn=document.createElement('button'); btn.className='seat '+(booking?'taken':'free'); btn.textContent=id; btn.type='button'; if(booking){ btn.addEventListener('click', e=>{ e.stopPropagation(); showSeatPopup(e, booking, id); openBookingDetail(booking.id); }); } else { btn.addEventListener('click', e=>{ e.stopPropagation(); if(selectedSeats.includes(id)){ selectedSeats=selectedSeats.filter(x=>x!==id); btn.classList.remove('selected'); btn.classList.add('free'); } else { selectedSeats.push(id); btn.classList.remove('free'); btn.classList.add('selected'); } hideSeatPopup(); updateSelectedInfo(); }); } return btn; }
    function buildTableSeatMap(totalSeats,prefix=''){ const longSide=(totalSeats-2)/2; const top=[], bottom=[]; for(let i=0;i<longSide;i++) top.push(prefix+String(2+i)); for(let i=0;i<longSide;i++) bottom.push(prefix+String(2+longSide+i)); return {left:prefix+'1', right:prefix+String(totalSeats), top, bottom}; }
    function buildSimpleTableBlock(totalSeats,prefix=''){ const m=buildTableSeatMap(totalSeats,prefix); const wrap=document.createElement('div'); wrap.className='simple-table-wrap'; const w=Math.max(220,m.top.length*52); const top=document.createElement('div'); top.className='top-seats'; top.style.gridColumn='2'; top.style.gridRow='1'; m.top.forEach(id=>top.appendChild(createSeatButton(id))); const left=document.createElement('div'); left.className='left-seat'; left.style.gridColumn='1'; left.style.gridRow='2'; left.appendChild(createSeatButton(m.left)); const center=document.createElement('div'); center.className='rect-table'; center.style.gridColumn='2'; center.style.gridRow='2'; center.style.setProperty('--table-width',`${w}px`); const right=document.createElement('div'); right.className='right-seat'; right.style.gridColumn='3'; right.style.gridRow='2'; right.appendChild(createSeatButton(m.right)); const bottom=document.createElement('div'); bottom.className='bottom-seats'; bottom.style.gridColumn='2'; bottom.style.gridRow='3'; m.bottom.forEach(id=>bottom.appendChild(createSeatButton(id))); wrap.append(top,left,center,right,bottom); return wrap; }
    function buildGardenBlock(totalSeats,extraSeats){ const wrap=document.createElement('div'); wrap.className='plan-block'; const garden=document.createElement('div'); garden.className='garden-wrap'; const tableWrap=document.createElement('div'); tableWrap.className='garden-table-wrap'; const perSide=Math.ceil(Math.max(4,totalSeats-2)/2); tableWrap.style.setProperty('--garden-height',`${140+Math.max(0,perSide-2)*44}px`); tableWrap.style.setProperty('--garden-mid',`${70+Math.max(0,perSide-2)*22}px`); const ids=[]; for(let i=1;i<=totalSeats;i++) ids.push(`G${i}`); const side=ids.slice(2), leftIds=side.slice(0,Math.ceil(side.length/2)), rightIds=side.slice(Math.ceil(side.length/2)); const gTop=ids[0]?createSeatButton(ids[0]):document.createElement('div'); gTop.classList.add('g-top'); const gBottom=ids[1]?createSeatButton(ids[1]):document.createElement('div'); gBottom.classList.add('g-bottom'); const leftCol=document.createElement('div'); leftCol.className='g-left-col'; leftIds.forEach(id=>leftCol.appendChild(createSeatButton(id))); const rightCol=document.createElement('div'); rightCol.className='g-right-col'; rightIds.forEach(id=>rightCol.appendChild(createSeatButton(id))); const table=document.createElement('div'); table.className='garden-table'; tableWrap.append(gTop,gBottom,leftCol,rightCol,table); const pol=document.createElement('div'); pol.className='garden-right-poltrone'; for(let i=1;i<=extraSeats;i++) pol.appendChild(createSeatButton(`P${i}`)); garden.append(tableWrap,pol); wrap.appendChild(garden); return wrap; }
    function buildExternalBlock(totalSeats,extraSeats){ const wrap=document.createElement('div'); wrap.className='plan-block'; const ext=document.createElement('div'); ext.className='external-wrap'; const topExtras=document.createElement('div'); topExtras.className='seat-row'; for(let i=1;i<=extraSeats;i++) topExtras.appendChild(createSeatButton(`M${i}`)); ext.append(topExtras, buildSimpleTableBlock(totalSeats,'E')); wrap.appendChild(ext); return wrap; }
    function buildInternalBlock(totalSeats){ const container=document.createElement('div'); container.className='plan-block'; const internal=document.createElement('div'); internal.className='internal-wrap'; const topDivans=document.createElement('div'); topDivans.className='top-divans'; const topRow=document.createElement('div'); topRow.className='seat-row'; ['D1','D2','D3','D4','D5'].forEach(id=>topRow.appendChild(createSeatButton(id))); topDivans.appendChild(topRow); const tableWrap=buildSimpleTableBlock(totalSeats,''); tableWrap.style.gridColumn='2'; tableWrap.style.gridRow='2 / span 2'; const rightSide=document.createElement('div'); rightSide.className='right-side'; const rightCol=document.createElement('div'); rightCol.className='seat-col'; ['D6','D7','S1'].forEach(id=>rightCol.appendChild(createSeatButton(id))); rightSide.appendChild(rightCol); const bottomDivans=document.createElement('div'); bottomDivans.className='bottom-divans'; const bottomRow=document.createElement('div'); bottomRow.className='seat-row'; ['D8','S2'].forEach(id=>bottomRow.appendChild(createSeatButton(id))); bottomDivans.appendChild(bottomRow); internal.append(topDivans,tableWrap,rightSide,bottomDivans); container.appendChild(internal); return container; }
    function renderRoom(){ const room=document.getElementById('roomLayout'); room.innerHTML=''; if(saleConfig.giardino?.attiva) room.appendChild(buildGardenBlock(saleConfig.giardino.posti_totali, saleConfig.giardino.posti_extra)); if(saleConfig.esterna?.attiva) room.appendChild(buildExternalBlock(saleConfig.esterna.posti_totali, saleConfig.esterna.posti_extra)); if(saleConfig.interna?.attiva) room.appendChild(buildInternalBlock(saleConfig.interna.posti_totali)); }
    function getAllSeatIds(){ let ids=[]; if(saleConfig.interna?.attiva){ for(let i=1;i<=saleConfig.interna.posti_totali;i++) ids.push(String(i)); ids=ids.concat(INTERNAL_EXTRA);} if(saleConfig.esterna?.attiva){ for(let i=1;i<=saleConfig.esterna.posti_totali;i++) ids.push(`E${i}`); for(let i=1;i<=saleConfig.esterna.posti_extra;i++) ids.push(`M${i}`);} if(saleConfig.giardino?.attiva){ for(let i=1;i<=saleConfig.giardino.posti_totali;i++) ids.push(`G${i}`); for(let i=1;i<=saleConfig.giardino.posti_extra;i++) ids.push(`P${i}`);} return ids; }
    function setSalaInfoText(){ const names=[]; if(saleConfig.interna?.attiva) names.push('all’interno'); if(saleConfig.esterna?.attiva) names.push('all’esterno'); if(saleConfig.giardino?.attiva) names.push('in giardino'); const box=document.getElementById('salaInfoText'); if(names.length===1) box.textContent=`La serata si svolgerà ${names[0]}.`; else if(names.length===2) box.textContent=`La serata si svolgerà ${names[0]} e ${names[1]}.`; else if(names.length===3) box.textContent='La serata si svolgerà all’interno, all’esterno e in giardino.'; else box.textContent=''; }
    function renderSummaryCards(){ const container=document.getElementById('eventSummaryGrid'); const totalBookings=prenotazioniData.length, totalSeats=occupiedSeats.length; let totaleDovuto=0, totaleIncassato=0; prenotazioniData.forEach(pr=>{ const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)); const amounts=calculateBookingAmounts(seats); totaleDovuto += amounts.totale; totaleIncassato += Number(pr.importo_pagato||0); }); const saldo=Math.max(0, totaleDovuto-totaleIncassato); container.innerHTML=`<div class="summary-mini"><div class="k">Totale dovuto</div><div class="v">${formatCurrency(totaleDovuto)}</div></div><div class="summary-mini"><div class="k">Totale incassato</div><div class="v">${formatCurrency(totaleIncassato)}</div></div><div class="summary-mini"><div class="k">Saldo residuo</div><div class="v">${formatCurrency(saldo)}</div></div><div class="summary-mini"><div class="k">Prenotazioni / posti</div><div class="v">${totalBookings} / ${totalSeats}</div></div>`; }
    function hideSeatPopup(){ seatPopup.style.display='none'; seatPopup.innerHTML=''; }
    function popupPositionFromEvent(e){ const rect=zoomSurface.getBoundingClientRect(); const x=(e.clientX-rect.left)/scale; const y=(e.clientY-rect.top)/scale; seatPopup.style.left=`${x+14}px`; seatPopup.style.top=`${y+14}px`; }
    async function savePopupPayment(id){ const input=document.getElementById(`popupPaid_${id}`); const importoPagato=Number(input.value||0); const {error}=await supabaseClient.from('prenotazioni').update({importo_pagato:importoPagato}).eq('id', id); if(error){ console.error(error); document.getElementById('bookingMsg').textContent='Errore nel salvataggio pagamento.'; return; } document.getElementById('bookingMsg').textContent='Pagamento aggiornato.'; hideSeatPopup(); await loadPrenotazioniList(); openBookingDetail(id); }
    function showSeatPopup(e, pr, clickedSeat){ e.stopPropagation(); const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const amounts=calculateBookingAmounts(seats); const importoPagato=Number(pr.importo_pagato||0); const saldo=Math.max(0, amounts.totale-importoPagato); seatPopup.innerHTML=`<h4>${pr.nome}</h4><div><strong>Posto cliccato:</strong> ${clickedSeat}</div><div><strong>Posti:</strong> ${seats.join(', ')}</div><div><strong>Telefono:</strong> ${pr.telefono||'-'}</div><div><strong>Totale dovuto:</strong> ${formatCurrency(amounts.totale)}</div><div><strong>Importo pagato:</strong> ${formatCurrency(importoPagato)}</div><div><strong>Saldo:</strong> ${formatCurrency(saldo)}</div><label style="display:block;margin-top:10px;"><strong>Quanto ha pagato</strong><input id="popupPaid_${pr.id}" type="number" min="0" step="0.01" value="${importoPagato}"></label><div class="popup-actions"><button class="button secondary" type="button" onclick="savePopupPayment('${pr.id}')">Salva</button><button class="button secondary" type="button" onclick="hideSeatPopup()">Chiudi</button></div>`; popupPositionFromEvent(e); seatPopup.style.display='block'; }
    function renderCompactPrenList(){ const box=document.getElementById('compactPrenList'); if(!prenotazioniData.length){ box.innerHTML='<div class="mini-note">Nessuna prenotazione presente.</div>'; return; } const sorted=[...prenotazioniData].sort((a,b)=>{ const aSeats=(a.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const bSeats=(b.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); if(!aSeats.length&&!bSeats.length) return 0; if(!aSeats.length) return 1; if(!bSeats.length) return -1; return seatSort(aSeats[0], bSeats[0]); }); box.innerHTML=''; sorted.forEach(pr=>{ const posti=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const item=document.createElement('div'); item.className='compact-item'+(String(pr.id)===String(openedBookingId)?' active':''); item.innerHTML=`<div class="compact-head"><span>${pr.nome}</span><span>${posti.join(', ')}</span></div>`; item.addEventListener('click', ()=>openBookingDetail(pr.id)); box.appendChild(item); }); }
    function openBookingDetail(id){ openedBookingId=id; renderCompactPrenList(); const pr=prenotazioniData.find(x=>String(x.id)===String(id)); const card=document.getElementById('bookingDetailCard'); if(!pr){ closeBookingDetail(); return; } const posti=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const amounts=calculateBookingAmounts(posti); const paid=Number(pr.importo_pagato||0); const saldo=Math.max(0, amounts.totale-paid); card.style.display='block'; card.innerHTML=`<h3>${pr.nome}</h3><div class="detail-grid"><div class="detail-box"><strong>Posti</strong>${posti.join(', ')||'-'}</div><div class="detail-box"><strong>Telefono</strong>${pr.telefono||'-'}</div><div class="detail-box"><strong>Email</strong>${pr.email||'-'}</div><div class="detail-box"><strong>Totale dovuto</strong>${formatCurrency(amounts.totale)}</div><div class="detail-box"><strong>Allergie / intolleranze</strong>${pr.allergie||'-'}</div><div class="detail-box"><strong>Richieste</strong>${pr.richieste||'-'}</div></div><div class="field"><label for="detailPaidInput">Quanto ha pagato</label><input id="detailPaidInput" type="number" min="0" step="0.01" value="${paid}"></div><div class="summary-box"><div><strong>Importo pagato:</strong> ${formatCurrency(paid)}</div><div><strong>Saldo residuo:</strong> ${formatCurrency(saldo)}</div></div><div class="detail-actions"><button class="button secondary" type="button" onclick="saveDetailPayment('${pr.id}')">Salva pagamento</button><button class="button danger" type="button" onclick="deleteBooking('${pr.id}')">Elimina prenotazione</button><button class="button secondary" type="button" onclick="closeBookingDetail()">Chiudi</button></div>`; }
    function closeBookingDetail(){ openedBookingId=null; renderCompactPrenList(); const card=document.getElementById('bookingDetailCard'); card.style.display='none'; card.innerHTML=''; }
    async function saveDetailPayment(id){ const input=document.getElementById('detailPaidInput'); const paid=Number(input.value||0); const {error}=await supabaseClient.from('prenotazioni').update({importo_pagato:paid}).eq('id',id); if(error){ console.error(error); document.getElementById('bookingMsg').textContent='Errore nel salvataggio pagamento.'; return; } document.getElementById('bookingMsg').textContent='Pagamento aggiornato.'; await loadPrenotazioniList(); openBookingDetail(id); }
    async function deleteBooking(id){ const pr=prenotazioniData.find(x=>String(x.id)===String(id)); if(!confirm(`Eliminare la prenotazione di ${pr?.nome || 'questa prenotazione'}?`)) return; const {error}=await supabaseClient.from('prenotazioni').delete().eq('id', id); if(error){ console.error(error); document.getElementById('bookingMsg').textContent='Errore nell\'eliminazione della prenotazione.'; return; } document.getElementById('bookingMsg').textContent='Prenotazione eliminata.'; hideSeatPopup(); closeBookingDetail(); await loadPrenotazioniList(); }
    async function loadSaleConfig(){ const {data,error}=await supabaseClient.from('serata_sale').select('sala_codice, attiva, posti_totali, posti_extra').eq('serata_id', serataId); if(error){ console.error(error); return false; } saleConfig={}; (data||[]).forEach(r=>saleConfig[r.sala_codice]={attiva:!!r.attiva, posti_totali:Number(r.posti_totali||0), posti_extra:Number(r.posti_extra||0)}); return true; }
    async function loadPrenotazioniList(){ const {data,error}=await supabaseClient.from('prenotazioni').select(`id,nome,telefono,email,allergie,richieste,creato_il,importo_pagato,prenotazione_posti(posto_numero,posto_tipo)`).eq('serata_id', serataId).order('creato_il',{ascending:false}); if(error){ console.error(error); document.getElementById('compactPrenList').innerHTML='<div class="mini-note">Errore nel caricamento prenotazioni.</div>'; return; } prenotazioniData=data||[]; seatBookingMap={}; occupiedSeats=[]; prenotazioniData.forEach(pr=>{ (pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).forEach(seat=>{ seatBookingMap[seat]=pr; occupiedSeats.push(seat); }); }); occupiedSeats=occupiedSeats.sort(seatSort); renderCompactPrenList(); renderSummaryCards(); renderRoom(); if(openedBookingId) openBookingDetail(openedBookingId); }
    function renderEventHeader(ev){ document.getElementById('eventDetail').innerHTML=`<div class="card event-card"><div><img src="${ev.locandina||'../img/logoapp.png'}" alt="${ev.titolo}"></div><div><h3 class="event-title">${ev.titolo}</h3><p class="meta">${formatDateIT(ev.data)}</p>${ev.programma?`<p>${ev.programma}</p>`:''}</div></div>`; }
    async function loadEventAndSeats(){ if(!serataId){ document.getElementById('eventDetail').innerHTML='<div class="card note">Serata non trovata.</div>'; return; } const {data:eventData,error:eventError}=await supabaseClient.from('serate').select('*').eq('id', serataId).single(); if(eventError||!eventData){ console.error(eventError); document.getElementById('eventDetail').innerHTML='<div class="card note">Errore nel caricamento della serata.</div>'; return; } currentEvent=eventData; renderEventHeader(currentEvent); const salesOk=await loadSaleConfig(); if(!salesOk){ document.getElementById('bookingMsg').textContent='Errore nel caricamento sale.'; return; } setSalaInfoText(); updateSelectedInfo(); renderSummaryCards(); }
    async function saveBooking(){ const nome=document.getElementById('nomeInput').value.trim(); const telefono=document.getElementById('telefonoInput').value.trim(); const email=document.getElementById('emailInput').value.trim(); const allergie=document.getElementById('allergieInput').value.trim(); const richieste=document.getElementById('richiesteInput').value.trim(); const msg=document.getElementById('bookingMsg'); msg.textContent=''; if(!nome){ msg.textContent='Inserisci almeno il nome.'; return; } if(!selectedSeats.length){ msg.textContent='Seleziona almeno un posto.'; return; } if(selectedSeats.some(seat=>occupiedSeats.includes(seat))){ msg.textContent='Uno dei posti selezionati non è più disponibile.'; await loadPrenotazioniList(); selectedSeats=[]; updateSelectedInfo(); return; } const booked=[...selectedSeats].sort(seatSort); const {data:pren,error:prenErr}=await supabaseClient.from('prenotazioni').insert([{serata_id:serataId,nome,telefono:telefono||null,email:email||null,allergie:allergie||null,richieste:richieste||null,importo_pagato:0}]).select().single(); if(prenErr||!pren){ console.error(prenErr); msg.textContent='Errore nel salvataggio prenotazione.'; return; } const postiRows=booked.map(seatId=>({prenotazione_id:pren.id,serata_id:serataId,posto_numero:seatId,posto_tipo:getSeatMeta(seatId).tipo})); const {error:postiErr}=await supabaseClient.from('prenotazione_posti').insert(postiRows); if(postiErr){ console.error(postiErr); msg.textContent='Errore nel salvataggio posti.'; return; } msg.textContent=`Prenotazione salvata. Totale dovuto: ${formatCurrency(calculateBookingAmounts(booked).totale)}`; ['nomeInput','telefonoInput','emailInput','allergieInput','richiesteInput'].forEach(id=>document.getElementById(id).value=''); selectedSeats=[]; hideSeatPopup(); await loadPrenotazioniList(); updateSelectedInfo(); }
    function getPdfSeatPositions(){ const positions={}; const y0=62; let blockY=y0; if(saleConfig.giardino?.attiva){ const total=saleConfig.giardino.posti_totali, extra=saleConfig.giardino.posti_extra; const x=200; const ids=[]; for(let i=1;i<=total;i++) ids.push(`G${i}`); const side=ids.slice(2), leftIds=side.slice(0,Math.ceil(side.length/2)), rightIds=side.slice(Math.ceil(side.length/2)); positions[ids[0]]={x:x,y:blockY}; positions[ids[1]]={x:x,y:blockY+52}; leftIds.forEach((id,idx)=>positions[id]={x:x-18,y:blockY+12+idx*14}); rightIds.forEach((id,idx)=>positions[id]={x:x+18,y:blockY+12+idx*14}); for(let i=1;i<=extra;i++) positions[`P${i}`]={x:x+42,y:blockY+8+(i-1)*10}; blockY += 88; }
      if(saleConfig.esterna?.attiva){ const x=120; const total=saleConfig.esterna.posti_totali, extra=saleConfig.esterna.posti_extra; const map=buildTableSeatMap(total,'E'); map.top.forEach((id,idx)=>positions[id]={x:x+idx*14,y:blockY}); positions[map.left]={x:x-14,y:blockY+16}; positions[map.right]={x:x+(map.top.length-1)*14+14,y:blockY+16}; map.bottom.forEach((id,idx)=>positions[id]={x:x+idx*14,y:blockY+32}); for(let i=1;i<=extra;i++) positions[`M${i}`]={x:60+(i-1)*12,y:blockY+16}; blockY += 68; }
      if(saleConfig.interna?.attiva){ const x=120; const total=saleConfig.interna.posti_totali; const map=buildTableSeatMap(total,''); map.top.forEach((id,idx)=>positions[id]={x:x+idx*14,y:blockY}); positions[map.left]={x:x-14,y:blockY+16}; positions[map.right]={x:x+(map.top.length-1)*14+14,y:blockY+16}; map.bottom.forEach((id,idx)=>positions[id]={x:x+idx*14,y:blockY+32}); ['D1','D2','D3','D4','D5'].forEach((id,idx)=>positions[id]={x:190+idx*12,y:blockY-16}); ['D6','D7','S1'].forEach((id,idx)=>positions[id]={x:260,y:blockY+idx*12}); ['D8','S2'].forEach((id,idx)=>positions[id]={x:220+idx*14,y:blockY+52}); }
      return positions; }
    async function exportPdf(){ const { jsPDF } = window.jspdf; const doc=new jsPDF({orientation:'landscape', unit:'mm', format:'a4'}); doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.text(currentEvent?.titolo || 'Serata', 14, 14); doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.text(formatDateIT(currentEvent?.data || ''), 14, 21);
      const positions=getPdfSeatPositions(); doc.setDrawColor(120); doc.setFillColor(250,245,236); doc.roundedRect(12,26,273,122,4,4,'S'); doc.setFontSize(9);
      Object.entries(positions).forEach(([seat, pos])=>{ const booking=getBookingBySeat(seat); doc.setFillColor(booking ? 196 : 46, booking ? 59 : 157, booking ? 47 : 80); doc.circle(pos.x, pos.y, 4.5, 'F'); doc.setTextColor(255,255,255); const label=booking ? shortLabelFromName(booking.nome) : seat; doc.text(String(label).slice(0,6), pos.x, pos.y+1.2, {align:'center'}); doc.setTextColor(30,30,30); });
      let listY=158; doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.text('Prenotazioni', 14, listY); listY += 6; doc.setFont('helvetica','normal'); const sorted=[...prenotazioniData].sort((a,b)=>{ const as=(a.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const bs=(b.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); return seatSort(as[0]||'Z999', bs[0]||'Z999'); }); sorted.forEach(pr=>{ const posti=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort).join(', '); doc.text(`${pr.nome} — ${posti}`, 14, listY); listY += 5; });
      let dov=0, inc=0; prenotazioniData.forEach(pr=>{ const posti=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)); dov += calculateBookingAmounts(posti).totale; inc += Number(pr.importo_pagato||0); }); const saldo=Math.max(0,dov-inc); listY += 4; doc.setFont('helvetica','bold'); doc.text(`Prenotazioni: ${prenotazioniData.length}   Coperti: ${occupiedSeats.length}   Totale dovuto: ${formatCurrency(dov)}   Incassato: ${formatCurrency(inc)}   Saldo: ${formatCurrency(saldo)}`, 14, listY); doc.save(`serata-${(currentEvent?.data||'evento')}.pdf`); }
    window.savePopupPayment=savePopupPayment; window.saveDetailPayment=saveDetailPayment; window.deleteBooking=deleteBooking; window.closeBookingDetail=closeBookingDetail; window.hideSeatPopup=hideSeatPopup;
    document.getElementById('exportPdfBtn').addEventListener('click', exportPdf); document.getElementById('bookBtn').addEventListener('click', saveBooking); document.getElementById('logoutBtn').addEventListener('click', e=>{ e.preventDefault(); localStorage.removeItem('admin_ok'); localStorage.removeItem('manager_auth'); window.location.href='login.html'; });
    document.addEventListener('DOMContentLoaded', async()=>{ await loadEventAndSeats(); await loadPrenotazioniList(); });
  </script>
