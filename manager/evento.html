<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Evento – Tavernetta da Kevin</title>

  <link rel="icon" type="image/png" href="../img/logo.png">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .booking-wrap{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
    }

    .seat-legend{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin:10px 0 18px;
      font-size:14px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .legend-dot{
      width:16px;
      height:16px;
      border-radius:50%;
      display:inline-block;
    }

    .dot-free{ background:#2e9d50; }
    .dot-taken{ background:#c43b2f; }
    .dot-selected{ background:#d4a017; }

    .table-layout{
      background:var(--card);
      border-radius:16px;
      padding:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .viewport{
      width:100%;
      min-height:620px;
      overflow:hidden;
      position:relative;
      touch-action:none;
      border-radius:12px;
      background:rgba(255,255,255,.25);
    }

    .zoom-surface{
      transform-origin:0 0;
      will-change:transform;
      width:max-content;
      min-width:100%;
      padding:10px;
      position:relative;
    }

    .room-layout{
      min-width:860px;
      display:flex;
      flex-direction:column;
      gap:28px;
      align-items:center;
    }

    .plan-block{
      width:100%;
      display:flex;
      justify-content:center;
    }

    .seat{
      min-width:42px;
      height:42px;
      padding:0 10px;
      border-radius:50px;
      border:0;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
      font-size:14px;
    }

    .seat.free{ background:#2e9d50; }
    .seat.taken{ background:#c43b2f; }
    .seat.selected{ background:#d4a017; color:#111; }

    .seat.free:hover,
    .seat.taken:hover{
      transform:scale(1.06);
    }

    .seat-row{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:nowrap;
    }

    .simple-table-wrap{
      width:fit-content;
      display:grid;
      grid-template-columns:48px auto 48px;
      grid-template-rows:auto 96px auto;
      gap:8px;
      align-items:center;
      justify-items:center;
    }

    .top-seats,
    .bottom-seats{
      display:flex;
      gap:10px;
      width:auto;
      justify-content:center;
      flex-wrap:nowrap;
    }

    .left-seat,
    .right-seat{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .rect-table{
      width:var(--table-width, 340px);
      background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);
      border-radius:22px;
      height:96px;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.14),
        0 8px 20px rgba(0,0,0,.12);
    }

    .internal-wrap{
      width:100%;
      display:grid;
      grid-template-columns:auto 1fr auto;
      grid-template-rows:auto auto auto auto;
      column-gap:16px;
      row-gap:14px;
      align-items:center;
      justify-items:center;
    }

    .top-divans{
      grid-column:2;
      grid-row:1;
      width:100%;
      display:flex;
      justify-content:flex-end;
      padding-right:70px;
    }

    .right-side{
      grid-column:3;
      grid-row:2 / span 2;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .right-side .seat-col{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }

    .bottom-divans{
      grid-column:2;
      grid-row:4;
      width:100%;
      display:flex;
      justify-content:flex-end;
      padding-right:18px;
    }

    .external-wrap{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      width:100%;
    }

    .garden-wrap{
      display:grid;
      grid-template-columns:auto auto;
      column-gap:18px;
      align-items:center;
      justify-items:center;
      width:fit-content;
    }

    .garden-table-wrap{
      display:grid;
      grid-template-columns:56px 96px 56px;
      grid-template-rows:auto auto var(--garden-mid, 120px) auto auto;
      column-gap:14px;
      row-gap:10px;
      align-items:center;
      justify-items:center;
      width:fit-content;
    }

    .garden-table{
      grid-column:2;
      grid-row:2 / span 3;
      width:96px;
      height:var(--garden-height, 220px);
      background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);
      border-radius:22px;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.14),
        0 8px 20px rgba(0,0,0,.12);
    }

    .g-top{ grid-column:2; grid-row:1; }
    .g-bottom{ grid-column:2; grid-row:5; }

    .g-left-col{
      grid-column:1;
      grid-row:2 / span 3;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      height:var(--garden-height, 220px);
    }

    .g-right-col{
      grid-column:3;
      grid-row:2 / span 3;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      height:var(--garden-height, 220px);
    }

    .garden-right-poltrone{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      justify-content:center;
      min-width:56px;
    }

    .form-box input,
    .form-box textarea{
      width:100%;
      padding:12px;
      margin:0 0 12px;
      border-radius:10px;
      border:1px solid #d6b98a;
      font-size:16px;
      font-family:inherit;
      resize:vertical;
    }

    .form-box textarea{
      min-height:84px;
    }

    .selected-box{
      margin:12px 0;
      font-size:15px;
    }

    .summary-box{
      background:#fffaf2;
      border:1px solid #ead6b1;
      border-radius:12px;
      padding:12px;
      margin-bottom:12px;
      font-size:14px;
    }

    .summary-box h4{
      margin:0 0 8px;
      color:var(--brown);
    }

    .pren-list{
      display:grid;
      gap:12px;
      margin-top:20px;
    }

    .pren-item{
      background:var(--card);
      border-radius:12px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .pren-item h4{
      margin:0 0 8px;
      color:var(--brown);
    }

    .danger{
      background:#b9382f !important;
      color:#fff !important;
      border:none !important;
    }

    .small-btn{
      padding:10px 12px;
      min-width:auto;
    }

    .zoom-controls{
      display:flex;
      gap:8px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .zoom-controls .button{
      min-width:auto;
      padding:8px 12px;
    }

    .seat-popup{
      position:absolute;
      background:#fff;
      border-radius:12px;
      padding:12px;
      box-shadow:0 10px 25px rgba(0,0,0,.22);
      width:250px;
      z-index:2000;
      border:1px solid #ead6b1;
    }

    .seat-popup h4{
      margin:0 0 8px;
      color:var(--brown);
    }

    .seat-popup input,
    .seat-popup textarea{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:1px solid #d6b98a;
      margin-top:6px;
      font-family:inherit;
    }

    .seat-popup .popup-actions{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    @media (max-width: 900px){
      .booking-wrap{
        grid-template-columns:1fr;
      }

      .room-layout{
        min-width:760px;
      }

      .viewport{
        min-height:520px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <img src="../img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="../img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="serate.html">Serate</a>
      <a href="settimana.html">Programmazione settimana</a>
      <a href="inventario.html">Inventario</a>
      <a href="../index.html">Sito pubblico</a>
      <a href="#" id="logoutBtn">Esci</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <h2>Gestione serata</h2>
      <div id="eventDetail"></div>
    </section>

    <section class="section">
      <h2>Gestisci posti</h2>

      <div class="seat-legend">
        <div class="legend-item"><span class="legend-dot dot-free"></span> Disponibile</div>
        <div class="legend-item"><span class="legend-dot dot-selected"></span> Selezionato</div>
        <div class="legend-item"><span class="legend-dot dot-taken"></span> Occupato</div>
      </div>

      <div class="booking-wrap">
        <div class="table-layout">
          <div class="zoom-controls">
            <button id="zoomInBtn" type="button" class="button secondary">+</button>
            <button id="zoomOutBtn" type="button" class="button secondary">−</button>
            <button id="zoomResetBtn" type="button" class="button secondary">Reset</button>
          </div>

          <div id="viewport" class="viewport">
            <div id="zoomSurface" class="zoom-surface">
              <div id="roomLayout" class="room-layout"></div>
              <div id="seatPopup" class="seat-popup" style="display:none;"></div>
            </div>
          </div>
        </div>

        <div class="card form-box">
          <h3 class="event-title">Nuova prenotazione</h3>
          <p id="salaInfoText" class="note"></p>

          <div id="summaryBox" class="summary-box"></div>
          <div id="quotaBox" class="summary-box"></div>

          <input id="nomeInput" type="text" placeholder="Nome e cognome">
          <input id="telefonoInput" type="text" placeholder="Telefono (opzionale)">
          <input id="emailInput" type="email" placeholder="Email (opzionale)">
          <textarea id="allergieInput" placeholder="Allergie e intolleranze (opzionale)"></textarea>
          <textarea id="richiesteInput" placeholder="Richieste (opzionale)"></textarea>

          <div class="selected-box">
            <strong>Posti selezionati:</strong>
            <span id="selectedSeatsText">nessuno</span>
          </div>

          <div class="selected-box">
            <strong>Totale posti:</strong>
            <span id="selectedCountText">0</span>
          </div>

          <button id="bookBtn" class="button">Salva prenotazione</button>
          <p id="bookingMsg" class="note"></p>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Prenotazioni serata</h2>
      <div id="prenotazioniList" class="pren-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/manager-guard.js"></script>
  <script src="../js/site.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const serataId = params.get("id");

    let currentEvent = null;
    let occupiedSeats = [];
    let selectedSeats = [];
    let saleConfig = {};
    let prenotazioniData = [];
    let seatBookingMap = {};

    const INTERNAL_EXTRA = ["D1","D2","D3","D4","D5","D6","D7","S1","D8","S2"];

    const viewport = document.getElementById("viewport");
    const zoomSurface = document.getElementById("zoomSurface");
    const seatPopup = document.getElementById("seatPopup");

    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let lastTouchDistance = null;
    let pinchStartScale = 1;

    seatPopup.addEventListener("pointerdown", (e) => e.stopPropagation());
    seatPopup.addEventListener("click", (e) => e.stopPropagation());

    function applyTransform() {
      zoomSurface.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function resetTransform() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function clampScale(nextScale) {
      return Math.min(2.5, Math.max(0.6, nextScale));
    }

    document.getElementById("zoomInBtn").addEventListener("click", () => {
      scale = clampScale(scale + 0.15);
      applyTransform();
    });

    document.getElementById("zoomOutBtn").addEventListener("click", () => {
      scale = clampScale(scale - 0.15);
      applyTransform();
    });

    document.getElementById("zoomResetBtn").addEventListener("click", resetTransform);

    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      scale = clampScale(scale + delta);
      applyTransform();
    }, { passive: false });

    viewport.addEventListener("pointerdown", (e) => {
      const seatBtn = e.target.closest(".seat");
      const insidePopup = seatPopup.contains(e.target);
      if (seatBtn || insidePopup) return;

      isDragging = true;
      dragStartX = e.clientX - translateX;
      dragStartY = e.clientY - translateY;
      viewport.setPointerCapture(e.pointerId);
      hideSeatPopup();
    });

    viewport.addEventListener("pointermove", (e) => {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      applyTransform();
    });

    function stopDrag() {
      isDragging = false;
    }

    viewport.addEventListener("pointerup", stopDrag);
    viewport.addEventListener("pointercancel", stopDrag);

    viewport.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDistance = Math.hypot(dx, dy);
        pinchStartScale = scale;
      }
    }, { passive: true });

    viewport.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && lastTouchDistance) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const ratio = dist / lastTouchDistance;
        scale = clampScale(pinchStartScale * ratio);
        applyTransform();
      }
    }, { passive: true });

    viewport.addEventListener("touchend", () => {
      lastTouchDistance = null;
    });

    document.addEventListener("click", (e) => {
      const clickedInsidePopup = seatPopup.contains(e.target);
      const clickedSeat = e.target.closest(".seat");
      if (!clickedInsidePopup && !clickedSeat) {
        hideSeatPopup();
      }
    });

    function getSeatMeta(id) {
      if (/^\d+$/.test(id)) return { sala: "interna", tipo: "tavolo" };
      if (/^D\d+$/.test(id) || /^S\d+$/.test(id)) return { sala: "interna", tipo: "divano" };
      if (/^E\d+$/.test(id)) return { sala: "esterna", tipo: "tavolo" };
      if (/^M\d+$/.test(id)) return { sala: "esterna", tipo: "muretto" };
      if (/^G\d+$/.test(id)) return { sala: "giardino", tipo: "tavolo" };
      if (/^P\d+$/.test(id)) return { sala: "giardino", tipo: "poltrona" };
      return { sala: "", tipo: "" };
    }

    function seatCategoryRank(id){
      if (/^\d+$/.test(id)) return 1;
      if (/^E\d+$/.test(id)) return 2;
      if (/^G\d+$/.test(id)) return 3;
      if (/^D\d+$/.test(id)) return 4;
      if (/^S\d+$/.test(id)) return 5;
      if (/^M\d+$/.test(id)) return 6;
      if (/^P\d+$/.test(id)) return 7;
      return 99;
    }

    function seatNumber(id){
      const match = String(id).match(/(\d+)$/);
      return match ? Number(match[1]) : 0;
    }

    function seatSort(a, b) {
      const ra = seatCategoryRank(a);
      const rb = seatCategoryRank(b);
      if (ra !== rb) return ra - rb;
      return seatNumber(a) - seatNumber(b);
    }

    function formatCurrency(value){
      return `€ ${Number(value || 0).toFixed(2)}`;
    }

    function countSeatsForPayment(seats){
      let tavolo = 0;
      let dopocena = 0;

      seats.forEach(id => {
        if (getSeatMeta(id).tipo === "tavolo") tavolo++;
        else dopocena++;
      });

      return { tavolo, dopocena };
    }

    function calculateBookingAmounts(seats){
      const { tavolo, dopocena } = countSeatsForPayment(seats);
      const quotaTavolo = Number(currentEvent?.quota_tavolo || 0);
      const quotaDopocena = Number(currentEvent?.quota_dopocena || 0);
      const totale = (tavolo * quotaTavolo) + (dopocena * quotaDopocena);
      return { tavolo, dopocena, totale };
    }

    function updateSelectedInfo(){
      const ordered = [...selectedSeats].sort(seatSort);
      document.getElementById("selectedSeatsText").textContent =
        ordered.length ? ordered.join(", ") : "nessuno";
      document.getElementById("selectedCountText").textContent = ordered.length;
      updateQuotaInfo(ordered);
    }

    function updateQuotaInfo(seats = []){
      const box = document.getElementById("quotaBox");
      const { tavolo, dopocena, totale } = calculateBookingAmounts(seats);

      box.innerHTML = `
        <h4>Quota prenotazione</h4>
        <div><strong>Quota tavolo:</strong> ${formatCurrency(currentEvent?.quota_tavolo || 0)}</div>
        <div><strong>Quota dopocena:</strong> ${formatCurrency(currentEvent?.quota_dopocena || 0)}</div>
        <div style="margin-top:8px;"><strong>Posti tavolo selezionati:</strong> ${tavolo}</div>
        <div><strong>Posti dopocena selezionati:</strong> ${dopocena}</div>
        <div style="margin-top:8px;"><strong>Totale da pagare:</strong> ${formatCurrency(totale)}</div>
      `;
    }

    function createSeatButton(id){
      const booking = seatBookingMap[id] || null;
      const isTaken = !!booking;

      const btn = document.createElement("button");
      btn.className = "seat " + (isTaken ? "taken" : "free");
      btn.textContent = id;
      btn.type = "button";

      if (isTaken) {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          showSeatPopup(e, booking, id);
        });
      } else {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          if (selectedSeats.includes(id)) {
            selectedSeats = selectedSeats.filter(x => x !== id);
            btn.classList.remove("selected");
            btn.classList.add("free");
          } else {
            selectedSeats.push(id);
            btn.classList.remove("free");
            btn.classList.add("selected");
          }
          hideSeatPopup();
          updateSelectedInfo();
        });
      }

      return btn;
    }

    function buildTableSeatMap(totalSeats, prefix = "") {
      const longSide = (totalSeats - 2) / 2;
      const top = [];
      const bottom = [];

      for (let i = 0; i < longSide; i++) top.push(prefix + String(2 + i));
      for (let i = 0; i < longSide; i++) bottom.push(prefix + String(2 + longSide + i));

      return {
        left: prefix + "1",
        right: prefix + String(totalSeats),
        top,
        bottom
      };
    }

    function buildSimpleTableBlock(totalSeats, prefix = "") {
      const tableMap = buildTableSeatMap(totalSeats, prefix);
      const seatWidth = 52;
      const tableWidth = Math.max(220, tableMap.top.length * seatWidth);

      const wrap = document.createElement("div");
      wrap.className = "simple-table-wrap";

      const top = document.createElement("div");
      top.className = "top-seats";
      top.style.gridColumn = "2";
      top.style.gridRow = "1";
      tableMap.top.forEach(id => top.appendChild(createSeatButton(id)));

      const left = document.createElement("div");
      left.className = "left-seat";
      left.style.gridColumn = "1";
      left.style.gridRow = "2";
      left.appendChild(createSeatButton(tableMap.left));

      const center = document.createElement("div");
      center.className = "rect-table";
      center.style.gridColumn = "2";
      center.style.gridRow = "2";
      center.style.setProperty("--table-width", `${tableWidth}px`);

      const right = document.createElement("div");
      right.className = "right-seat";
      right.style.gridColumn = "3";
      right.style.gridRow = "2";
      right.appendChild(createSeatButton(tableMap.right));

      const bottom = document.createElement("div");
      bottom.className = "bottom-seats";
      bottom.style.gridColumn = "2";
      bottom.style.gridRow = "3";
      tableMap.bottom.forEach(id => bottom.appendChild(createSeatButton(id)));

      wrap.appendChild(top);
      wrap.appendChild(left);
      wrap.appendChild(center);
      wrap.appendChild(right);
      wrap.appendChild(bottom);

      return wrap;
    }

    function buildGardenBlock(totalSeats, extraSeats) {
      const wrap = document.createElement("div");
      wrap.className = "plan-block";

      const garden = document.createElement("div");
      garden.className = "garden-wrap";

      const tableWrap = document.createElement("div");
      tableWrap.className = "garden-table-wrap";

      const sideSeatsCount = Math.max(4, totalSeats - 2);
      const perSide = Math.ceil(sideSeatsCount / 2);

      const tableHeight = 140 + Math.max(0, perSide - 2) * 44;
      const midHeight = 70 + Math.max(0, perSide - 2) * 22;

      tableWrap.style.setProperty("--garden-height", `${tableHeight}px`);
      tableWrap.style.setProperty("--garden-mid", `${midHeight}px`);

      const gIds = [];
      for (let i = 1; i <= totalSeats; i++) gIds.push(`G${i}`);

      const topId = gIds[0] || null;
      const bottomId = gIds[1] || null;

      const sideIds = gIds.slice(2);
      const leftIds = sideIds.slice(0, Math.ceil(sideIds.length / 2));
      const rightIds = sideIds.slice(Math.ceil(sideIds.length / 2));

      const gTop = topId ? createSeatButton(topId) : document.createElement("div");
      gTop.classList.add("g-top");
      if (!topId) gTop.style.visibility = "hidden";

      const gBottom = bottomId ? createSeatButton(bottomId) : document.createElement("div");
      gBottom.classList.add("g-bottom");
      if (!bottomId) gBottom.style.visibility = "hidden";

      const leftCol = document.createElement("div");
      leftCol.className = "g-left-col";
      leftIds.forEach(id => leftCol.appendChild(createSeatButton(id)));

      const rightCol = document.createElement("div");
      rightCol.className = "g-right-col";
      rightIds.forEach(id => rightCol.appendChild(createSeatButton(id)));

      const table = document.createElement("div");
      table.className = "garden-table";

      tableWrap.appendChild(gTop);
      tableWrap.appendChild(gBottom);
      tableWrap.appendChild(leftCol);
      tableWrap.appendChild(rightCol);
      tableWrap.appendChild(table);

      const poltrone = document.createElement("div");
      poltrone.className = "garden-right-poltrone";
      for (let i = 1; i <= extraSeats; i++) {
        poltrone.appendChild(createSeatButton(`P${i}`));
      }

      garden.appendChild(tableWrap);
      garden.appendChild(poltrone);

      wrap.appendChild(garden);
      return wrap;
    }

    function buildExternalBlock(totalSeats, extraSeats) {
      const wrap = document.createElement("div");
      wrap.className = "plan-block";

      const external = document.createElement("div");
      external.className = "external-wrap";

      const topExtras = document.createElement("div");
      topExtras.className = "seat-row";
      for (let i = 1; i <= extraSeats; i++) {
        topExtras.appendChild(createSeatButton(`M${i}`));
      }

      external.appendChild(topExtras);
      external.appendChild(buildSimpleTableBlock(totalSeats, "E"));

      wrap.appendChild(external);
      return wrap;
    }

    function buildInternalBlock(totalSeats) {
      const container = document.createElement("div");
      container.className = "plan-block";

      const internal = document.createElement("div");
      internal.className = "internal-wrap";

      const topDivans = document.createElement("div");
      topDivans.className = "top-divans";
      const topDivanRow = document.createElement("div");
      topDivanRow.className = "seat-row";
      ["D1","D2","D3","D4","D5"].forEach(id => topDivanRow.appendChild(createSeatButton(id)));
      topDivans.appendChild(topDivanRow);

      const tableWrap = buildSimpleTableBlock(totalSeats, "");
      tableWrap.style.gridColumn = "2";
      tableWrap.style.gridRow = "2 / span 2";

      const rightSide = document.createElement("div");
      rightSide.className = "right-side";
      const rightCol = document.createElement("div");
      rightCol.className = "seat-col";
      ["D6","D7","S1"].forEach(id => rightCol.appendChild(createSeatButton(id)));
      rightSide.appendChild(rightCol);

      const bottomDivans = document.createElement("div");
      bottomDivans.className = "bottom-divans";
      const bottomRow = document.createElement("div");
      bottomRow.className = "seat-row";
      ["D8","S2"].forEach(id => bottomRow.appendChild(createSeatButton(id)));
      bottomDivans.appendChild(bottomRow);

      internal.appendChild(topDivans);
      internal.appendChild(tableWrap);
      internal.appendChild(rightSide);
      internal.appendChild(bottomDivans);

      container.appendChild(internal);
      return container;
    }

    function renderRoom() {
      const room = document.getElementById("roomLayout");
      room.innerHTML = "";

      if (saleConfig.giardino?.attiva) {
        room.appendChild(buildGardenBlock(saleConfig.giardino.posti_totali, saleConfig.giardino.posti_extra));
      }

      if (saleConfig.esterna?.attiva) {
        room.appendChild(buildExternalBlock(saleConfig.esterna.posti_totali, saleConfig.esterna.posti_extra));
      }

      if (saleConfig.interna?.attiva) {
        room.appendChild(buildInternalBlock(saleConfig.interna.posti_totali));
      }
    }

    function getAllSeatIds() {
      let ids = [];

      if (saleConfig.interna?.attiva) {
        for (let i = 1; i <= saleConfig.interna.posti_totali; i++) ids.push(String(i));
        ids = ids.concat(INTERNAL_EXTRA);
      }

      if (saleConfig.esterna?.attiva) {
        for (let i = 1; i <= saleConfig.esterna.posti_totali; i++) ids.push(`E${i}`);
        for (let i = 1; i <= saleConfig.esterna.posti_extra; i++) ids.push(`M${i}`);
      }

      if (saleConfig.giardino?.attiva) {
        for (let i = 1; i <= saleConfig.giardino.posti_totali; i++) ids.push(`G${i}`);
        for (let i = 1; i <= saleConfig.giardino.posti_extra; i++) ids.push(`P${i}`);
      }

      return ids;
    }

    function updateAvailabilityInfo(){
      const total = getAllSeatIds().length;
      const occupied = occupiedSeats.length;
      const available = total - occupied;

      const tavoloTot =
        (saleConfig.interna?.attiva ? saleConfig.interna.posti_totali : 0) +
        (saleConfig.esterna?.attiva ? saleConfig.esterna.posti_totali : 0) +
        (saleConfig.giardino?.attiva ? saleConfig.giardino.posti_totali : 0);

      const dopocenaTot =
        (saleConfig.interna?.attiva ? INTERNAL_EXTRA.length : 0) +
        (saleConfig.esterna?.attiva ? saleConfig.esterna.posti_extra : 0) +
        (saleConfig.giardino?.attiva ? saleConfig.giardino.posti_extra : 0);

      const occupiedCounts = countSeatsForPayment(occupiedSeats);
      const tavoloOcc = occupiedCounts.tavolo;
      const dopocenaOcc = occupiedCounts.dopocena;

      document.getElementById("summaryBox").innerHTML = `
        <h4>Riepilogo coperti</h4>
        <div><strong>Posti disponibili:</strong> ${available} / ${total}</div>
        <div style="margin-top:6px;"><strong>Cena:</strong> ${tavoloOcc} / ${tavoloTot}</div>
        <div><strong>Dopocena:</strong> ${dopocenaOcc} / ${dopocenaTot}</div>
      `;
    }

    function setSalaInfoText() {
      const box = document.getElementById("salaInfoText");
      const names = [];

      if (saleConfig.interna?.attiva) names.push("all’interno");
      if (saleConfig.esterna?.attiva) names.push("all’esterno");
      if (saleConfig.giardino?.attiva) names.push("in giardino");

      if (names.length === 1) box.textContent = `La serata si svolgerà ${names[0]}.`;
      else if (names.length === 2) box.textContent = `La serata si svolgerà ${names[0]} e ${names[1]}.`;
      else if (names.length === 3) box.textContent = "La serata si svolgerà all’interno, all’esterno e in giardino.";
      else box.textContent = "";
    }

    function hideSeatPopup(){
      seatPopup.style.display = "none";
      seatPopup.innerHTML = "";
    }

    function popupPositionFromEvent(e){
      const rect = zoomSurface.getBoundingClientRect();
      const x = (e.clientX - rect.left) / scale;
      const y = (e.clientY - rect.top) / scale;

      seatPopup.style.left = `${x + 14}px`;
      seatPopup.style.top = `${y + 14}px`;
    }

    async function savePopupPayment(prenotazioneId){
      const input = document.getElementById(`popupPaid_${prenotazioneId}`);
      const importoPagato = Number(input.value || 0);

      const { error } = await supabaseClient
        .from("prenotazioni")
        .update({
          importo_pagato: importoPagato
        })
        .eq("id", prenotazioneId);

      if (error) {
        console.error(error);
        document.getElementById("bookingMsg").textContent = "Errore nel salvataggio pagamento.";
        return;
      }

      document.getElementById("bookingMsg").textContent = "Pagamento aggiornato.";
      hideSeatPopup();
      await loadPrenotazioniList();
      await loadEventAndSeats();
    }

    function showSeatPopup(e, pr, clickedSeat){
      e.stopPropagation();

      const seats = (pr.prenotazione_posti || []).map(p => String(p.posto_numero)).sort(seatSort);
      const amounts = calculateBookingAmounts(seats);
      const importoPagato = Number(pr.importo_pagato || 0);
      const saldo = Math.max(0, amounts.totale - importoPagato);

      seatPopup.innerHTML = `
        <h4>${pr.nome}</h4>
        <div><strong>Posto cliccato:</strong> ${clickedSeat}</div>
        <div><strong>Posti:</strong> ${seats.join(", ")}</div>
        <div><strong>Telefono:</strong> ${pr.telefono || "-"}</div>
        <div><strong>Email:</strong> ${pr.email || "-"}</div>
        <div><strong>Allergie/intolleranze:</strong> ${pr.allergie || "-"}</div>
        <div><strong>Richieste:</strong> ${pr.richieste || "-"}</div>
        <div style="margin-top:8px;"><strong>Totale dovuto:</strong> ${formatCurrency(amounts.totale)}</div>
        <div><strong>Importo pagato:</strong> ${formatCurrency(importoPagato)}</div>
        <div><strong>Saldo:</strong> ${formatCurrency(saldo)}</div>

        <label style="display:block;margin-top:10px;">
          <strong>Quanto ha pagato</strong>
          <input id="popupPaid_${pr.id}" type="number" min="0" step="0.01" value="${importoPagato}">
        </label>

        <div class="popup-actions">
          <button class="button secondary small-btn" type="button" onclick="savePopupPayment('${pr.id}')">Salva</button>
          <button class="button secondary small-btn" type="button" onclick="hideSeatPopup()">Chiudi</button>
        </div>
      `;

      popupPositionFromEvent(e);
      seatPopup.style.display = "block";
    }

    async function loadSaleConfig() {
      const { data, error } = await supabaseClient
        .from("serata_sale")
        .select("sala_codice, attiva, posti_totali, posti_extra")
        .eq("serata_id", serataId);

      if (error) {
        console.error(error);
        return false;
      }

      saleConfig = {};
      (data || []).forEach(row => {
        saleConfig[row.sala_codice] = {
          attiva: !!row.attiva,
          posti_totali: Number(row.posti_totali || 0),
          posti_extra: Number(row.posti_extra || 0)
        };
      });

      return true;
    }

    async function loadPrenotazioniList(){
      const box = document.getElementById("prenotazioniList");

      const { data, error } = await supabaseClient
        .from("prenotazioni")
        .select(`
          id,
          nome,
          telefono,
          email,
          allergie,
          richieste,
          creato_il,
          importo_pagato,
          prenotazione_posti (
            posto_numero,
            posto_tipo
          )
        `)
        .eq("serata_id", serataId)
        .order("creato_il", { ascending: false });

      if (error) {
        console.error(error);
        box.innerHTML = `<div class="note">Errore nel caricamento prenotazioni.</div>`;
        return;
      }

      prenotazioniData = data || [];
      seatBookingMap = {};
      occupiedSeats = [];

      prenotazioniData.forEach(pr => {
        const seats = (pr.prenotazione_posti || []).map(p => String(p.posto_numero));
        seats.forEach(seat => {
          seatBookingMap[seat] = pr;
          occupiedSeats.push(seat);
        });
      });

      occupiedSeats = occupiedSeats.sort(seatSort);

      if (!prenotazioniData.length) {
        box.innerHTML = `<div class="card note">Nessuna prenotazione presente.</div>`;
        renderRoom();
        updateAvailabilityInfo();
        return;
      }

      box.innerHTML = "";

      const sortedBookings = [...prenotazioniData].sort((a, b) => {
        const aSeats = (a.prenotazione_posti || []).map(p => String(p.posto_numero)).sort(seatSort);
        const bSeats = (b.prenotazione_posti || []).map(p => String(p.posto_numero)).sort(seatSort);

        if (!aSeats.length && !bSeats.length) return 0;
        if (!aSeats.length) return 1;
        if (!bSeats.length) return -1;

        return seatSort(aSeats[0], bSeats[0]);
      });

      sortedBookings.forEach(pr => {
        const posti = (pr.prenotazione_posti || [])
          .map(p => String(p.posto_numero))
          .sort(seatSort);

        const amounts = calculateBookingAmounts(posti);
        const importoPagato = Number(pr.importo_pagato || 0);
        const saldo = Math.max(0, amounts.totale - importoPagato);

        const item = document.createElement("div");
        item.className = "pren-item";

        item.innerHTML = `
          <h4>${pr.nome}</h4>
          <p><strong>Posti:</strong> ${posti.join(", ")}</p>
          <p><strong>Telefono:</strong> ${pr.telefono || "-"}</p>
          <p><strong>Email:</strong> ${pr.email || "-"}</p>
          <p><strong>Totale dovuto:</strong> ${formatCurrency(amounts.totale)}</p>
          <p><strong>Importo pagato:</strong> ${formatCurrency(importoPagato)}</p>
          <p><strong>Saldo:</strong> ${formatCurrency(saldo)}</p>

          <div class="button-row">
            <button class="button danger delete-pren-btn" type="button">Elimina prenotazione</button>
          </div>
        `;

        item.querySelector(".delete-pren-btn").addEventListener("click", async () => {
          const conferma = confirm(`Eliminare la prenotazione di ${pr.nome}?`);
          if (!conferma) return;

          const { error: delError } = await supabaseClient
            .from("prenotazioni")
            .delete()
            .eq("id", pr.id);

          if (delError) {
            console.error(delError);
            document.getElementById("bookingMsg").textContent = "Errore nell'eliminazione della prenotazione.";
            return;
          }

          document.getElementById("bookingMsg").textContent = "Prenotazione eliminata.";
          hideSeatPopup();
          await loadPrenotazioniList();
          renderRoom();
          updateAvailabilityInfo();
        });

        box.appendChild(item);
      });

      renderRoom();
      updateAvailabilityInfo();
    }

    async function loadEventAndSeats(){
      if (!serataId) {
        document.getElementById("eventDetail").innerHTML = `<div class="card note">Serata non trovata.</div>`;
        return;
      }

      const { data: eventData, error: eventError } = await supabaseClient
        .from("serate")
        .select("*")
        .eq("id", serataId)
        .single();

      if (eventError || !eventData) {
        console.error(eventError);
        document.getElementById("eventDetail").innerHTML = `<div class="card note">Errore nel caricamento della serata.</div>`;
        return;
      }

      currentEvent = eventData;
      renderEventCard(document.getElementById("eventDetail"), currentEvent);

      const salesOk = await loadSaleConfig();
      if (!salesOk) {
        document.getElementById("bookingMsg").textContent = "Errore nel caricamento sale.";
        return;
      }

      setSalaInfoText();
      updateSelectedInfo();
    }

    async function saveBooking(){
      const nome = document.getElementById("nomeInput").value.trim();
      const telefono = document.getElementById("telefonoInput").value.trim();
      const email = document.getElementById("emailInput").value.trim();
      const allergie = document.getElementById("allergieInput").value.trim();
      const richieste = document.getElementById("richiesteInput").value.trim();
      const msg = document.getElementById("bookingMsg");

      msg.textContent = "";

      if (!nome) {
        msg.textContent = "Inserisci almeno il nome.";
        return;
      }

      if (!selectedSeats.length) {
        msg.textContent = "Seleziona almeno un posto.";
        return;
      }

      const overlap = selectedSeats.some(seat => occupiedSeats.includes(seat));
      if (overlap) {
        msg.textContent = "Uno dei posti selezionati non è più disponibile.";
        await loadPrenotazioniList();
        selectedSeats = [];
        updateSelectedInfo();
        return;
      }

      const bookedSeats = [...selectedSeats].sort(seatSort);

      const { data: prenotazione, error: prenError } = await supabaseClient
        .from("prenotazioni")
        .insert([{
          serata_id: serataId,
          nome,
          telefono: telefono || null,
          email: email || null,
          allergie: allergie || null,
          richieste: richieste || null,
          importo_pagato: 0
        }])
        .select()
        .single();

      if (prenError || !prenotazione) {
        console.error(prenError);
        msg.textContent = "Errore nel salvataggio prenotazione.";
        return;
      }

      const postiRows = bookedSeats.map(seatId => ({
        prenotazione_id: prenotazione.id,
        serata_id: serataId,
        posto_numero: seatId,
        posto_tipo: getSeatMeta(seatId).tipo
      }));

      const { error: postiError } = await supabaseClient
        .from("prenotazione_posti")
        .insert(postiRows);

      if (postiError) {
        console.error(postiError);
        msg.textContent = "Errore nel salvataggio posti.";
        return;
      }

      const amounts = calculateBookingAmounts(bookedSeats);
      msg.textContent = `Prenotazione salvata. Totale dovuto: ${formatCurrency(amounts.totale)}`;

      document.getElementById("nomeInput").value = "";
      document.getElementById("telefonoInput").value = "";
      document.getElementById("emailInput").value = "";
      document.getElementById("allergieInput").value = "";
      document.getElementById("richiesteInput").value = "";
      selectedSeats = [];
      hideSeatPopup();

      await loadPrenotazioniList();
      updateSelectedInfo();
    }

    document.getElementById("logoutBtn").addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("manager_auth_ok");
      localStorage.removeItem("manager_auth_mode");
      window.location.href = "login.html";
    });

    document.addEventListener("DOMContentLoaded", async () => {
      setupMenu();
      await loadEventAndSeats();
      await loadPrenotazioniList();
      document.getElementById("bookBtn").addEventListener("click", saveBooking);
    });
  </script>
</body>
</html>
