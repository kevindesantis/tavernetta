<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Manager Evento</title><link rel="icon" type="image/png" href="../img/logo.png"><link rel="stylesheet" href="../css/style.css"><style>
.event-shell{display:grid;grid-template-columns:420px 1fr;gap:20px;align-items:start}.left-panel,.right-panel{display:flex;flex-direction:column;gap:16px;min-width:0}.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.summary-mini{background:#fffaf2;border:1px solid #ead6b1;border-radius:12px;padding:12px}.summary-mini .k{font-size:13px;opacity:.8}.summary-mini .v{font-size:24px;font-weight:700;color:var(--brown)}.compact-list{display:flex;flex-direction:column;gap:8px;max-height:70vh;overflow:auto}.compact-item{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:10px 12px;cursor:pointer;border:1px solid transparent}.compact-item:hover{border-color:#d6b98a}.compact-item.active{border-color:#b7834b;background:#fffaf2}.compact-head{display:flex;justify-content:space-between;gap:10px;font-size:14px;font-weight:700;color:var(--brown)}.compact-sub{margin-top:4px;font-size:12px;opacity:.8}.detail-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.detail-box{background:#fffaf2;border:1px solid #ead6b1;border-radius:12px;padding:10px;font-size:14px;word-break:break-word}.detail-box strong{display:block;margin-bottom:4px;color:var(--brown)}.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.field{margin-top:10px}.field label{display:block;margin-bottom:6px;font-weight:700;color:var(--brown)}.field input,.field textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #d6b98a;font-family:inherit;font-size:15px;background:#fff}.field textarea{min-height:78px;resize:vertical}
.table-layout{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);overflow:hidden;position:relative}.seat-legend{display:flex;gap:14px;flex-wrap:wrap;margin:4px 0 14px;font-size:14px}.legend-item{display:flex;align-items:center;gap:8px}.legend-dot{width:16px;height:16px;border-radius:50%;display:inline-block}.dot-free{background:#2e9d50}.dot-taken{background:#c43b2f}.dot-selected{background:#d4a017}.zoom-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.zoom-controls .button{min-width:auto;padding:8px 12px}.viewport{width:100%;min-height:700px;overflow:hidden;position:relative;touch-action:none;border-radius:12px;background:rgba(255,255,255,.25)}.zoom-surface{transform-origin:0 0;will-change:transform;width:max-content;min-width:100%;padding:10px;position:relative}.room-layout{min-width:860px;display:flex;flex-direction:column;gap:28px;align-items:center}.plan-block{width:100%;display:flex;justify-content:center}.seat{min-width:42px;height:42px;padding:0 10px;border-radius:50px;border:0;color:#fff;font-weight:bold;cursor:pointer;transition:.2s;font-size:14px}.seat.free{background:#2e9d50}.seat.taken{background:#c43b2f}.seat.selected{background:#d4a017;color:#111}.seat-row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:nowrap}.simple-table-wrap{width:fit-content;display:grid;grid-template-columns:48px auto 48px;grid-template-rows:auto 96px auto;gap:8px;align-items:center;justify-items:center}.top-seats,.bottom-seats{display:flex;gap:10px;width:auto;justify-content:center;flex-wrap:nowrap}.left-seat,.right-seat{display:flex;align-items:center;justify-content:center}.rect-table{width:var(--table-width,340px);background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);border-radius:22px;height:96px;box-shadow:inset 0 0 0 4px rgba(255,255,255,.14),0 8px 20px rgba(0,0,0,.12)}
.internal-wrap{width:100%;display:grid;grid-template-columns:auto 1fr auto;grid-template-rows:auto auto auto auto;column-gap:16px;row-gap:14px;align-items:center;justify-items:center}.top-divans{grid-column:2;grid-row:1;width:100%;display:flex;justify-content:flex-end;padding-right:70px}.right-side{grid-column:3;grid-row:2 / span 2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}.right-side .seat-col{display:flex;flex-direction:column;gap:10px;align-items:center}.bottom-divans{grid-column:2;grid-row:4;width:100%;display:flex;justify-content:flex-end;padding-right:18px}.external-wrap{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%}
.garden-wrap{display:grid;grid-template-columns:auto auto;column-gap:18px;align-items:center;justify-items:center;width:fit-content}.garden-table-wrap{display:grid;grid-template-columns:56px 96px 56px;grid-template-rows:auto auto var(--garden-mid,120px) auto auto;column-gap:14px;row-gap:10px;align-items:center;justify-items:center;width:fit-content}.garden-table{grid-column:2;grid-row:2 / span 3;width:96px;height:var(--garden-height,220px);background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);border-radius:22px;box-shadow:inset 0 0 0 4px rgba(255,255,255,.14),0 8px 20px rgba(0,0,0,.12)}.g-top{grid-column:2;grid-row:1}.g-bottom{grid-column:2;grid-row:5}.g-left-col{grid-column:1;grid-row:2 / span 3;display:flex;flex-direction:column;justify-content:space-between;align-items:center;height:var(--garden-height,220px)}.g-right-col{grid-column:3;grid-row:2 / span 3;display:flex;flex-direction:column;justify-content:space-between;align-items:center;height:var(--garden-height,220px)}.garden-right-poltrone{display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-width:56px}
.seat-popup{position:absolute;background:#fff;border-radius:12px;padding:12px;box-shadow:0 10px 25px rgba(0,0,0,.22);width:260px;z-index:2000;border:1px solid #ead6b1}.seat-popup h4{margin:0 0 8px;color:var(--brown)}.seat-popup input{width:100%;padding:8px;border-radius:8px;border:1px solid #d6b98a;margin-top:6px;font-family:inherit}.seat-popup .popup-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.danger{background:#b9382f!important;color:#fff!important;border:none!important}.mini-note{font-size:13px;opacity:.8}
@media (max-width:1100px){.event-shell{grid-template-columns:1fr}.compact-list{max-height:none}.viewport{min-height:540px}.room-layout{min-width:760px}}
</style></head><body>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/supabase-client.js"></script><script src="../js/manager-guard.js"></script><script src="../js/site.js"></script>
<script>
const params=new URLSearchParams(location.search); const serataId=params.get("id");
let currentEvent=null, occupiedSeats=[], selectedSeats=[], saleConfig={}, prenotazioniData=[], seatBookingMap={}, openedBookingId=null;
const INTERNAL_EXTRA=["D1","D2","D3","D4","D5","D6","D7","S1","D8","S2"];
const viewport=document.getElementById("viewport"), zoomSurface=document.getElementById("zoomSurface"), seatPopup=document.getElementById("seatPopup");
let scale=1, translateX=0, translateY=0, isDragging=false, dragStartX=0, dragStartY=0, lastTouchDistance=null, pinchStartScale=1;
seatPopup.addEventListener("pointerdown", e=>e.stopPropagation()); seatPopup.addEventListener("click", e=>e.stopPropagation());
function applyTransform(){zoomSurface.style.transform=`translate(${translateX}px, ${translateY}px) scale(${scale})`} function resetTransform(){scale=1; translateX=0; translateY=0; applyTransform()} function clampScale(v){return Math.min(2.5,Math.max(0.6,v))}
zoomInBtn.addEventListener("click",()=>{scale=clampScale(scale+.15); applyTransform()}); zoomOutBtn.addEventListener("click",()=>{scale=clampScale(scale-.15); applyTransform()}); zoomResetBtn.addEventListener("click", resetTransform);
viewport.addEventListener("wheel",e=>{e.preventDefault(); scale=clampScale(scale + (e.deltaY>0?-0.1:0.1)); applyTransform()},{passive:false});
viewport.addEventListener("pointerdown",e=>{const seatBtn=e.target.closest(".seat"), inside=seatPopup.contains(e.target); if(seatBtn||inside) return; isDragging=true; dragStartX=e.clientX-translateX; dragStartY=e.clientY-translateY; viewport.setPointerCapture(e.pointerId); hideSeatPopup()});
viewport.addEventListener("pointermove",e=>{if(!isDragging) return; translateX=e.clientX-dragStartX; translateY=e.clientY-dragStartY; applyTransform()}); viewport.addEventListener("pointerup",()=>isDragging=false); viewport.addEventListener("pointercancel",()=>isDragging=false);
viewport.addEventListener("touchstart",e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; lastTouchDistance=Math.hypot(dx,dy); pinchStartScale=scale}},{passive:true});
viewport.addEventListener("touchmove",e=>{if(e.touches.length===2&&lastTouchDistance){const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; const dist=Math.hypot(dx,dy); scale=clampScale(pinchStartScale*(dist/lastTouchDistance)); applyTransform()}},{passive:true}); viewport.addEventListener("touchend",()=>lastTouchDistance=null);
document.addEventListener("click",e=>{const clickedInside=seatPopup.contains(e.target), clickedSeat=e.target.closest(".seat"); if(!clickedInside && !clickedSeat) hideSeatPopup()});
function formatDateItalian(d){try{return new Date(d).toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}catch{return d}} function formatCurrency(v){return `€ ${Number(v||0).toFixed(2)}`}
function getSeatMeta(id){if(/^\d+$/.test(id)) return {sala:"interna", tipo:"tavolo"}; if(/^D\d+$/.test(id)||/^S\d+$/.test(id)) return {sala:"interna", tipo:"divano"}; if(/^E\d+$/.test(id)) return {sala:"esterna", tipo:"tavolo"}; if(/^M\d+$/.test(id)) return {sala:"esterna", tipo:"muretto"}; if(/^G\d+$/.test(id)) return {sala:"giardino", tipo:"tavolo"}; if(/^P\d+$/.test(id)) return {sala:"giardino", tipo:"poltrona"}; return {sala:"", tipo:""}}
function seatCategoryRank(id){if(/^\d+$/.test(id)) return 1; if(/^E\d+$/.test(id)) return 2; if(/^G\d+$/.test(id)) return 3; if(/^D\d+$/.test(id)) return 4; if(/^S\d+$/.test(id)) return 5; if(/^M\d+$/.test(id)) return 6; if(/^P\d+$/.test(id)) return 7; return 99}
function seatNumber(id){const m=String(id).match(/(\d+)$/); return m?Number(m[1]):0}
function seatSort(a,b){const ra=seatCategoryRank(a), rb=seatCategoryRank(b); if(ra!==rb) return ra-rb; return seatNumber(a)-seatNumber(b)}
function countSeatsForPayment(seats){let tavolo=0,dopocena=0; seats.forEach(id=>getSeatMeta(id).tipo==='tavolo'?tavolo++:dopocena++); return {tavolo,dopocena}}
function calculateBookingAmounts(seats){const {tavolo,dopocena}=countSeatsForPayment(seats); const qt=Number(currentEvent?.quota_tavolo||0), qd=Number(currentEvent?.quota_dopocena||0); return {tavolo,dopocena,totale:tavolo*qt+dopocena*qd}}
function getBookingBySeat(seatId){return seatBookingMap[String(seatId)]||null}
function shortLabelFromName(fullName){const parts=String(fullName||"").trim().split(/\s+/).filter(Boolean); if(!parts.length) return ""; if(parts.length===1){const n=parts[0]; return n.length<=6?n:n.slice(0,2).toUpperCase()} const first=parts[0], last=parts[parts.length-1]; if(first.length<=6) return first; return `${first[0]||""}${last[0]||""}`.toUpperCase()}
function updateSelectedInfo(){const ordered=[...selectedSeats].sort(seatSort); selectedSeatsText.textContent=ordered.length?ordered.join(", "):"nessuno"; selectedCountText.textContent=ordered.length; updateQuotaInfo(ordered)}
function updateQuotaInfo(seats=[]){const {tavolo,dopocena,totale}=calculateBookingAmounts(seats); quotaBox.innerHTML=`<h4>Quota prenotazione</h4><div><strong>Quota tavolo:</strong> ${formatCurrency(currentEvent?.quota_tavolo||0)}</div><div><strong>Quota dopocena:</strong> ${formatCurrency(currentEvent?.quota_dopocena||0)}</div><div style='margin-top:8px;'><strong>Posti tavolo selezionati:</strong> ${tavolo}</div><div><strong>Posti dopocena selezionati:</strong> ${dopocena}</div><div style='margin-top:8px;'><strong>Totale da pagare:</strong> ${formatCurrency(totale)}</div>`}
function createSeatButton(id){const booking=getBookingBySeat(id), isTaken=!!booking; const btn=document.createElement("button"); btn.className="seat " + (isTaken?"taken":"free"); btn.textContent=id; btn.type="button"; if(isTaken){btn.addEventListener("click",e=>{e.stopPropagation(); showSeatPopup(e, booking, id); openBookingDetail(booking.id)})} else {btn.addEventListener("click",e=>{e.stopPropagation(); if(selectedSeats.includes(id)){selectedSeats=selectedSeats.filter(x=>x!==id); btn.classList.remove("selected"); btn.classList.add("free")} else {selectedSeats.push(id); btn.classList.remove("free"); btn.classList.add("selected")} hideSeatPopup(); updateSelectedInfo()})} return btn}
function buildTableSeatMap(totalSeats,prefix=""){const longSide=(totalSeats-2)/2, top=[], bottom=[]; for(let i=0;i<longSide;i++) top.push(prefix+String(2+i)); for(let i=0;i<longSide;i++) bottom.push(prefix+String(2+longSide+i)); return {left:prefix+"1", right:prefix+String(totalSeats), top,bottom}}
function buildSimpleTableBlock(totalSeats,prefix=""){const map=buildTableSeatMap(totalSeats,prefix), seatWidth=52, tableWidth=Math.max(220,map.top.length*seatWidth); const wrap=document.createElement("div"); wrap.className="simple-table-wrap"; const top=document.createElement("div"); top.className="top-seats"; top.style.gridColumn="2"; top.style.gridRow="1"; map.top.forEach(id=>top.appendChild(createSeatButton(id))); const left=document.createElement("div"); left.className="left-seat"; left.style.gridColumn="1"; left.style.gridRow="2"; left.appendChild(createSeatButton(map.left)); const center=document.createElement("div"); center.className="rect-table"; center.style.gridColumn="2"; center.style.gridRow="2"; center.style.setProperty("--table-width",`${tableWidth}px`); const right=document.createElement("div"); right.className="right-seat"; right.style.gridColumn="3"; right.style.gridRow="2"; right.appendChild(createSeatButton(map.right)); const bottom=document.createElement("div"); bottom.className="bottom-seats"; bottom.style.gridColumn="2"; bottom.style.gridRow="3"; map.bottom.forEach(id=>bottom.appendChild(createSeatButton(id))); wrap.append(top,left,center,right,bottom); return wrap}
function buildGardenBlock(totalSeats,extraSeats){const wrap=document.createElement("div"); wrap.className="plan-block"; const garden=document.createElement("div"); garden.className="garden-wrap"; const tableWrap=document.createElement("div"); tableWrap.className="garden-table-wrap"; const sideSeatsCount=Math.max(4,totalSeats-2), perSide=Math.ceil(sideSeatsCount/2), tableHeight=140+Math.max(0,perSide-2)*44, midHeight=70+Math.max(0,perSide-2)*22; tableWrap.style.setProperty("--garden-height",`${tableHeight}px`); tableWrap.style.setProperty("--garden-mid",`${midHeight}px`); const gIds=[]; for(let i=1;i<=totalSeats;i++) gIds.push(`G${i}`); const topId=gIds[0]||null, bottomId=gIds[1]||null, sideIds=gIds.slice(2), leftIds=sideIds.slice(0,Math.ceil(sideIds.length/2)), rightIds=sideIds.slice(Math.ceil(sideIds.length/2)); const gTop=topId?createSeatButton(topId):document.createElement("div"); gTop.classList.add("g-top"); if(!topId) gTop.style.visibility="hidden"; const gBottom=bottomId?createSeatButton(bottomId):document.createElement("div"); gBottom.classList.add("g-bottom"); if(!bottomId) gBottom.style.visibility="hidden"; const leftCol=document.createElement("div"); leftCol.className="g-left-col"; leftIds.forEach(id=>leftCol.appendChild(createSeatButton(id))); const rightCol=document.createElement("div"); rightCol.className="g-right-col"; rightIds.forEach(id=>rightCol.appendChild(createSeatButton(id))); const table=document.createElement("div"); table.className="garden-table"; tableWrap.append(gTop,gBottom,leftCol,rightCol,table); const pol=document.createElement("div"); pol.className="garden-right-poltrone"; for(let i=1;i<=extraSeats;i++) pol.appendChild(createSeatButton(`P${i}`)); garden.append(tableWrap, pol); wrap.appendChild(garden); return wrap}
function buildExternalBlock(totalSeats,extraSeats){const wrap=document.createElement("div"); wrap.className="plan-block"; const external=document.createElement("div"); external.className="external-wrap"; const topExtras=document.createElement("div"); topExtras.className="seat-row"; for(let i=1;i<=extraSeats;i++) topExtras.appendChild(createSeatButton(`M${i}`)); external.append(topExtras, buildSimpleTableBlock(totalSeats,"E")); wrap.appendChild(external); return wrap}
function buildInternalBlock(totalSeats){const c=document.createElement("div"); c.className="plan-block"; const internal=document.createElement("div"); internal.className="internal-wrap"; const topDivans=document.createElement("div"); topDivans.className="top-divans"; const topRow=document.createElement("div"); topRow.className="seat-row"; ["D1","D2","D3","D4","D5"].forEach(id=>topRow.appendChild(createSeatButton(id))); topDivans.appendChild(topRow); const tableWrap=buildSimpleTableBlock(totalSeats,""); tableWrap.style.gridColumn="2"; tableWrap.style.gridRow="2 / span 2"; const rightSide=document.createElement("div"); rightSide.className="right-side"; const rightCol=document.createElement("div"); rightCol.className="seat-col"; ["D6","D7","S1"].forEach(id=>rightCol.appendChild(createSeatButton(id))); rightSide.appendChild(rightCol); const bottomDivans=document.createElement("div"); bottomDivans.className="bottom-divans"; const bottomRow=document.createElement("div"); bottomRow.className="seat-row"; ["D8","S2"].forEach(id=>bottomRow.appendChild(createSeatButton(id))); bottomDivans.appendChild(bottomRow); internal.append(topDivans, tableWrap, rightSide, bottomDivans); c.appendChild(internal); return c}
function renderRoom(){roomLayout.innerHTML=""; if(saleConfig.giardino?.attiva) roomLayout.appendChild(buildGardenBlock(saleConfig.giardino.posti_totali, saleConfig.giardino.posti_extra)); if(saleConfig.esterna?.attiva) roomLayout.appendChild(buildExternalBlock(saleConfig.esterna.posti_totali, saleConfig.esterna.posti_extra)); if(saleConfig.interna?.attiva) roomLayout.appendChild(buildInternalBlock(saleConfig.interna.posti_totali))}
function getAllSeatIds(){let ids=[]; if(saleConfig.interna?.attiva){for(let i=1;i<=saleConfig.interna.posti_totali;i++) ids.push(String(i)); ids=ids.concat(INTERNAL_EXTRA)} if(saleConfig.esterna?.attiva){for(let i=1;i<=saleConfig.esterna.posti_totali;i++) ids.push(`E${i}`); for(let i=1;i<=saleConfig.esterna.posti_extra;i++) ids.push(`M${i}`)} if(saleConfig.giardino?.attiva){for(let i=1;i<=saleConfig.giardino.posti_totali;i++) ids.push(`G${i}`); for(let i=1;i<=saleConfig.giardino.posti_extra;i++) ids.push(`P${i}`)} return ids}
function setSalaInfoText(){const names=[]; if(saleConfig.interna?.attiva) names.push("all’interno"); if(saleConfig.esterna?.attiva) names.push("all’esterno"); if(saleConfig.giardino?.attiva) names.push("in giardino"); salaInfoText.textContent = names.length===1?`La serata si svolgerà ${names[0]}.`:names.length===2?`La serata si svolgerà ${names[0]} e ${names[1]}.`:names.length===3?"La serata si svolgerà all’interno, all’esterno e in giardino.":"";
}
function renderSummaryCards(){let totaleDovuto=0, totaleIncassato=0; prenotazioniData.forEach(pr=>{const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)); totaleDovuto += calculateBookingAmounts(seats).totale; totaleIncassato += Number(pr.importo_pagato||0)}); const saldo=Math.max(0,totaleDovuto - totaleIncassato); eventSummaryGrid.innerHTML=`<div class='summary-mini'><div class='k'>Totale dovuto</div><div class='v'>${formatCurrency(totaleDovuto)}</div></div><div class='summary-mini'><div class='k'>Totale incassato</div><div class='v'>${formatCurrency(totaleIncassato)}</div></div><div class='summary-mini'><div class='k'>Saldo residuo</div><div class='v'>${formatCurrency(saldo)}</div></div><div class='summary-mini'><div class='k'>Prenotazioni / posti</div><div class='v'>${prenotazioniData.length} / ${occupiedSeats.length}</div></div>`}
function hideSeatPopup(){seatPopup.style.display="none"; seatPopup.innerHTML=""}
function popupPositionFromEvent(e){const rect=zoomSurface.getBoundingClientRect(); const x=(e.clientX-rect.left)/scale; const y=(e.clientY-rect.top)/scale; seatPopup.style.left=`${x+14}px`; seatPopup.style.top=`${y+14}px`}
async function savePopupPayment(prenotazioneId){const input=document.getElementById(`popupPaid_${prenotazioneId}`); const value=Number(input.value||0); const {error}=await supabaseClient.from("prenotazioni").update({importo_pagato:value}).eq("id", prenotazioneId); if(error){bookingMsg.textContent="Errore nel salvataggio pagamento."; return;} bookingMsg.textContent="Pagamento aggiornato."; hideSeatPopup(); await loadPrenotazioniList(); await loadEventAndSeats(); openBookingDetail(prenotazioneId)}
function showSeatPopup(e, pr, clickedSeat){e.stopPropagation(); const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const amounts=calculateBookingAmounts(seats), paid=Number(pr.importo_pagato||0), saldo=Math.max(0, amounts.totale-paid); seatPopup.innerHTML=`<h4>${pr.nome}</h4><div><strong>Posto cliccato:</strong> ${clickedSeat}</div><div><strong>Posti:</strong> ${seats.join(", ")}</div><div><strong>Telefono:</strong> ${pr.telefono||"-"}</div><div><strong>Totale dovuto:</strong> ${formatCurrency(amounts.totale)}</div><div><strong>Importo pagato:</strong> ${formatCurrency(paid)}</div><div><strong>Saldo:</strong> ${formatCurrency(saldo)}</div><label style='display:block;margin-top:10px;'><strong>Quanto ha pagato</strong><input id='popupPaid_${pr.id}' type='number' min='0' step='0.01' value='${paid}'></label><div class='popup-actions'><button class='button secondary' onclick="savePopupPayment('${pr.id}')">Salva</button><button class='button secondary' onclick='hideSeatPopup()'>Chiudi</button></div>`; popupPositionFromEvent(e); seatPopup.style.display="block"}
function renderCompactPrenList(){compactPrenList.innerHTML=""; if(!prenotazioniData.length){compactPrenList.innerHTML='<div class="mini-note">Nessuna prenotazione presente.</div>'; return;} const sorted=[...prenotazioniData].sort((a,b)=>{const as=(a.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort), bs=(b.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); return !as.length?1:!bs.length?-1:seatSort(as[0],bs[0])}); sorted.forEach(pr=>{const posti=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const item=document.createElement("div"); item.className="compact-item"+(String(openedBookingId)===String(pr.id)?" active":""); item.innerHTML=`<div class='compact-head'><span>${pr.nome}</span><span>${posti.join(", ")}</span></div><div class='compact-sub'>clicca per aprire</div>`; item.addEventListener("click",()=>openBookingDetail(pr.id)); compactPrenList.appendChild(item)})}
function openBookingDetail(prenotazioneId){openedBookingId=prenotazioneId; renderCompactPrenList(); const pr=prenotazioniData.find(x=>String(x.id)===String(prenotazioneId)); const card=bookingDetailCard; if(!pr){closeBookingDetail(); return;} const posti=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort), amounts=calculateBookingAmounts(posti), paid=Number(pr.importo_pagato||0), saldo=Math.max(0,amounts.totale-paid); card.style.display="block"; card.innerHTML=`<h3>${pr.nome}</h3><div class='detail-grid'><div class='detail-box'><strong>Posti</strong>${posti.join(", ")||"-"}</div><div class='detail-box'><strong>Telefono</strong>${pr.telefono||"-"}</div><div class='detail-box'><strong>Email</strong>${pr.email||"-"}</div><div class='detail-box'><strong>Totale dovuto</strong>${formatCurrency(amounts.totale)}</div><div class='detail-box'><strong>Allergie / intolleranze</strong>${pr.allergie||"-"}</div><div class='detail-box'><strong>Richieste</strong>${pr.richieste||"-"}</div></div><div class='field'><label for='detailPaidInput'>Quanto ha pagato</label><input id='detailPaidInput' type='number' min='0' step='0.01' value='${paid}'></div><div class='summary-box'><div><strong>Importo pagato:</strong> ${formatCurrency(paid)}</div><div><strong>Saldo residuo:</strong> ${formatCurrency(saldo)}</div></div><div class='detail-actions'><button class='button secondary' onclick="saveDetailPayment('${pr.id}')">Salva pagamento</button><button class='button danger' onclick="deleteBooking('${pr.id}')">Elimina prenotazione</button><button class='button secondary' onclick='closeBookingDetail()'>Chiudi</button></div>`}
function closeBookingDetail(){openedBookingId=null; renderCompactPrenList(); bookingDetailCard.style.display="none"; bookingDetailCard.innerHTML=""}
async function saveDetailPayment(prenotazioneId){const value=Number(document.getElementById("detailPaidInput").value||0); const {error}=await supabaseClient.from("prenotazioni").update({importo_pagato:value}).eq("id", prenotazioneId); if(error){bookingMsg.textContent="Errore nel salvataggio pagamento."; return;} bookingMsg.textContent="Pagamento aggiornato."; await loadPrenotazioniList(); await loadEventAndSeats(); openBookingDetail(prenotazioneId)}
async function deleteBooking(prenotazioneId){const pr=prenotazioniData.find(x=>String(x.id)===String(prenotazioneId)); if(!confirm(`Eliminare la prenotazione di ${pr?.nome||'questa persona'}?`)) return; const {error}=await supabaseClient.from("prenotazioni").delete().eq("id", prenotazioneId); if(error){bookingMsg.textContent="Errore nell'eliminazione della prenotazione."; return;} bookingMsg.textContent="Prenotazione eliminata."; hideSeatPopup(); closeBookingDetail(); await loadPrenotazioniList(); await loadEventAndSeats()}
async function loadSaleConfig(){const {data,error}=await supabaseClient.from("serata_sale").select("sala_codice, attiva, posti_totali, posti_extra").eq("serata_id", serataId); if(error) return false; saleConfig={}; (data||[]).forEach(r=>saleConfig[r.sala_codice]={attiva:!!r.attiva, posti_totali:Number(r.posti_totali||0), posti_extra:Number(r.posti_extra||0)}); return true}
async function loadPrenotazioniList(){const {data,error}=await supabaseClient.from("prenotazioni").select(`id,nome,telefono,email,allergie,richieste,creato_il,importo_pagato,prenotazione_posti ( posto_numero, posto_tipo )`).eq("serata_id", serataId).order("creato_il",{ascending:false}); if(error){compactPrenList.innerHTML='<div class="mini-note">Errore nel caricamento prenotazioni.</div>'; return;} prenotazioniData=data||[]; seatBookingMap={}; occupiedSeats=[]; prenotazioniData.forEach(pr=>{const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)); seats.forEach(seat=>{seatBookingMap[seat]=pr; occupiedSeats.push(seat)})}); occupiedSeats=occupiedSeats.sort(seatSort); renderCompactPrenList(); renderSummaryCards(); renderRoom(); if(openedBookingId) openBookingDetail(openedBookingId)}
async function loadEventAndSeats(){if(!serataId) return; const {data,error}=await supabaseClient.from("serate").select("*").eq("id", serataId).single(); if(error||!data){eventDetail.innerHTML='<div class="card note">Serata non trovata.</div>'; return;} currentEvent=data; renderEventCard(eventDetail, currentEvent); const ok=await loadSaleConfig(); if(!ok){bookingMsg.textContent="Errore nel caricamento sale."; return;} setSalaInfoText(); updateSelectedInfo(); renderSummaryCards()}
async function saveBooking(){const nome=nomeInput.value.trim(), telefono=telefonoInput.value.trim(), email=emailInput.value.trim(), allergie=allergieInput.value.trim(), richieste=richiesteInput.value.trim(); bookingMsg.textContent=''; if(!nome){bookingMsg.textContent='Inserisci almeno il nome.'; return;} if(!selectedSeats.length){bookingMsg.textContent='Seleziona almeno un posto.'; return;} if(selectedSeats.some(seat=>occupiedSeats.includes(seat))){bookingMsg.textContent='Uno dei posti selezionati non è più disponibile.'; await loadPrenotazioniList(); selectedSeats=[]; updateSelectedInfo(); return;} const booked=[...selectedSeats].sort(seatSort); const {data:prenotazione,error:prenError}=await supabaseClient.from("prenotazioni").insert([{serata_id:serataId,nome,telefono:telefono||null,email:email||null,allergie:allergie||null,richieste:richieste||null,importo_pagato:0}]).select().single(); if(prenError||!prenotazione){bookingMsg.textContent='Errore nel salvataggio prenotazione.'; return;} const postiRows=booked.map(seatId=>({prenotazione_id:prenotazione.id, serata_id:serataId, posto_numero:seatId, posto_tipo:getSeatMeta(seatId).tipo})); const {error:postiError}=await supabaseClient.from("prenotazione_posti").insert(postiRows); if(postiError){bookingMsg.textContent='Errore nel salvataggio posti.'; return;} bookingMsg.textContent=`Prenotazione salvata. Totale dovuto: ${formatCurrency(calculateBookingAmounts(booked).totale)}`; [nomeInput,telefonoInput,emailInput,allergieInput,richiesteInput].forEach(el=>el.value=''); selectedSeats=[]; hideSeatPopup(); await loadPrenotazioniList(); updateSelectedInfo()}

function getPdfBookingSummary(){
  let totaleDovuto=0, totaleIncassato=0, coperti=0;
  prenotazioniData.forEach(pr=>{
    const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero));
    const amounts=calculateBookingAmounts(seats);
    totaleDovuto += amounts.totale;
    totaleIncassato += Number(pr.importo_pagato||0);
    coperti += seats.length;
  });
  return { prenotazioni: prenotazioniData.length, coperti, dovuto: totaleDovuto, incassato: totaleIncassato, saldo: Math.max(0, totaleDovuto - totaleIncassato) };
}
function getPdfSeatLabel(fullName){
  const parts=String(fullName||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return '';
  if(parts.length===1){ const n=parts[0]; return n.length<=5 ? n : n.slice(0,2).toUpperCase(); }
  const first=parts[0], last=parts[parts.length-1];
  if(first.length<=5) return first;
  return `${first[0]||''}${last[0]||''}`.toUpperCase();
}
function getSeatOwnerMap(){
  const map={};
  prenotazioniData.forEach(pr=>{
    const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero));
    seats.forEach(seat=>{ map[seat]={ nome: pr.nome||'', short: getPdfSeatLabel(pr.nome||'') }; });
  });
  return map;
}
function drawPdfSeat(doc, x, y, r, seatId, ownerMap){
  const owner=ownerMap[String(seatId)]||null;
  doc.setDrawColor(120,80,40);
  doc.setLineWidth(.5);
  if(owner) doc.setFillColor(196,59,47); else doc.setFillColor(46,157,80);
  doc.circle(x,y,r,'FD');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(owner ? 5.8 : 6.8);
  const label=owner ? owner.short : String(seatId);
  doc.text(String(label), x, y+1.8, {align:'center'});
  doc.setTextColor(20,20,20);
}
function drawPdfInternalMap(doc, startX, startY, ownerMap, totalSeats){
  const seatR=4.8, seatGap=13.5, topY=startY, tableY=startY+12, bottomY=startY+36;
  const topSeats=[], bottomSeats=[];
  const longSide=(totalSeats-2)/2;
  for(let i=0;i<longSide;i++) topSeats.push(String(2+i));
  for(let i=0;i<longSide;i++) bottomSeats.push(String(2+longSide+i));
  const tableWidth=Math.max(58, (topSeats.length-1)*seatGap+22);
  const tableHeight=18;
  const tableX=startX+20;
  const tableRight=tableX+tableWidth;
  doc.setFillColor(145,98,48);
  doc.roundedRect(tableX, tableY, tableWidth, tableHeight, 5,5,'F');
  topSeats.forEach((id,i)=>drawPdfSeat(doc, tableX+11+i*seatGap, topY, seatR, id, ownerMap));
  bottomSeats.forEach((id,i)=>drawPdfSeat(doc, tableX+11+i*seatGap, bottomY, seatR, id, ownerMap));
  drawPdfSeat(doc, tableX-11, tableY+tableHeight/2, seatR, '1', ownerMap);
  drawPdfSeat(doc, tableRight+11, tableY+tableHeight/2, seatR, String(totalSeats), ownerMap);
  const topDivanStartX=tableX+tableWidth-48;
  ['D1','D2','D3','D4','D5'].forEach((id,idx)=>drawPdfSeat(doc, topDivanStartX+idx*10.5, startY-10, 4, id, ownerMap));
  ['D6','D7','S1'].forEach((id,idx)=>drawPdfSeat(doc, tableRight+24, tableY+3+idx*8.5, 4, id, ownerMap));
  ['D8','S2'].forEach((id,idx)=>drawPdfSeat(doc, tableRight-8+idx*11, bottomY+11, 4, id, ownerMap));
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(90,60,35);
  doc.text('Sala interna', tableX+tableWidth/2, bottomY+20, {align:'center'});
  return { width: tableRight+35-startX, height: bottomY+24-startY };
}
function drawPdfExternalMap(doc, startX, startY, ownerMap, totalSeats, extraSeats){
  const seatR=4.6, seatGap=13.5, topY=startY+6, tableY=startY+18, bottomY=startY+42;
  const topSeats=[], bottomSeats=[];
  const longSide=(totalSeats-2)/2;
  for(let i=0;i<longSide;i++) topSeats.push(`E${2+i}`);
  for(let i=0;i<longSide;i++) bottomSeats.push(`E${2+longSide+i}`);
  const tableWidth=Math.max(58, (topSeats.length-1)*seatGap+22);
  const tableHeight=18;
  const tableX=startX+20;
  const tableRight=tableX+tableWidth;
  for(let i=1;i<=extraSeats;i++) drawPdfSeat(doc, tableX+8+(i-1)*10.5, startY-3, 3.8, `M${i}`, ownerMap);
  doc.setFillColor(145,98,48);
  doc.roundedRect(tableX, tableY, tableWidth, tableHeight, 5,5,'F');
  topSeats.forEach((id,i)=>drawPdfSeat(doc, tableX+11+i*seatGap, topY, seatR, id, ownerMap));
  bottomSeats.forEach((id,i)=>drawPdfSeat(doc, tableX+11+i*seatGap, bottomY, seatR, id, ownerMap));
  drawPdfSeat(doc, tableX-11, tableY+tableHeight/2, seatR, 'E1', ownerMap);
  drawPdfSeat(doc, tableRight+11, tableY+tableHeight/2, seatR, `E${totalSeats}`, ownerMap);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(90,60,35);
  doc.text('Sala esterna', tableX+tableWidth/2, bottomY+18, {align:'center'});
  return { width: tableRight+22-startX, height: bottomY+22-startY };
}
function drawPdfGardenMap(doc, startX, startY, ownerMap, totalSeats, extraSeats){
  const tableX=startX+18, tableY=startY+16, tableW=18, tableH=44;
  const centerX=tableX+tableW/2;
  doc.setFillColor(145,98,48);
  doc.roundedRect(tableX, tableY, tableW, tableH, 5,5,'F');
  drawPdfSeat(doc, centerX, tableY-9, 4.5, 'G1', ownerMap);
  drawPdfSeat(doc, centerX, tableY+tableH+9, 4.5, 'G2', ownerMap);
  const ids=[]; for(let i=3;i<=totalSeats;i++) ids.push(`G${i}`);
  const left=ids.slice(0, Math.ceil(ids.length/2)), right=ids.slice(Math.ceil(ids.length/2));
  left.forEach((id,idx)=>drawPdfSeat(doc, tableX-10, tableY+7+idx*10.5, 4.1, id, ownerMap));
  right.forEach((id,idx)=>drawPdfSeat(doc, tableX+tableW+10, tableY+7+idx*10.5, 4.1, id, ownerMap));
  for(let i=1;i<=extraSeats;i++) drawPdfSeat(doc, tableX+tableW+26, tableY+2+(i-1)*8.5, 3.6, `P${i}`, ownerMap);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(90,60,35);
  doc.text('Giardino', tableX+14, tableY+tableH+20, {align:'center'});
  return { width: 60, height: tableH+24 };
}
function buildCompactBookingLines(){
  const sorted=[...prenotazioniData].sort((a,b)=>{
    const as=(a.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort);
    const bs=(b.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort);
    if(!as.length && !bs.length) return 0; if(!as.length) return 1; if(!bs.length) return -1; return seatSort(as[0], bs[0]);
  });
  return sorted.map(pr=>{ const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)).sort(seatSort); const paid=Number(pr.importo_pagato||0); return `${pr.nome||'-'}  ${seats.join(', ')}  pagato ${formatCurrency(paid)}`; });
}
async function exportPdf(){
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const pageW=doc.internal.pageSize.getWidth(), pageH=doc.internal.pageSize.getHeight();
  const margin=10, ownerMap=getSeatOwnerMap(), summary=getPdfBookingSummary(), lines=buildCompactBookingLines();
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(90,60,35);
  doc.text(currentEvent?.titolo || 'Serata', margin, 14);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(50,50,50);
  doc.text(formatDateItalian(currentEvent?.data || ''), margin, 20);

  const mapBoxX=margin, mapBoxY=28, mapBoxW=pageW-margin*2, mapBoxH=92;
  doc.setDrawColor(210,185,140); doc.setFillColor(255,250,242); doc.roundedRect(mapBoxX, mapBoxY, mapBoxW, mapBoxH, 4,4,'FD');
  let cursorX=mapBoxX+8, cursorY=mapBoxY+16;
  if(saleConfig.interna?.attiva){ const dim=drawPdfInternalMap(doc, cursorX, cursorY, ownerMap, Number(saleConfig.interna.posti_totali||14)); cursorX += dim.width + 8; }
  if(saleConfig.esterna?.attiva){ const dim=drawPdfExternalMap(doc, cursorX, cursorY+3, ownerMap, Number(saleConfig.esterna.posti_totali||0), Number(saleConfig.esterna.posti_extra||0)); cursorX += dim.width + 8; }
  if(saleConfig.giardino?.attiva){ drawPdfGardenMap(doc, cursorX, cursorY+2, ownerMap, Number(saleConfig.giardino.posti_totali||0), Number(saleConfig.giardino.posti_extra||0)); }

  const listBoxX=margin, listBoxY=mapBoxY+mapBoxH+6, listBoxW=pageW-margin*2-54, listBoxH=pageH-listBoxY-12;
  const summaryBoxX=listBoxX+listBoxW+4, summaryBoxY=listBoxY, summaryBoxW=50, summaryBoxH=44;
  doc.setDrawColor(210,185,140); doc.setFillColor(255,250,242); doc.roundedRect(listBoxX, listBoxY, listBoxW, listBoxH, 4,4,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(90,60,35); doc.text('Prenotazioni', listBoxX+4, listBoxY+6);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.2); doc.setTextColor(20,20,20);
  let y=listBoxY+12, maxWidth=listBoxW-8;
  for(const line of lines){
    const wrapped=doc.splitTextToSize(line, maxWidth);
    for(const w of wrapped){
      if(y <= listBoxY + listBoxH - 3){ doc.text(w, listBoxX+4, y); y += 4.2; }
    }
  }

  doc.setDrawColor(210,185,140); doc.setFillColor(255,250,242); doc.roundedRect(summaryBoxX, summaryBoxY, summaryBoxW, summaryBoxH, 4,4,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(90,60,35); doc.text('Riepilogo', summaryBoxX+4, summaryBoxY+7);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(30,30,30);
  let sy=summaryBoxY+13;
  [`Pren.: ${summary.prenotazioni}`, `Coperti: ${summary.coperti}`, `Dovuto: ${formatCurrency(summary.dovuto)}`, `Incass.: ${formatCurrency(summary.incassato)}`, `Saldo: ${formatCurrency(summary.saldo)}`].forEach(line=>{ doc.text(line, summaryBoxX+4, sy); sy += 6; });

  doc.save(`serata_${(currentEvent?.titolo || 'evento').replace(/[^\w]+/g,'_')}.pdf`);
}
document.getElementById("exportPdfBtn").addEventListener("click", exportPdf);
document.getElementById("bookBtn").addEventListener("click", saveBooking);
document.getElementById("logoutBtn").addEventListener("click",e=>{e.preventDefault(); localStorage.removeItem("manager_auth_ok"); location.href="login.html";});
document.addEventListener("DOMContentLoaded", async()=>{setupMenu(); if(!window.supabaseClient){eventDetail.innerHTML='<div class="card note">Configura Supabase in js/supabase-client.js</div>'; return;} await loadEventAndSeats(); await loadPrenotazioniList();});
</script></body></html>
