<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Storico Eventi</title><link rel="icon" type="image/png" href="../img/logo.png"><link rel="stylesheet" href="../css/style.css"><style>.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.toolbar select,.toolbar input{padding:10px;border-radius:10px;border:1px solid #d6b98a;font-family:inherit}.events-grid{display:grid;gap:14px}.event-row{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:120px 1fr auto;gap:14px;align-items:stretch}.event-row img{width:100%;height:100%;object-fit:cover;background:#eee}.event-main{padding:14px 0;display:flex;flex-direction:column;gap:8px;min-width:0}.event-main h3{margin:0;color:var(--brown);font-size:1.1rem}.stats{display:grid;grid-template-columns:repeat(5,minmax(90px,1fr));gap:8px;margin-top:6px}.stat{background:#fffaf2;border:1px solid #ead6b1;border-radius:10px;padding:8px;text-align:center}.stat .k{font-size:12px;opacity:.8}.stat .v{font-size:18px;font-weight:700;color:var(--brown);margin-top:2px}.event-actions{display:flex;flex-direction:column;gap:8px;padding:14px;justify-content:center}@media(max-width:900px){.event-row{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(90px,1fr))}.event-actions{flex-direction:row;flex-wrap:wrap}}</style></head><body>
<div class="top-bar"><img src="../img/logo.png" class="logo-top"><button id="hamburger" class="hamburger">☰</button></div><div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar"><img src="../img/logo.png" class="side-logo"><nav><a href="index.html">Dashboard</a><a href="serate.html">Serate</a><a href="storico.html">Storico eventi</a><a href="settimana.html">Programmazione settimana</a><a href="inventario.html">Inventario</a><a href="../index.html">Sito pubblico</a><a href="#" id="logoutBtn">Esci</a></nav></aside>
<main class="page"><section class="section"><h2>Storico eventi</h2><div class="toolbar"><select id="filterMode"><option value="future">Future</option><option value="past">Passate</option><option value="all">Tutte</option></select><input id="searchInput" type="text" placeholder="Cerca per titolo..."></div><div id="eventsGrid" class="events-grid"></div><p id="msg" class="note"></p></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/supabase-client.js"></script><script src="../js/manager-guard.js"></script><script src="../js/site.js"></script>
<script>
let allEvents=[]; function formatDateItalian(d){try{return new Date(d).toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}catch{return d}} function formatCurrency(v){return `€ ${Number(v||0).toFixed(2)}`} function getSeatMeta(id){if(/^\\d+$/.test(id)||/^E\\d+$/.test(id)||/^G\\d+$/.test(id)) return {tipo:"tavolo"}; if(/^D\\d+$/.test(id)||/^S\\d+$/.test(id)||/^M\\d+$/.test(id)||/^P\\d+$/.test(id)) return {tipo:"dopocena"}; return {tipo:""}}
function computeEventTotals(ev){const qt=Number(ev.quota_tavolo||0), qd=Number(ev.quota_dopocena||0); let pren=0,cop=0,dov=0,inc=0; (ev.prenotazioni||[]).forEach(pr=>{pren++; inc += Number(pr.importo_pagato||0); const seats=(pr.prenotazione_posti||[]).map(p=>String(p.posto_numero)); cop += seats.length; let tav=0,dopo=0; seats.forEach(id=>getSeatMeta(id).tipo==='tavolo'?tav++:dopo++); dov += tav*qt + dopo*qd;}); return {prenotazioni:pren,coperti:cop,totaleDovuto:dov,totaleIncassato:inc,saldo:Math.max(0,dov-inc)}}
async function shareEvent(ev){const url=`${location.origin}/share.html?id=${ev.id}`; const text=`${ev.titolo}\n${formatDateItalian(ev.data)}\n\n${url}`; if(navigator.share){try{await navigator.share({title:ev.titolo,text,url}); return;}catch(e){}} try{await navigator.clipboard.writeText(text); alert("Link copiato");}catch{prompt("Copia:",url)}}
function renderEvents(){const grid=eventsGrid, msg=window.msg; const mode=filterMode.value, q=searchInput.value.trim().toLowerCase(), today=new Date().toISOString().slice(0,10); let filtered=[...allEvents]; if(mode==='future') filtered=filtered.filter(ev=>ev.data>=today); if(mode==='past') filtered=filtered.filter(ev=>ev.data<today); if(q) filtered=filtered.filter(ev=>(ev.titolo||"").toLowerCase().includes(q)); filtered.sort((a,b)=>mode==='past'?b.data.localeCompare(a.data):a.data.localeCompare(b.data)); grid.innerHTML=''; msg.textContent=''; if(!filtered.length){msg.textContent='Nessuna serata trovata.'; return;} filtered.forEach(ev=>{const t=computeEventTotals(ev); const row=document.createElement('article'); row.className='event-row'; row.innerHTML=`<img src="${ev.locandina||'../img/logo.png'}"><div class="event-main"><h3>${ev.titolo}</h3><div>${formatDateItalian(ev.data)}</div><div class="stats"><div class="stat"><div class="k">Prenotazioni</div><div class="v">${t.prenotazioni}</div></div><div class="stat"><div class="k">Coperti</div><div class="v">${t.coperti}</div></div><div class="stat"><div class="k">Dovuto</div><div class="v">${formatCurrency(t.totaleDovuto)}</div></div><div class="stat"><div class="k">Incassato</div><div class="v">${formatCurrency(t.totaleIncassato)}</div></div><div class="stat"><div class="k">Saldo</div><div class="v">${formatCurrency(t.saldo)}</div></div></div></div><div class="event-actions"><a class="button secondary" href="evento.html?id=${ev.id}">Apri</a><button class="button secondary share-btn">Condividi</button></div>`; row.querySelector('.share-btn').addEventListener('click',()=>shareEvent(ev)); grid.appendChild(row);});}
async function loadEvents(){if(!window.supabaseClient) return; const {data,error}=await supabaseClient.from("serate").select(`*, prenotazioni ( id, importo_pagato, prenotazione_posti ( posto_numero, posto_tipo ) )`); if(error){msg.textContent='Errore nel caricamento eventi.'; return;} allEvents=data||[]; renderEvents();}
filterMode.addEventListener('change', renderEvents); searchInput.addEventListener('input', renderEvents);
document.addEventListener('DOMContentLoaded', async()=>{setupMenu(); await loadEvents(); logoutBtn.addEventListener('click',e=>{e.preventDefault(); localStorage.removeItem("manager_auth_ok"); location.href="login.html";});});
</script></body></html>
