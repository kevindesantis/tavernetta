<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storico Eventi – Tavernetta Manager</title>

  <link rel="icon" type="image/png" href="../img/logo.png">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:16px 0;
    }

    .toolbar select,
    .toolbar input{
      padding:10px;
      border-radius:10px;
      border:1px solid #d6b98a;
      font-family:inherit;
    }

    .events-grid{
      display:grid;
      gap:14px;
    }

    .event-row{
      background:var(--card);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-columns:120px 1fr auto;
      gap:14px;
      align-items:stretch;
    }

    .event-row img{
      width:100%;
      height:100%;
      object-fit:cover;
      background:#eee;
    }

    .event-main{
      padding:14px 0;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .event-main h3{
      margin:0;
      color:var(--brown);
      font-size:1.1rem;
    }

    .event-meta{
      font-size:14px;
      opacity:.9;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,minmax(90px,1fr));
      gap:8px;
      margin-top:6px;
    }

    .stat{
      background:#fffaf2;
      border:1px solid #ead6b1;
      border-radius:10px;
      padding:8px;
      text-align:center;
    }

    .stat .k{
      font-size:12px;
      opacity:.8;
    }

    .stat .v{
      font-size:18px;
      font-weight:700;
      color:var(--brown);
      margin-top:2px;
    }

    .event-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:14px;
      justify-content:center;
    }

    @media (max-width: 900px){
      .event-row{
        grid-template-columns:1fr;
      }

      .event-row img{
        aspect-ratio:4/3;
      }

      .stats{
        grid-template-columns:repeat(2,minmax(90px,1fr));
      }

      .event-actions{
        flex-direction:row;
        flex-wrap:wrap;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <img src="../img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="../img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="serate.html">Serate</a>
      <a href="storico.html">Storico eventi</a>
      <a href="settimana.html">Programmazione settimana</a>
      <a href="inventario.html">Inventario</a>
      <a href="../index.html">Sito pubblico</a>
      <a href="#" id="logoutBtn">Esci</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <h2>Storico eventi</h2>

      <div class="toolbar">
        <select id="filterMode">
          <option value="future">Future</option>
          <option value="past">Passate</option>
          <option value="all">Tutte</option>
        </select>

        <input id="searchInput" type="text" placeholder="Cerca per titolo...">
      </div>

      <div id="eventsGrid" class="events-grid"></div>
      <p id="msg" class="note"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/manager-guard.js"></script>
  <script src="../js/site.js"></script>

  <script>
    let allEvents = [];

    function formatDateItalian(dateStr){
      try {
        return new Date(dateStr).toLocaleDateString("it-IT", {
          weekday: "long",
          day: "2-digit",
          month: "long",
          year: "numeric"
        });
      } catch {
        return dateStr;
      }
    }

    function formatCurrency(value){
      return `€ ${Number(value || 0).toFixed(2)}`;
    }

    function getSeatMeta(id) {
      if (/^\d+$/.test(id)) return { tipo: "tavolo" };
      if (/^D\d+$/.test(id) || /^S\d+$/.test(id)) return { tipo: "divano" };
      if (/^E\d+$/.test(id)) return { tipo: "tavolo" };
      if (/^M\d+$/.test(id)) return { tipo: "muretto" };
      if (/^G\d+$/.test(id)) return { tipo: "tavolo" };
      if (/^P\d+$/.test(id)) return { tipo: "poltrona" };
      return { tipo: "" };
    }

    function computeEventTotals(ev){
      const quotaTavolo = Number(ev.quota_tavolo || 0);
      const quotaDopocena = Number(ev.quota_dopocena || 0);

      let prenotazioni = 0;
      let coperti = 0;
      let totaleDovuto = 0;
      let totaleIncassato = 0;

      (ev.prenotazioni || []).forEach(pr => {
        prenotazioni++;
        totaleIncassato += Number(pr.importo_pagato || 0);

        const seats = (pr.prenotazione_posti || []).map(p => String(p.posto_numero));
        coperti += seats.length;

        let tavolo = 0;
        let dopocena = 0;

        seats.forEach(id => {
          if (getSeatMeta(id).tipo === "tavolo") tavolo++;
          else dopocena++;
        });

        totaleDovuto += (tavolo * quotaTavolo) + (dopocena * quotaDopocena);
      });

      return {
        prenotazioni,
        coperti,
        totaleDovuto,
        totaleIncassato,
        saldo: Math.max(0, totaleDovuto - totaleIncassato)
      };
    }

    async function shareEvent(ev){
      const url = `${window.location.origin}/evento.html?id=${ev.id}`;
      const text = `${ev.titolo}
${formatDateItalian(ev.data)}

${url}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: ev.titolo,
            text,
            url
          });
          return;
        } catch (err) {
          if (err && err.name === "AbortError") return;
        }
      }

      try {
        await navigator.clipboard.writeText(text);
        alert("Link della serata copiato negli appunti.");
      } catch {
        prompt("Copia questo link:", url);
      }
    }

    function renderEvents(){
      const grid = document.getElementById("eventsGrid");
      const msg = document.getElementById("msg");
      const mode = document.getElementById("filterMode").value;
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const today = new Date().toISOString().slice(0, 10);

      let filtered = [...allEvents];

      if (mode === "future") filtered = filtered.filter(ev => ev.data >= today);
      if (mode === "past") filtered = filtered.filter(ev => ev.data < today);

      if (q) {
        filtered = filtered.filter(ev => (ev.titolo || "").toLowerCase().includes(q));
      }

      filtered.sort((a, b) => mode === "past"
        ? b.data.localeCompare(a.data)
        : a.data.localeCompare(b.data)
      );

      grid.innerHTML = "";
      msg.textContent = "";

      if (!filtered.length) {
        msg.textContent = "Nessuna serata trovata.";
        return;
      }

      filtered.forEach(ev => {
        const totals = computeEventTotals(ev);

        const row = document.createElement("article");
        row.className = "event-row";

        row.innerHTML = `
          <img src="${ev.locandina || '../img/logo.png'}" alt="${ev.titolo}">
          <div class="event-main">
            <h3>${ev.titolo}</h3>
            <div class="event-meta">${formatDateItalian(ev.data)}</div>

            <div class="stats">
              <div class="stat">
                <div class="k">Prenotazioni</div>
                <div class="v">${totals.prenotazioni}</div>
              </div>
              <div class="stat">
                <div class="k">Coperti</div>
                <div class="v">${totals.coperti}</div>
              </div>
              <div class="stat">
                <div class="k">Dovuto</div>
                <div class="v">${formatCurrency(totals.totaleDovuto)}</div>
              </div>
              <div class="stat">
                <div class="k">Incassato</div>
                <div class="v">${formatCurrency(totals.totaleIncassato)}</div>
              </div>
              <div class="stat">
                <div class="k">Saldo</div>
                <div class="v">${formatCurrency(totals.saldo)}</div>
              </div>
            </div>
          </div>
          <div class="event-actions">
            <a class="button secondary" href="evento.html?id=${ev.id}">Apri</a>
            <button class="button secondary share-btn" type="button">Condividi</button>
          </div>
        `;

        row.querySelector(".share-btn").addEventListener("click", () => shareEvent(ev));
        grid.appendChild(row);
      });
    }

    async function loadEvents(){
      const { data, error } = await supabaseClient
        .from("serate")
        .select(`
          *,
          prenotazioni (
            id,
            importo_pagato,
            prenotazione_posti (
              posto_numero,
              posto_tipo
            )
          )
        `);

      if (error) {
        console.error(error);
        document.getElementById("msg").textContent = "Errore nel caricamento eventi.";
        return;
      }

      allEvents = data || [];
      renderEvents();
    }

    document.getElementById("filterMode").addEventListener("change", renderEvents);
    document.getElementById("searchInput").addEventListener("input", renderEvents);

    document.getElementById("logoutBtn").addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("manager_auth_ok");
      localStorage.removeItem("manager_auth_mode");
      window.location.href = "login.html";
    });

    document.addEventListener("DOMContentLoaded", async () => {
      setupMenu();
      await loadEvents();
    });
  </script>
</body>
</html>
