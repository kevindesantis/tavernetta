<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Programmazione Settimana</title><link rel="icon" type="image/png" href="../img/logo.png"><link rel="stylesheet" href="../css/style.css"><style>.week-grid{display:grid;gap:14px;margin-top:18px}.day-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px}.day-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:8px}.day-row select{padding:10px;border-radius:10px;border:1px solid #d6b98a;font-family:inherit;background:#fff;min-width:240px}.mini-preview{margin-top:10px;padding:10px;border:1px solid #ead6b1;background:#fffaf2;border-radius:12px;font-size:14px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.ok{color:#2e7d32}.warning{color:#9c5a00}</style></head><body>
<div class="top-bar"><img src="../img/logo.png" class="logo-top"><button id="hamburger" class="hamburger">☰</button></div><div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar"><img src="../img/logo.png" class="side-logo"><nav><a href="index.html">Dashboard</a><a href="serate.html">Serate</a><a href="storico.html">Storico eventi</a><a href="settimana.html">Programmazione settimana</a><a href="inventario.html">Inventario</a><a href="../index.html">Sito pubblico</a><a href="#" id="logoutBtn">Esci</a></nav></aside>
<main class="page"><section class="section"><h2>Programmazione settimana</h2><p class="note">Attiva rapidamente le serate standard della settimana.</p><div class="toolbar"><button id="saveWeekBtn" class="button">Salva programmazione</button><button id="refreshBtn" class="button secondary">Ricarica</button></div><p id="msg" class="note"></p><div id="weekGrid" class="week-grid"></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/supabase-client.js"></script><script src="../js/manager-guard.js"></script><script src="../js/site.js"></script>
<script>
const STANDARD_TYPES={standard_dopocena:{titolo:"Serata Dopocena alla Tavernetta",programma:"La Tavernetta ti aspetta per una serata dopocena in compagnia, relax, musica e convivialità.",locandina:"../img/locandina-standard.jpg",quota_tavolo:0,quota_dopocena:0,sale:[{sala_codice:"interna",attiva:true,posti_totali:14,posti_extra:0}]},fedelissimi_dopocena:{titolo:"Dopocena per i Fedelissimi",programma:"Una serata dedicata ai fedelissimi della Tavernetta.",locandina:"../img/locandina-standard-fedelissimi.jpg",quota_tavolo:0,quota_dopocena:0,sale:[{sala_codice:"interna",attiva:true,posti_totali:14,posti_extra:0}]},serata_privata:{titolo:"Serata Privata",programma:"La Tavernetta è riservata per una serata privata.",locandina:"../img/locandina-standard-privata.jpg",quota_tavolo:0,quota_dopocena:0,sale:[{sala_codice:"interna",attiva:true,posti_totali:14,posti_extra:0}]}}
function formatDateItalian(d){try{return new Date(d).toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}catch{return d}}
function addDays(base,days){const d=new Date(base); d.setDate(d.getDate()+days); return d}
function ymd(date){return date.toISOString().slice(0,10)}
function createDayCard(dateStr){const card=document.createElement("article"); card.className="day-card"; card.dataset.date=dateStr; card.innerHTML=`<h3>${formatDateItalian(dateStr)}</h3><div class="day-date">${dateStr}</div><div class="day-row"><label><input type="checkbox" class="day-enabled"> Attiva serata standard</label><select class="day-type" disabled><option value="standard_dopocena">Serata Dopocena</option><option value="fedelissimi_dopocena">Dopocena per i Fedelissimi</option><option value="serata_privata">Serata Privata</option></select></div><div class="mini-preview"></div>`; const enabled=card.querySelector(".day-enabled"), typeSelect=card.querySelector(".day-type"), preview=card.querySelector(".mini-preview"); function updatePreview(){const type=typeSelect.value,cfg=STANDARD_TYPES[type]; if(!enabled.checked){preview.innerHTML=`<span class='warning'>Nessuna serata standard attiva per questo giorno.</span>`; return;} preview.innerHTML=`<strong>${cfg.titolo}</strong><br>${cfg.programma}<br><span class='ok'>Sala interna · 14 posti tavolo</span>`;} enabled.addEventListener("change",()=>{typeSelect.disabled=!enabled.checked; updatePreview()}); typeSelect.addEventListener("change", updatePreview); updatePreview(); return card;}
function getWeekDates(){const today=new Date(), dates=[]; for(let i=0;i<7;i++) dates.push(ymd(addDays(today,i))); return dates}
function renderWeek(){weekGrid.innerHTML=""; getWeekDates().forEach(d=>weekGrid.appendChild(createDayCard(d)))}
async function loadExistingWeekProgram(){if(!window.supabaseClient) return; const dates=getWeekDates(), start=dates[0], end=dates[dates.length-1]; const {data}=await supabaseClient.from("serate").select("id,data,titolo,is_standard,standard_type").gte("data",start).lte("data",end).order("data",{ascending:true}); const events=data||[]; dates.forEach(dateStr=>{const card=document.querySelector(`.day-card[data-date="${dateStr}"]`); if(!card) return; const enabled=card.querySelector(".day-enabled"), typeSelect=card.querySelector(".day-type"), preview=card.querySelector(".mini-preview"); const custom=events.find(ev=>ev.data===dateStr && !ev.is_standard); const std=events.find(ev=>ev.data===dateStr && ev.is_standard); if(custom){enabled.checked=false; typeSelect.disabled=true; preview.innerHTML=`<span class="warning"><strong>Serata personalizzata già presente:</strong><br>${custom.titolo}</span>`; card.dataset.locked='custom'; return;} if(std){enabled.checked=true; typeSelect.disabled=false; typeSelect.value=std.standard_type||'standard_dopocena'; const cfg=STANDARD_TYPES[typeSelect.value]; preview.innerHTML=`<strong>${cfg.titolo}</strong><br>${cfg.programma}<br><span class='ok'>Standard già attiva</span>`; card.dataset.locked=''; return;} card.dataset.locked='';});}
async function deleteExistingStandardForDate(dateStr){const {data}=await supabaseClient.from("serate").select("id").eq("data",dateStr).eq("is_standard",true); for(const row of (data||[])){await supabaseClient.from("serate").delete().eq("id",row.id)}}
async function createStandardEvent(dateStr,type){const cfg=STANDARD_TYPES[type]; const {data:inserted,error}=await supabaseClient.from("serate").insert([{titolo:cfg.titolo,data:dateStr,menu:null,programma:cfg.programma,locandina:cfg.locandina,link_apple:null,quota_tavolo:cfg.quota_tavolo,quota_dopocena:cfg.quota_dopocena,is_standard:true,standard_type:type}]).select().single(); if(error||!inserted) throw error||new Error("Insert failed"); const saleRows=cfg.sale.map(s=>({serata_id:inserted.id,sala_codice:s.sala_codice,attiva:s.attiva,posti_totali:s.posti_totali,posti_extra:s.posti_extra})); await supabaseClient.from("serata_sale").insert(saleRows);}
async function saveWeekProgram(){msg.textContent="Salvataggio in corso..."; try{for(const card of [...document.querySelectorAll(".day-card")]){const dateStr=card.dataset.date, enabled=card.querySelector(".day-enabled").checked, type=card.querySelector(".day-type").value, locked=card.dataset.locked==='custom'; if(locked) continue; await deleteExistingStandardForDate(dateStr); if(enabled) await createStandardEvent(dateStr,type);} msg.textContent='Programmazione settimana salvata.'; renderWeek(); await loadExistingWeekProgram();}catch(err){console.error(err); msg.textContent='Errore nel salvataggio della programmazione.';}}
saveWeekBtn.addEventListener("click", saveWeekProgram); refreshBtn.addEventListener("click", async()=>{msg.textContent=""; renderWeek(); await loadExistingWeekProgram();});
document.addEventListener("DOMContentLoaded", async()=>{setupMenu(); renderWeek(); await loadExistingWeekProgram(); logoutBtn.addEventListener("click",e=>{e.preventDefault(); localStorage.removeItem("manager_auth_ok"); location.href="login.html";});});
</script></body></html>
