<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Programmazione settimana</title>

<link rel="stylesheet" href="../css/style.css">

<style>

.week-table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.week-table th,
.week-table td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

.week-table th{
background:#f5f5f5;
}

select{
padding:6px;
}

</style>
</head>

<body>

<h2>Programmazione settimana</h2>

<table class="week-table">
<thead>
<tr>
<th>Giorno</th>
<th>Data</th>
<th>Attiva</th>
<th>Tipo serata</th>
</tr>
</thead>

<tbody id="weekBody"></tbody>
</table>

<button id="saveBtn">Salva</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>

<script>

function getNext7Days(){

const days=[]

for(let i=0;i<7;i++){

const d=new Date()

d.setDate(d.getDate()+i)

days.push(d)

}

return days

}

const body=document.getElementById("weekBody")

const days=getNext7Days()

days.forEach(day=>{

const dateStr=day.toISOString().slice(0,10)

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${day.toLocaleDateString("it-IT",{weekday:"long"})}</td>

<td>${dateStr}</td>

<td>
<input type="checkbox" data-date="${dateStr}">
</td>

<td>
<select data-type="${dateStr}">
<option value="">Nessuna</option>
<option value="standard_dopocena">Standard dopocena</option>
<option value="fedelissimi_dopocena">Dopocena fedelissimi</option>
</select>
</td>

`

body.appendChild(tr)

})

document.getElementById("saveBtn").onclick=async()=>{

for(const day of days){

const dateStr=day.toISOString().slice(0,10)

const check=document.querySelector(`input[data-date="${dateStr}"]`)

const select=document.querySelector(`select[data-type="${dateStr}"]`)

await supabaseClient
.from("programmazione_settimana")
.upsert({
data:dateStr,
attiva:check.checked,
tipo_standard:select.value
})

}

alert("Programmazione salvata")

}

</script>

</body>
</html>
