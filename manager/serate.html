<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Manager Serate</title><link rel="icon" type="image/png" href="../img/logo.png"><link rel="stylesheet" href="../css/style.css"><style>
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:25px}.admin-form label{display:block;margin-top:12px;font-weight:bold;color:var(--brown)}.admin-form input,.admin-form textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-top:6px;font-family:inherit;background:#fff}.admin-form textarea{min-height:100px;resize:vertical}.sala-box{border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:10px;background:#fffaf2}.sala-row{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}.sala-row input[type="checkbox"]{width:auto;margin:0}.admin-list{display:grid;gap:12px}.admin-item{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.1)}.admin-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}.danger{background:#b9382f!important;color:#fff!important;border:none!important}.thumb{width:100%;max-width:220px;border-radius:10px;margin-top:8px;box-shadow:var(--shadow)}.preview-box{margin-top:10px}.preview-box img{width:100%;max-width:240px;border-radius:12px;display:none;box-shadow:var(--shadow)}@media(max-width:900px){.admin-grid{grid-template-columns:1fr}}
</style></head><body>
<div class="top-bar"><img src="../img/logo.png" class="logo-top"><button id="hamburger" class="hamburger">☰</button></div><div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar"><img src="../img/logo.png" class="side-logo"><nav><a href="index.html">Dashboard</a><a href="serate.html">Serate</a><a href="storico.html">Storico eventi</a><a href="settimana.html">Programmazione settimana</a><a href="inventario.html">Inventario</a><a href="../index.html">Sito pubblico</a><a href="#" id="logoutBtn">Esci</a></nav></aside>
<main class="page"><section class="section"><h2>Gestione serate</h2><div class="admin-grid">
<div class="card"><h3 class="event-title">Aggiungi / modifica serata</h3><form id="formSerata" class="admin-form"><input type="hidden" id="serataId"><input type="hidden" id="locandina">
<label for="titolo">Titolo</label><input id="titolo" required>
<label for="data">Data</label><input id="data" type="date" required>
<label for="menu">Menù</label><textarea id="menu"></textarea>
<label for="programma">Programma</label><textarea id="programma"></textarea>
<label for="quotaTavolo">Quota tavolo (€)</label><input id="quotaTavolo" type="number" min="0" step="0.01" value="0">
<label for="quotaDopocena">Quota dopocena (€)</label><input id="quotaDopocena" type="number" min="0" step="0.01" value="0">
<label for="locandinaFile">Locandina</label><input id="locandinaFile" type="file" accept="image/*"><div class="preview-box"><img id="locandinaPreview"></div>
<label for="linkApple">Link Apple</label><input id="linkApple">
<hr style="margin:16px 0;"><h3 class="event-title">Sale attive</h3>
<div class="sala-box"><h4>Sala interna</h4><div class="sala-row"><input type="checkbox" id="internaAttiva"><label for="internaAttiva">Attiva</label></div><div class="sala-row"><label for="internaPosti">Posti tavolo</label><input id="internaPosti" type="number" min="4" step="2"></div></div>
<div class="sala-box"><h4>Sala esterna</h4><div class="sala-row"><input type="checkbox" id="esternaAttiva"><label for="esternaAttiva">Attiva</label></div><div class="sala-row"><label for="esternaPosti">Posti tavolo</label><input id="esternaPosti" type="number" min="4" step="2"></div><div class="sala-row"><label for="esternaExtra">Posti muretto</label><input id="esternaExtra" type="number" min="0" step="1" value="10"></div></div>
<div class="sala-box"><h4>Sala giardino</h4><div class="sala-row"><input type="checkbox" id="giardinoAttiva"><label for="giardinoAttiva">Attiva</label></div><div class="sala-row"><label for="giardinoPosti">Posti tavolo</label><input id="giardinoPosti" type="number" min="6" step="2" value="6"></div><div class="sala-row"><label for="giardinoExtra">Posti poltrone</label><input id="giardinoExtra" type="number" min="0" step="1" value="10"></div></div>
<div class="button-row" style="margin-top:14px;"><button type="submit" class="button">Salva serata</button><button type="button" id="resetBtn" class="button secondary">Nuova serata</button></div><p id="msg" class="note"></p></form></div>
<div class="card"><h3 class="event-title">Serate salvate</h3><div id="listaSerate" class="admin-list"></div></div>
</div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/supabase-client.js"></script><script src="../js/manager-guard.js"></script><script src="../js/site.js"></script>
<script>
const form=document.getElementById("formSerata"), msg=document.getElementById("msg"), locandinaFile=document.getElementById("locandinaFile"), locandinaPreview=document.getElementById("locandinaPreview");
function showPreview(src){if(!src){locandinaPreview.style.display='none'; locandinaPreview.src=''; return;} locandinaPreview.src=src; locandinaPreview.style.display='block';}
function formatDateItalian(dateStr){try{return new Date(dateStr).toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}catch{return dateStr}}
async function shareEvent(ev){const url=`${location.origin}/share.html?id=${ev.id}`; const text=`${ev.titolo}\n${formatDateItalian(ev.data)}\n\n${url}`; if(navigator.share){try{await navigator.share({title:ev.titolo,text,url}); return;}catch(e){}} try{await navigator.clipboard.writeText(text); alert("Link copiato");}catch{prompt("Copia:",url)}}
locandinaFile.addEventListener("change", async()=>{const file=locandinaFile.files[0]; if(!file||!window.supabaseClient) return; showPreview(URL.createObjectURL(file)); msg.textContent="Caricamento locandina..."; const ext=file.name.split(".").pop()||"jpg"; const fileName=`serate/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`; const {error:uploadError}=await supabaseClient.storage.from("locandine").upload(fileName,file,{cacheControl:"3600",upsert:false,contentType:file.type}); if(uploadError){msg.textContent="Errore caricamento locandina."; return;} const {data:publicData}=supabaseClient.storage.from("locandine").getPublicUrl(fileName); document.getElementById("locandina").value=publicData.publicUrl; msg.textContent="Locandina caricata.";});
function clearForm(){["serataId","titolo","data","menu","programma","locandina","linkApple"].forEach(id=>document.getElementById(id).value=""); document.getElementById("locandinaFile").value=""; document.getElementById("quotaTavolo").value="0"; document.getElementById("quotaDopocena").value="0"; document.getElementById("internaAttiva").checked=false; document.getElementById("internaPosti").value=""; document.getElementById("esternaAttiva").checked=false; document.getElementById("esternaPosti").value=""; document.getElementById("esternaExtra").value="10"; document.getElementById("giardinoAttiva").checked=false; document.getElementById("giardinoPosti").value="6"; document.getElementById("giardinoExtra").value="10"; showPreview(""); msg.textContent="";}
async function loadSerataSale(serataId){if(!window.supabaseClient) return []; const {data}=await supabaseClient.from("serata_sale").select("*").eq("serata_id", serataId); return data||[];}
async function fillForm(ev){clearForm(); document.getElementById("serataId").value=ev.id||""; document.getElementById("titolo").value=ev.titolo||""; document.getElementById("data").value=(ev.data||"").slice(0,10); document.getElementById("menu").value=ev.menu||""; document.getElementById("programma").value=ev.programma||""; document.getElementById("locandina").value=ev.locandina||""; document.getElementById("linkApple").value=ev.link_apple||""; document.getElementById("quotaTavolo").value=Number(ev.quota_tavolo||0); document.getElementById("quotaDopocena").value=Number(ev.quota_dopocena||0); showPreview(ev.locandina||""); const sale=await loadSerataSale(ev.id); sale.forEach(s=>{if(s.sala_codice==='interna'){internaAttiva.checked=!!s.attiva; internaPosti.value=s.posti_totali||'';} if(s.sala_codice==='esterna'){esternaAttiva.checked=!!s.attiva; esternaPosti.value=s.posti_totali||''; esternaExtra.value=s.posti_extra??10;} if(s.sala_codice==='giardino'){giardinoAttiva.checked=!!s.attiva; giardinoPosti.value=s.posti_totali||6; giardinoExtra.value=s.posti_extra??10;}}); scrollTo({top:0,behavior:'smooth'});}
function formatSaleRow(s){if(s.sala_codice==='interna') return `interna tavolo (${s.posti_totali})`; if(s.sala_codice==='esterna') return `esterna tavolo (${s.posti_totali}) / muretto (${s.posti_extra ?? 0})`; if(s.sala_codice==='giardino') return `giardino tavolo (${s.posti_totali}) / poltrone (${s.posti_extra ?? 0})`; return s.sala_codice;}
async function caricaSerate(){if(!window.supabaseClient) return; const {data,error}=await supabaseClient.from("serate").select("*").order("data",{ascending:false}); const box=listaSerate; box.innerHTML=""; if(error){box.innerHTML='<div class="note">Errore caricamento serate.</div>'; return;} if(!data?.length){box.innerHTML='<div class="note">Nessuna serata presente.</div>'; return;} for(const ev of data){const sale=await loadSerataSale(ev.id); const saleText=sale.filter(s=>s.attiva).map(formatSaleRow).join("<br>")||"-"; const div=document.createElement("div"); div.className="admin-item"; div.innerHTML=`<h4>${ev.titolo||""}</h4><p><strong>Data:</strong> ${ev.data||""}</p><p><strong>Quote:</strong> Tavolo € ${Number(ev.quota_tavolo||0).toFixed(2)} / Dopocena € ${Number(ev.quota_dopocena||0).toFixed(2)}</p><p><strong>Sale:</strong><br>${saleText}</p>${ev.locandina?`<img class='thumb' src='${ev.locandina}'>`:''}<div class='admin-actions'><button class='button secondary edit-btn'>Modifica</button><a class='button secondary' href='evento.html?id=${ev.id}'>Gestisci serata</a><button class='button secondary share-btn'>Condividi</button><button class='button danger delete-btn'>Elimina</button></div>`; div.querySelector(".edit-btn").addEventListener("click",()=>fillForm(ev)); div.querySelector(".share-btn").addEventListener("click",()=>shareEvent(ev)); div.querySelector(".delete-btn").addEventListener("click", async()=>{if(!confirm(`Eliminare la serata "${ev.titolo}"?`)) return; const {error:delError}=await supabaseClient.from("serate").delete().eq("id",ev.id); if(delError){msg.textContent="Errore eliminazione serata."; return;} msg.textContent="Serata eliminata."; clearForm(); await caricaSerate();}); box.appendChild(div);}}
form.addEventListener("submit", async e=>{e.preventDefault(); if(!window.supabaseClient) return; msg.textContent=''; const currentId=document.getElementById("serataId").value.trim(); const payload={titolo:document.getElementById("titolo").value.trim(), data:document.getElementById("data").value.trim(), menu:document.getElementById("menu").value.trim(), programma:document.getElementById("programma").value.trim(), locandina:document.getElementById("locandina").value.trim(), link_apple:document.getElementById("linkApple").value.trim(), quota_tavolo:parseFloat(document.getElementById("quotaTavolo").value||0), quota_dopocena:parseFloat(document.getElementById("quotaDopocena").value||0), is_standard:false, standard_type:null}; if(!payload.titolo || !payload.data || !payload.locandina){msg.textContent='Inserisci titolo, data e locandina.'; return;} let savedId=currentId; if(savedId){const {error}=await supabaseClient.from("serate").update(payload).eq("id",savedId); if(error){console.error(error); msg.textContent='Errore modifica serata.'; return;}} else {const {data:inserted,error}=await supabaseClient.from("serate").insert([payload]).select().single(); if(error||!inserted){console.error(error); msg.textContent='Errore salvataggio serata.'; return;} savedId=inserted.id;} const {error:delSaleError}=await supabaseClient.from("serata_sale").delete().eq("serata_id", savedId); if(delSaleError){console.error(delSaleError); msg.textContent='Serata salvata, ma errore nel reset delle sale.'; return;} const saleRows=[]; if(document.getElementById("internaAttiva").checked) saleRows.push({serata_id:savedId,sala_codice:'interna',attiva:true,posti_totali:parseInt(document.getElementById("internaPosti").value||0),posti_extra:0}); if(document.getElementById("esternaAttiva").checked) saleRows.push({serata_id:savedId,sala_codice:'esterna',attiva:true,posti_totali:parseInt(document.getElementById("esternaPosti").value||0),posti_extra:parseInt(document.getElementById("esternaExtra").value||0)}); if(document.getElementById("giardinoAttiva").checked) saleRows.push({serata_id:savedId,sala_codice:'giardino',attiva:true,posti_totali:parseInt(document.getElementById("giardinoPosti").value||0),posti_extra:parseInt(document.getElementById("giardinoExtra").value||0)}); if(saleRows.length){const {error:saleError}=await supabaseClient.from("serata_sale").insert(saleRows); if(saleError){console.error(saleError); msg.textContent='Serata salvata, ma errore nel salvataggio sale.'; return;}} msg.textContent=savedId===currentId && currentId ? 'Serata modificata.' : 'Serata salvata.'; clearForm(); await caricaSerate();});
resetBtn.addEventListener("click", clearForm);
document.addEventListener("DOMContentLoaded", async()=>{setupMenu(); await caricaSerate(); logoutBtn.addEventListener("click",e=>{e.preventDefault(); localStorage.removeItem("manager_auth_ok"); location.href="login.html";});});
</script></body></html>
