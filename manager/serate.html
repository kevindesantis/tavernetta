<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Manager Serate</title>
<link rel="icon" type="image/png" href="../img/logo.png"><link rel="stylesheet" href="../css/style.css">
<style>
.page-grid{display:grid;grid-template-columns:380px 1fr;gap:20px}.panel{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px}.collapsible-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin:0}.collapsible-body{margin-top:12px}.collapsed .collapsible-body{display:none}.collapsed .chev{transform:rotate(-90deg)}.chev{transition:.2s}.admin-form label{display:block;margin-top:12px;font-weight:bold;color:var(--brown)}.admin-form input,.admin-form textarea,.admin-form select{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-top:6px;font-family:inherit;background:#fff}.admin-form textarea{min-height:90px;resize:vertical}.sala-box{border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:10px;background:#fffaf2}.sala-row{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}.sala-row input[type="checkbox"]{width:auto;margin:0}.thumb{width:100%;max-width:220px;border-radius:10px;margin-top:8px;box-shadow:var(--shadow)}.preview-box img{width:100%;max-width:240px;border-radius:12px;display:none;box-shadow:var(--shadow)}.calendar-toolbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}.calendar-arrow{min-width:42px;height:42px;border:none;border-radius:10px;background:var(--brown);color:#fff;font-size:20px;cursor:pointer}.calendar-title{margin:0;min-width:180px;text-align:center;color:var(--brown)}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.calendar-head{font-size:12px;text-align:center;font-weight:700;color:var(--brown);padding:6px 0}.calendar-day{min-height:68px;background:#fffaf2;border:1px solid rgba(107,62,38,.12);border-radius:12px;padding:6px;cursor:pointer;position:relative}.calendar-day.empty{background:transparent;border:none;cursor:default}.calendar-day.today{outline:2px solid #b7834b}.calendar-day.has-event{background:#fff3db;border-color:#d6b98a}.calendar-num{font-weight:700;color:var(--brown);font-size:13px}.calendar-dot{width:8px;height:8px;border-radius:50%;background:var(--brown);position:absolute;right:8px;top:8px}.day-events{margin-top:14px;display:grid;gap:10px}.event-row{background:#fffaf2;border:1px solid rgba(107,62,38,.12);border-radius:12px;padding:12px}.event-row h4{margin:0 0 6px;color:var(--brown)}.admin-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}.danger{background:#b9382f!important;color:#fff!important;border:none!important}@media(max-width:1000px){.page-grid{grid-template-columns:1fr}}
</style></head><body>
<div class="top-bar"><img src="../img/logo.png" class="logo-top"><button id="hamburger" class="hamburger">☰</button></div><div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar"><img src="../img/logo.png" class="side-logo"><nav><a href="index.html">Dashboard</a><a href="serate.html">Serate</a><a href="storico.html">Storico eventi</a><a href="settimana.html">Programmazione settimana</a><a href="inventario.html">Inventario</a><a href="../index.html">Sito pubblico</a><a href="#" id="logoutBtn">Esci</a></nav></aside>
<main class="page"><section class="section"><h2>Gestione serate</h2><div class="page-grid"><div>
<div class="panel" id="formPanel"><h3 class="collapsible-head"><span>Aggiungi / modifica serata</span><span class="chev">▾</span></h3><div class="collapsible-body"><form id="formSerata" class="admin-form"><input type="hidden" id="serataId"><input type="hidden" id="locandina">
<label for="titolo">Titolo</label><input id="titolo" required>
<label for="data">Data</label><input id="data" type="date" required>
<label for="menu">Menù</label><textarea id="menu"></textarea>
<label for="programma">Programma</label><textarea id="programma"></textarea>
<label for="quotaTavolo">Quota tavolo (€)</label><input id="quotaTavolo" type="number" min="0" step="0.01" value="0">
<label for="quotaDopocena">Quota dopocena (€)</label><input id="quotaDopocena" type="number" min="0" step="0.01" value="0">
<label for="locandinaFile">Locandina</label><input id="locandinaFile" type="file" accept="image/*"><div class="preview-box"><img id="locandinaPreview"></div>
<label for="linkApple">Link Apple</label><input id="linkApple">
<div class="button-row" style="margin-top:14px;"><button type="submit" class="button">Salva serata</button><button type="button" id="resetBtn" class="button secondary">Nuova serata</button></div><p id="msg" class="note"></p></form></div></div>
<div class="panel collapsed" id="salePanel"><h3 class="collapsible-head"><span>Sale attive</span><span class="chev">▾</span></h3><div class="collapsible-body"><div class="sala-box"><h4>Sala interna</h4><div class="sala-row"><input type="checkbox" id="internaAttiva"><label for="internaAttiva">Attiva</label></div><div class="sala-row"><label for="internaPosti">Posti tavolo</label><input id="internaPosti" type="number" min="4" step="2"></div></div><div class="sala-box"><h4>Sala esterna</h4><div class="sala-row"><input type="checkbox" id="esternaAttiva"><label for="esternaAttiva">Attiva</label></div><div class="sala-row"><label for="esternaPosti">Posti tavolo</label><input id="esternaPosti" type="number" min="4" step="2"></div><div class="sala-row"><label for="esternaExtra">Posti muretto</label><input id="esternaExtra" type="number" min="0" step="1" value="10"></div></div><div class="sala-box"><h4>Sala giardino</h4><div class="sala-row"><input type="checkbox" id="giardinoAttiva"><label for="giardinoAttiva">Attiva</label></div><div class="sala-row"><label for="giardinoPosti">Posti tavolo</label><input id="giardinoPosti" type="number" min="6" step="2" value="6"></div><div class="sala-row"><label for="giardinoExtra">Posti poltrone</label><input id="giardinoExtra" type="number" min="0" step="1" value="10"></div></div></div></div>
</div><div><div class="panel"><div class="calendar-toolbar"><button id="prevMonthBtn" class="calendar-arrow" type="button">←</button><h3 id="calendarTitle" class="calendar-title">Calendario</h3><button id="nextMonthBtn" class="calendar-arrow" type="button">→</button></div><div id="calendarMount" class="calendar-grid"></div><div id="dayEvents" class="day-events"></div></div></div></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/supabase-client.js"></script><script src="../js/manager-guard.js"></script><script src="../js/site.js"></script>
<script>
const form=document.getElementById('formSerata'),msg=document.getElementById('msg'),locandinaFile=document.getElementById('locandinaFile'),locandinaPreview=document.getElementById('locandinaPreview');
let allEvents=[];let currentMonthDate=new Date();const DAYS=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
function showPreview(src){if(!src){locandinaPreview.style.display='none';locandinaPreview.src='';return;}locandinaPreview.src=src;locandinaPreview.style.display='block';}
function formatDateItalian(dateStr){try{return new Date(dateStr).toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}catch{return dateStr}}
function ymdLocal(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function togglePanel(id){document.getElementById(id).classList.toggle('collapsed')}
document.querySelectorAll('.collapsible-head').forEach(h=>h.addEventListener('click',()=>togglePanel(h.parentElement.id)));
async function shareEvent(ev){const url=`${location.origin}/share.html?id=${ev.id}`;const text=`${ev.titolo}
${formatDateItalian(ev.data)}

${url}`;if(navigator.share){try{await navigator.share({title:ev.titolo,text,url});return;}catch(e){if(e?.name==='AbortError')return;}}try{await navigator.clipboard.writeText(text);alert('Link copiato');}catch{prompt('Copia:',url)}}
locandinaFile.addEventListener('change', async()=>{const file=locandinaFile.files[0];if(!file||!window.supabaseClient)return;showPreview(URL.createObjectURL(file));msg.textContent='Caricamento locandina...';const ext=file.name.split('.').pop()||'jpg';const fileName=`serate/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;const {error}=await supabaseClient.storage.from('locandine').upload(fileName,file,{cacheControl:'3600',upsert:false,contentType:file.type});if(error){console.error(error);msg.textContent='Errore caricamento locandina.';return;}const {data}=supabaseClient.storage.from('locandine').getPublicUrl(fileName);document.getElementById('locandina').value=data.publicUrl;msg.textContent='Locandina caricata.';});
function clearForm(){['serataId','titolo','data','menu','programma','locandina','linkApple'].forEach(id=>document.getElementById(id).value='');document.getElementById('locandinaFile').value='';document.getElementById('quotaTavolo').value='0';document.getElementById('quotaDopocena').value='0';document.getElementById('internaAttiva').checked=false;document.getElementById('internaPosti').value='';document.getElementById('esternaAttiva').checked=false;document.getElementById('esternaPosti').value='';document.getElementById('esternaExtra').value='10';document.getElementById('giardinoAttiva').checked=false;document.getElementById('giardinoPosti').value='6';document.getElementById('giardinoExtra').value='10';showPreview('');msg.textContent='';}
async function loadSerataSale(serataId){const {data,error}=await supabaseClient.from('serata_sale').select('*').eq('serata_id',serataId);if(error){console.error(error);return [];}return data||[];}
async function fillForm(ev){clearForm();document.getElementById('serataId').value=ev.id||'';document.getElementById('titolo').value=ev.titolo||'';document.getElementById('data').value=(ev.data||'').slice(0,10);document.getElementById('menu').value=ev.menu||'';document.getElementById('programma').value=ev.programma||'';document.getElementById('locandina').value=ev.locandina||'';document.getElementById('linkApple').value=ev.link_apple||'';document.getElementById('quotaTavolo').value=Number(ev.quota_tavolo||0);document.getElementById('quotaDopocena').value=Number(ev.quota_dopocena||0);showPreview(ev.locandina||'');const sale=await loadSerataSale(ev.id);sale.forEach(s=>{if(s.sala_codice==='interna'){internaAttiva.checked=!!s.attiva;internaPosti.value=s.posti_totali||'';}if(s.sala_codice==='esterna'){esternaAttiva.checked=!!s.attiva;esternaPosti.value=s.posti_totali||'';esternaExtra.value=s.posti_extra??10;}if(s.sala_codice==='giardino'){giardinoAttiva.checked=!!s.attiva;giardinoPosti.value=s.posti_totali||6;giardinoExtra.value=s.posti_extra??10;}});document.getElementById('formPanel').classList.remove('collapsed');document.getElementById('salePanel').classList.remove('collapsed');window.scrollTo({top:0,behavior:'smooth'});}
function renderEventsForDate(dateStr){const box=document.getElementById('dayEvents');const events=allEvents.filter(ev=>ev.data===dateStr).sort((a,b)=>(a.titolo||'').localeCompare(b.titolo||''));if(!events.length){box.innerHTML=`<div class="note">Nessuna serata in data ${formatDateItalian(dateStr)}.</div>`;return;}box.innerHTML=events.map(ev=>`<div class="event-row"><h4>${ev.titolo||'Serata'}</h4><div>${formatDateItalian(ev.data)}</div><div class="admin-actions"><button class="button secondary" data-edit="${ev.id}">Modifica</button><a class="button secondary" href="evento.html?id=${ev.id}">Gestisci</a><button class="button secondary" data-share="${ev.id}">Condividi</button><button class="button danger" data-delete="${ev.id}">Elimina</button></div></div>`).join('');box.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>{const ev=allEvents.find(x=>String(x.id)===b.dataset.edit);if(ev) fillForm(ev);}));box.querySelectorAll('[data-share]').forEach(b=>b.addEventListener('click',()=>{const ev=allEvents.find(x=>String(x.id)===b.dataset.share);if(ev) shareEvent(ev);}));box.querySelectorAll('[data-delete]').forEach(b=>b.addEventListener('click',()=>deleteEvent(b.dataset.delete)));}
function renderCalendar(){const mount=document.getElementById('calendarMount');const title=document.getElementById('calendarTitle');const year=currentMonthDate.getFullYear(),month=currentMonthDate.getMonth();title.textContent=`${MONTHS[month]} ${year}`;mount.innerHTML='';DAYS.forEach(day=>{const h=document.createElement('div');h.className='calendar-head';h.textContent=day;mount.appendChild(h)});const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0);let startOffset=firstDay.getDay()-1;if(startOffset<0)startOffset=6;for(let i=0;i<startOffset;i++){const empty=document.createElement('div');empty.className='calendar-day empty';mount.appendChild(empty);}const today=new Date();for(let dayNum=1;dayNum<=lastDay.getDate();dayNum++){const date=new Date(year,month,dayNum);const dateStr=ymdLocal(date);const events=allEvents.filter(ev=>ev.data===dateStr);const day=document.createElement('div');day.className='calendar-day';if(sameDay(date,today))day.classList.add('today');if(events.length)day.classList.add('has-event');day.innerHTML=`<div class="calendar-num">${dayNum}</div>${events.length?'<div class="calendar-dot"></div>':''}`;day.addEventListener('click',()=>renderEventsForDate(dateStr));mount.appendChild(day);}renderEventsForDate(ymdLocal(new Date(year,month,1)));}
async function loadAllEvents(){const {data,error}=await supabaseClient.from('serate').select('*').order('data',{ascending:true});if(error){console.error(error);document.getElementById('dayEvents').innerHTML='<div class="note">Errore caricamento serate.</div>';return;}allEvents=data||[];renderCalendar();}
async function deleteEvent(id){const ev=allEvents.find(x=>String(x.id)===String(id));if(!ev||!confirm(`Eliminare la serata "${ev.titolo}"?`))return;const {error}=await supabaseClient.from('serate').delete().eq('id',id);if(error){console.error(error);msg.textContent='Errore eliminazione serata.';return;}msg.textContent='Serata eliminata.';clearForm();await loadAllEvents();}
form.addEventListener('submit', async e=>{e.preventDefault();msg.textContent='';const savedId=document.getElementById('serataId').value.trim();const payload={titolo:document.getElementById('titolo').value.trim(),data:document.getElementById('data').value.trim(),menu:document.getElementById('menu').value.trim(),programma:document.getElementById('programma').value.trim(),locandina:document.getElementById('locandina').value.trim(),link_apple:document.getElementById('linkApple').value.trim(),quota_tavolo:parseFloat(document.getElementById('quotaTavolo').value||0),quota_dopocena:parseFloat(document.getElementById('quotaDopocena').value||0),is_standard:false,standard_type:null};if(!payload.titolo||!payload.data||!payload.locandina){msg.textContent='Inserisci titolo, data e locandina.';return;}let finalId=savedId;if(savedId){const {error}=await supabaseClient.from('serate').update(payload).eq('id',savedId);if(error){console.error(error);msg.textContent='Errore modifica serata.';return;}}else{const {data,error}=await supabaseClient.from('serate').insert([payload]).select().single();if(error||!data){console.error(error);msg.textContent='Errore salvataggio serata.';return;}finalId=data.id;}const {error:delSale}=await supabaseClient.from('serata_sale').delete().eq('serata_id',finalId);if(delSale){console.error(delSale);msg.textContent='Errore salvataggio sale.';return;}const saleRows=[];if(internaAttiva.checked) saleRows.push({serata_id:finalId,sala_codice:'interna',attiva:true,posti_totali:parseInt(internaPosti.value||0),posti_extra:0});if(esternaAttiva.checked) saleRows.push({serata_id:finalId,sala_codice:'esterna',attiva:true,posti_totali:parseInt(esternaPosti.value||0),posti_extra:parseInt(esternaExtra.value||0)});if(giardinoAttiva.checked) saleRows.push({serata_id:finalId,sala_codice:'giardino',attiva:true,posti_totali:parseInt(giardinoPosti.value||0),posti_extra:parseInt(giardinoExtra.value||0)});if(!saleRows.length){msg.textContent='Attiva almeno una sala.';return;}const {error:saleError}=await supabaseClient.from('serata_sale').insert(saleRows);if(saleError){console.error(saleError);msg.textContent='Errore salvataggio sale.';return;}msg.textContent='Serata salvata.';clearForm();await loadAllEvents();});
document.getElementById('resetBtn').addEventListener('click',clearForm);document.getElementById('prevMonthBtn').addEventListener('click',()=>{currentMonthDate=new Date(currentMonthDate.getFullYear(),currentMonthDate.getMonth()-1,1);renderCalendar();});document.getElementById('nextMonthBtn').addEventListener('click',()=>{currentMonthDate=new Date(currentMonthDate.getFullYear(),currentMonthDate.getMonth()+1,1);renderCalendar();});
document.addEventListener('DOMContentLoaded', async()=>{setupMenu();await loadAllEvents();document.getElementById('logoutBtn').addEventListener('click',e=>{e.preventDefault();localStorage.removeItem('manager_auth_ok');location.href='login.html';});});
</script></body></html>
