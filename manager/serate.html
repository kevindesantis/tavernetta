<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tavernetta Manager - Serate</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>

<style>

.page{
max-width:900px;
margin:auto;
padding:20px;
}

.serata{
background:#fff;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.serata img{
width:100%;
max-width:300px;
border-radius:8px;
margin-bottom:10px;
}

button{
margin:5px;
}

</style>

</head>

<body>

<div class="page">

<h1>Gestione Serate</h1>

<button onclick="apriNuovaSerata()">➕ Nuova serata</button>

<div id="listaSerate"></div>

</div>

<script>

async function caricaSerate(){

const { data, error } = await supabaseClient
.from("serate")
.select("*")
.order("data",{ascending:false})

if(error){
console.log(error)
return
}

const box=document.getElementById("listaSerate")
box.innerHTML=""

data.forEach(ev=>{

const div=document.createElement("div")
div.className="serata"

const img=ev.locandina || "../img/logo.png"

div.innerHTML=`

<img src="${img}">

<h3>${ev.titolo}</h3>

<p><b>Data:</b> ${ev.data}</p>

<p>${ev.programma || ""}</p>

<button onclick="gestisciEvento('${ev.id}')">
Gestisci posti
</button>

<button onclick="modificaEvento('${ev.id}')">
Modifica
</button>

<button onclick="condividiEvento('${ev.id}','${ev.titolo}','${ev.data}')">
Condividi
</button>

<button onclick="eliminaEvento('${ev.id}')">
Elimina
</button>

`

box.appendChild(div)

})

}

function gestisciEvento(id){

window.location.href="evento.html?id="+id

}

function modificaEvento(id){

window.location.href="evento.html?id="+id+"&edit=1"

}

async function eliminaEvento(id){

if(!confirm("Eliminare la serata?")) return

await supabaseClient
.from("serate")
.delete()
.eq("id",id)

caricaSerate()

}

function apriNuovaSerata(){

window.location.href="evento.html?new=1"

}

function condividiEvento(id,titolo,data){

const url=`https://tavernettadakevin.it/evento.html?id=${id}`

const text=`${titolo}
${data}

Prenota qui:
${url}`

if(navigator.share){

navigator.share({
title:titolo,
text:text,
url:url
})

}else{

navigator.clipboard.writeText(url)
alert("Link copiato")

}

}

caricaSerate()

</script>

</body>
</html>
