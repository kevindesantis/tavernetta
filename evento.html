<script>

async function aggiornaMetaEvento() {

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id) return;

const { data } = await supabase
.from("serate")
.select("*")
.eq("id", id)
.single();

if(!data) return;

const titolo = data.titolo || "Serata Tavernetta";
const descrizione = data.menu || "Scopri la serata alla Tavernetta da Kevin";
const immagine = data.locandina;

document.getElementById("og-title").setAttribute("content", titolo);
document.getElementById("og-desc").setAttribute("content", descrizione);
document.getElementById("og-image").setAttribute("content", immagine);
document.getElementById("og-url").setAttribute("content", window.location.href);

document.getElementById("tw-title").setAttribute("content", titolo);
document.getElementById("tw-desc").setAttribute("content", descrizione);
document.getElementById("tw-image").setAttribute("content", immagine);

}

document.addEventListener("DOMContentLoaded", aggiornaMetaEvento);

</script>

<section class="section">

<h2>Prenota i posti</h2>

<div class="seat-legend">

<span class="legend-dot dot-free"></span> disponibile
<span class="legend-dot dot-selected"></span> selezionato
<span class="legend-dot dot-taken"></span> occupato

</div>

<div class="booking-wrap">

<div id="tableGrid" class="table-grid"></div>
</div>

<input id="nomeInput" type="text" placeholder="Nome e cognome">
<input id="telefonoInput" type="text" placeholder="Telefono">

<strong>Posti disponibili:</strong>
<span id="availableSeatsText">0</span>
</div>

<div class="selected-box">
<strong>Posti occupati:</strong>
<span id="occupiedSeatsText">0</span>
</div>

<div class="selected-box">
<strong>Posti selezionati:</strong>
<span id="selectedSeatsText">nessuno</span>
</div>

<div class="selected-box">
<strong>Totale selezionati:</strong>
<span id="selectedCountText">0</span>
</div>

<p id="bookingMsg" class="note"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/site.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const serataId = params.get("id");

let currentEvent=null;
let occupiedSeats=[];
let selectedSeats=[];

function isPastEvent(dateStr){

const eventDate=new Date(dateStr+"T00:00:00");
const today=new Date();
today.setHours(0,0,0,0);

return eventDate<today;

}

function lockPastEvent(){

document.getElementById("nomeInput").disabled=true;
document.getElementById("telefonoInput").disabled=true;
document.getElementById("bookBtn").disabled=true;

document.getElementById("bookingMsg").textContent=
"Le prenotazioni per questa serata sono chiuse.";

}

function updateSelectedInfo(){

document.getElementById("selectedSeatsText").textContent=
selectedSeats.length?selectedSeats.join(", "):"nessuno";

document.getElementById("selectedCountText").textContent=
selectedSeats.length;

}

function updateAvailabilityInfo(){

const total=currentEvent.posti_totali;
const occupied=occupiedSeats.length;
const available=total-occupied;

document.getElementById("availableSeatsText").textContent=
`${available} / ${total}`;

document.getElementById("occupiedSeatsText").textContent=
`${occupied} / ${total}`;

}

function getSeatStructure(totalSeats){

const longSide=(totalSeats-2)/2;

return{
left:1,
right:1,
top:longSide,
bottom:longSide
};

}

function createSeatButton(num,isTaken){

const btn=document.createElement("button");

btn.className="seat "+(isTaken?"taken":"free");

btn.textContent=num;

if(!isTaken){

btn.addEventListener("click",()=>{

if(selectedSeats.includes(num)){

selectedSeats=selectedSeats.filter(x=>x!==num);
btn.classList.remove("selected");
btn.classList.add("free");

}else{

selectedSeats.push(num);
btn.classList.remove("free");
btn.classList.add("selected");

}

updateSelectedInfo();

});

}

return btn;

}

function renderTable(totalSeats){

const grid=document.getElementById("tableGrid");
grid.innerHTML="";

const s=getSeatStructure(totalSeats);

const top=document.createElement("div");
top.className="top-seats";
top.style.gridColumn="2";
top.style.gridRow="1";

const left=document.createElement("div");
left.className="side-seat-wrap";
left.style.gridColumn="1";
left.style.gridRow="2";

const center=document.createElement("div");
center.className="rect-table";
center.style.gridColumn="2";
center.style.gridRow="2";

const right=document.createElement("div");
right.className="side-seat-wrap";
right.style.gridColumn="3";
right.style.gridRow="2";

const bottom=document.createElement("div");
bottom.className="bottom-seats";
bottom.style.gridColumn="2";
bottom.style.gridRow="3";

let seatNum=1;

left.appendChild(createSeatButton(seatNum,occupiedSeats.includes(seatNum)));
seatNum++;

for(let i=0;i<s.top;i++){
top.appendChild(createSeatButton(seatNum,occupiedSeats.includes(seatNum)));
seatNum++;
}

for(let i=0;i<s.bottom;i++){
bottom.appendChild(createSeatButton(seatNum,occupiedSeats.includes(seatNum)));
seatNum++;
}

right.appendChild(createSeatButton(seatNum,occupiedSeats.includes(seatNum)));

grid.appendChild(top);
grid.appendChild(left);
grid.appendChild(center);
grid.appendChild(right);
grid.appendChild(bottom);

}

async function loadEventAndSeats(){

const {data:eventData}=await supabaseClient
.from("serate")
.select("*")
.eq("id",serataId)
.single();

currentEvent=eventData;

renderEventCard(document.getElementById("eventDetail"),currentEvent);

if(isPastEvent(currentEvent.data)){
lockPastEvent();
}

const {data:seatRows}=await supabaseClient
.from("prenotazione_posti")
.select("posto_numero")
.eq("serata_id",serataId);

occupiedSeats=seatRows.map(r=>r.posto_numero);

renderTable(currentEvent.posti_totali);

updateAvailabilityInfo();

updateSelectedInfo();

}

async function saveBooking(){

const nome=document.getElementById("nomeInput").value.trim();
const telefono=document.getElementById("telefonoInput").value.trim();
const msg=document.getElementById("bookingMsg");

msg.textContent="";

if(isPastEvent(currentEvent.data)){
msg.textContent="Non puoi prenotare una serata passata.";
return;
}

if(!nome||!telefono){
msg.textContent="Inserisci nome e telefono.";
return;
}

if(!selectedSeats.length){
msg.textContent="Seleziona almeno un posto.";
return;
}

const {data:prenotazione}=await supabaseClient
.from("prenotazioni")
.insert([{serata_id:serataId,nome,telefono}])
.select()
.single();

const postiRows=selectedSeats.map(n=>({
prenotazione_id:prenotazione.id,
serata_id:serataId,
posto_numero:n
}));

await supabaseClient
.from("prenotazione_posti")
.insert(postiRows);

msg.textContent=
`Prenotazione salvata! Posti: ${selectedSeats.join(", ")}`;

document.getElementById("nomeInput").value="";
document.getElementById("telefonoInput").value="";
selectedSeats=[];

await loadEventAndSeats();

}

document.addEventListener("DOMContentLoaded",async()=>{

setupMenu();

await loadEventAndSeats();

document
.getElementById("bookBtn")
.addEventListener("click",saveBooking);

});

</script>

</body>

</html>
