<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serata - Tavernetta da Kevin</title>

<link rel="icon" type="image/png" href="img/logo.png">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/track-visit.js"></script>

<style>

#roomCanvas{
position:relative;
width:100%;
height:700px;
background:#faf7f0;
border-radius:12px;
overflow:auto;
touch-action:pan-x pan-y pinch-zoom;
}

.seat{
position:absolute;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
cursor:pointer;
background:#e0e0e0;
}

.seat.tavolo{
background:#f4c430;
}

.seat.extra{
background:#8ecae6;
}

.seat.selected{
background:#4caf50;
color:white;
}

.seat.occupied{
background:#b9382f;
color:white;
pointer-events:none;
}

.table{
position:absolute;
background:#8b5a2b;
border-radius:20px;
}

.legend{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.legend div{
display:flex;
align-items:center;
gap:5px;
font-size:14px;
}

.legend span{
width:18px;
height:18px;
display:inline-block;
border-radius:50%;
}

</style>

</head>

<body>

<div class="page">

<h2 id="titoloSerata"></h2>

<img id="locandina" style="max-width:400px;width:100%;border-radius:12px;display:none;">

<p id="programma"></p>

<div class="legend">

<div><span style="background:#f4c430"></span>posti cena</div>
<div><span style="background:#8ecae6"></span>posti dopocena</div>
<div><span style="background:#4caf50"></span>selezionati</div>
<div><span style="background:#b9382f"></span>occupati</div>

</div>

<div id="roomCanvas"></div>

<p id="stats"></p>

<form id="prenotaForm">

<input placeholder="Nome prenotazione" id="nome" required>

<input placeholder="Telefono (facoltativo)" id="telefono">

<input placeholder="Email (facoltativa)" id="email">

<textarea placeholder="Allergie o intolleranze (facoltativo)" id="allergie"></textarea>

<textarea placeholder="Richieste (facoltativo)" id="richieste"></textarea>

<button type="submit">Prenota</button>

</form>

</div>

<script>

const params = new URLSearchParams(location.search)
const idSerata = params.get("id")

let selectedSeats = []

const canvas = document.getElementById("roomCanvas")

function addSeat(code,x,y,type){

const s=document.createElement("div")

s.className="seat "+type
s.innerText=code
s.style.left=x+"px"
s.style.top=y+"px"

s.onclick=()=>{

if(s.classList.contains("occupied")) return

if(s.classList.contains("selected")){
s.classList.remove("selected")
selectedSeats=selectedSeats.filter(a=>a!==code)
}else{
s.classList.add("selected")
selectedSeats.push(code)
}

updateStats()

}

canvas.appendChild(s)

}

function addTable(x,y,w,h){

const t=document.createElement("div")

t.className="table"

t.style.left=x+"px"
t.style.top=y+"px"
t.style.width=w+"px"
t.style.height=h+"px"

canvas.appendChild(t)

}

function updateStats(){

document.getElementById("stats").innerText=
"posti selezionati: "+selectedSeats.length

}

async function load(){

const {data:serata}=await supabaseClient
.from("serate")
.select("*")
.eq("id",idSerata)
.single()

if(!serata)return

document.getElementById("titoloSerata").innerText=serata.titolo
document.getElementById("programma").innerText=serata.programma

if(serata.locandina){
const img=document.getElementById("locandina")
img.src=serata.locandina
img.style.display="block"
}

const today=new Date()
const dateEvent=new Date(serata.data+"T23:59:00")

if(today>dateEvent){

document.getElementById("prenotaForm").style.display="none"

}

const {data:sale}=await supabaseClient
.from("serata_sale")
.select("*")
.eq("serata_id",idSerata)
.eq("attiva",true)

let yOffset=50

sale.forEach(s=>{

if(s.sala_codice==="interna"){

drawInternal(s.posti_totali,yOffset)

yOffset+=250

}

if(s.sala_codice==="esterna"){

drawExternal(s.posti_totali,s.posti_extra,yOffset)

yOffset+=250

}

if(s.sala_codice==="giardino"){

drawGarden(s.posti_totali,s.posti_extra,yOffset)

yOffset+=250

}

})

loadBooked()

}

function drawInternal(n,y){

addTable(300,y,200,120)

let left=2
let right=8

for(let i=0;i<n/2;i++){

addSeat(i+1,270,y+20+i*18,"tavolo")
addSeat(i+1+n/2,520,y+20+i*18,"tavolo")

}

}

function drawExternal(n,m,y){

addTable(300,y,200,120)

for(let i=0;i<n/2;i++){

addSeat("E"+(i+1),270,y+20+i*18,"tavolo")
addSeat("E"+(i+1+n/2),520,y+20+i*18,"tavolo")

}

for(let i=0;i<m;i++){

addSeat("M"+(i+1),250+i*40,y-60,"extra")

}

}

function drawGarden(n,p,y){

addTable(320,y,160,80)

addSeat("G1",390,y-30,"tavolo")
addSeat("G2",390,y+90,"tavolo")

for(let i=0;i<(n-2)/2;i++){

addSeat("G"+(i+3),300,y+10+i*30,"tavolo")
addSeat("G"+(i+5),460,y+10+i*30,"tavolo")

}

for(let i=0;i<p;i++){

addSeat("P"+(i+1),550,y-20+i*25,"extra")

}

}

async function loadBooked(){

const {data}=await supabaseClient
.from("prenotazione_posti")
.select("posto_numero")
.eq("serata_id",idSerata)

data.forEach(p=>{

const el=[...document.querySelectorAll(".seat")]
.find(a=>a.innerText==p.posto_numero)

if(el)el.classList.add("occupied")

})

}

document.getElementById("prenotaForm").onsubmit=async e=>{

e.preventDefault()

if(selectedSeats.length===0){
alert("Seleziona almeno un posto")
return
}

const nome=document.getElementById("nome").value

const {data:pren}=await supabaseClient
.from("prenotazioni")
.insert([{nome,serata_id:idSerata}])
.select()
.single()

const rows=selectedSeats.map(s=>({
prenotazione_id:pren.id,
serata_id:idSerata,
posto_numero:s
}))

await supabaseClient
.from("prenotazione_posti")
.insert(rows)

alert("Prenotazione confermata")

location.reload()

}

load()

</script>

</body>
</html>
