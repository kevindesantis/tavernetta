<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serata – Tavernetta da Kevin</title>

<link rel="stylesheet" href="css/style.css">

<style>

.tavolo-container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-top:30px;
}

.row{
display:flex;
gap:8px;
}

.posto{
width:42px;
height:42px;
border-radius:10px;
border:none;
background:#3dbb3d;
color:white;
font-weight:bold;
cursor:pointer;
}

.posto.occupato{
background:#e74c3c;
}

.posto.selezionato{
background:#f1c40f;
color:black;
}

.divani-container{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.divani-row{
display:flex;
gap:10px;
}

</style>

</head>

<body>

<h2 style="text-align:center;">Scegli i posti</h2>

<div class="tavolo-container">

<div class="row">
<button class="posto" data-posto="2">2</button>
<button class="posto" data-posto="3">3</button>
<button class="posto" data-posto="4">4</button>
<button class="posto" data-posto="5">5</button>
<button class="posto" data-posto="6">6</button>
<button class="posto" data-posto="7">7</button>
</div>

<div class="row">
<button class="posto" data-posto="1">1</button>

<div style="width:240px;height:60px;background:#ddd;border-radius:20px;text-align:center;line-height:60px;">
TAVOLO
</div>

<button class="posto" data-posto="14">14</button>
</div>

<div class="row">
<button class="posto" data-posto="8">8</button>
<button class="posto" data-posto="9">9</button>
<button class="posto" data-posto="10">10</button>
<button class="posto" data-posto="11">11</button>
<button class="posto" data-posto="12">12</button>
<button class="posto" data-posto="13">13</button>
</div>

</div>

<h3 style="text-align:center;margin-top:40px;">Divanetti</h3>

<div class="divani-container">

<div class="divani-row">
<button class="posto" data-posto="D1">D1</button>
<button class="posto" data-posto="D2">D2</button>
<button class="posto" data-posto="D3">D3</button>
<button class="posto" data-posto="D4">D4</button>
<button class="posto" data-posto="D5">D5</button>
</div>

<div class="divani-row">
<button class="posto" data-posto="D6">D6</button>
<button class="posto" data-posto="D7">D7</button>
</div>

<div class="divani-row">
<button class="posto" data-posto="S1">S1</button>
<button class="posto" data-posto="S2">S2</button>
</div>

<div class="divani-row">
<button class="posto" data-posto="D8">D8</button>
</div>

</div>

<script>

const posti=document.querySelectorAll(".posto")

posti.forEach(btn=>{

btn.addEventListener("click",()=>{

if(btn.classList.contains("occupato")) return

btn.classList.toggle("selezionato")

})

})

</script>

</body>
</html>
