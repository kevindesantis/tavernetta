<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tavernetta da Kevin</title><link rel="icon" type="image/png" href="img/logo.png"><link rel="stylesheet" href="css/style.css"><style>.wrap{display:grid;grid-template-columns:320px 1fr;gap:18px}.cover{width:100%;border-radius:16px;box-shadow:var(--shadow)} .prog{white-space:pre-line}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body>
<div class="top-bar"><img src="img/logo.png" class="logo-top"><button id="hamburger" class="hamburger">☰</button></div><div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="sidebar" class="sidebar"><img src="img/logo.png" class="side-logo"><nav><a href="index.html">Home</a><a href="serate.html">Serate</a></nav></aside>
<main class="page"><section class="section"><div id="eventBox"></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-client.js"></script><script src="js/track-visit.js"></script><script src="js/site.js"></script>
<script>
const id=new URLSearchParams(location.search).get("id");
async function loadEvent(){if(!window.supabaseClient||!id)return; const {data,error}=await supabaseClient.from("serate").select("*").eq("id",id).single(); const box=document.getElementById("eventBox"); if(error||!data){box.innerHTML='<div class="card note">Serata non trovata.</div>'; return;}
box.innerHTML=`<div class="card wrap"><img class="cover" src="${data.locandina||'img/logo.png'}"><div><h2 class="event-title">${data.titolo}</h2><p><strong>Data:</strong> ${new Date(data.data).toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}</p>${data.menu?`<p><strong>Menù</strong></p><div class="prog">${data.menu}</div>`:''}${data.programma?`<p><strong>Programma</strong></p><div class="prog">${data.programma}</div>`:''}</div></div>`}
document.addEventListener("DOMContentLoaded", async()=>{setupMenu(); await loadEvent();});
</script></body></html>
