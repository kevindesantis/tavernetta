<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serata – Tavernetta da Kevin</title>
  <meta name="description" content="Scopri i dettagli della serata alla Tavernetta da Kevin e prenota il tuo posto.">

  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="canonical" href="https://tavernettadakevin.it/evento.html">

  <style>
    .booking-wrap{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:20px;
    }

    .seat-legend{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin:10px 0 18px;
      font-size:14px;
    }

    .legend-dot{
      width:16px;
      height:16px;
      border-radius:50%;
      display:inline-block;
    }

    .dot-free{background:#2e9d50;}
    .dot-taken{background:#c43b2f;}
    .dot-selected{background:#d4a017;}

    .table-layout{
      background:var(--card);
      border-radius:16px;
      padding:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .viewport{
      width:100%;
      min-height:560px;
      overflow:hidden;
      position:relative;
      touch-action:none;
      border-radius:12px;
      background:rgba(255,255,255,.25);
    }

    .zoom-surface{
      transform-origin:0 0;
      will-change:transform;
      width:max-content;
      min-width:100%;
      padding:10px;
    }

    .room-layout{
      min-width:860px;
      display:flex;
      flex-direction:column;
      gap:28px;
      align-items:center;
    }

    .plan-block{
      width:100%;
      display:flex;
      justify-content:center;
    }

    .seat{
      min-width:42px;
      height:42px;
      padding:0 10px;
      border-radius:50px;
      border:0;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
      font-size:14px;
    }

    .seat.free{background:#2e9d50;}
    .seat.taken{background:#c43b2f;cursor:not-allowed;}
    .seat.selected{background:#d4a017;color:#111;}

    .seat.free:hover{
      transform:scale(1.08);
    }

    .seat-row{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:nowrap;
    }

    .simple-table-wrap{
      width:fit-content;
      display:grid;
      grid-template-columns:48px auto 48px;
      grid-template-rows:auto 96px auto;
      gap:8px;
      align-items:center;
      justify-items:center;
    }

    .top-seats,
    .bottom-seats{
      display:flex;
      gap:10px;
      width:auto;
      justify-content:center;
      flex-wrap:nowrap;
    }

    .left-seat,
    .right-seat{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .rect-table{
      width:var(--table-width, 340px);
      background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);
      border-radius:22px;
      height:96px;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.14),
        0 8px 20px rgba(0,0,0,.12);
    }

    .internal-wrap{
      width:100%;
      display:grid;
      grid-template-columns:auto 1fr auto;
      grid-template-rows:auto auto auto auto;
      column-gap:16px;
      row-gap:14px;
      align-items:center;
      justify-items:center;
    }

    .top-divans{
      grid-column:2;
      grid-row:1;
      width:100%;
      display:flex;
      justify-content:flex-end;
      padding-right:70px;
    }

    .right-side{
      grid-column:3;
      grid-row:2 / span 2;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .right-side .seat-col{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }

    .bottom-divans{
      grid-column:2;
      grid-row:4;
      width:100%;
      display:flex;
      justify-content:flex-end;
      padding-right:18px;
    }

    .external-wrap{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      width:100%;
    }

    .garden-wrap{
      display:grid;
      grid-template-columns:auto auto;
      column-gap:18px;
      align-items:center;
      justify-items:center;
      width:fit-content;
    }

   .garden-table-wrap{
  display:grid;
  grid-template-columns:48px var(--garden-table-width, 76px) 48px;
  grid-template-rows:auto auto var(--garden-table-mid, 70px) auto auto;
  column-gap:10px;
  row-gap:10px;
  align-items:center;
  justify-items:center;
  width:fit-content;
}

.garden-table{
  grid-column:2;
  grid-row:2 / span 3;
  width:var(--garden-table-width, 76px);
  height:var(--garden-table-height, 140px);
  background:linear-gradient(180deg,#9a6732 0%,#7b4e24 100%);
  border-radius:18px;
  box-shadow:
    inset 0 0 0 4px rgba(255,255,255,.14),
    0 8px 20px rgba(0,0,0,.12);
}

    .g-top{ grid-column:2; grid-row:1; }
    .g-bottom{ grid-column:2; grid-row:5; }
    .g-left-top{ grid-column:1; grid-row:2; }
    .g-left-bottom{ grid-column:1; grid-row:4; }
    .g-right-top{ grid-column:3; grid-row:2; }
    .g-right-bottom{ grid-column:3; grid-row:4; }

    .garden-right-poltrone{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      justify-content:center;
      min-width:56px;
    }

    .form-box input,
    .form-box textarea{
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #d6b98a;
      font-size:16px;
      font-family:inherit;
      resize:vertical;
    }

    .form-box textarea{
      min-height:84px;
    }

    .summary-box{
      background:#fffaf2;
      border:1px solid #ead6b1;
      border-radius:12px;
      padding:12px;
      margin-bottom:12px;
      font-size:14px;
    }

    .summary-box h4{
      margin:0 0 8px;
      color:var(--brown);
    }

    .selected-box{
      margin:12px 0;
      font-size:15px;
    }

    .zoom-controls{
      display:flex;
      gap:8px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .zoom-controls .button{
      padding:8px 12px;
      min-width:auto;
    }

    @media(max-width:900px){
      .booking-wrap{
        grid-template-columns:1fr;
      }

      .room-layout{
        min-width:760px;
      }

      .viewport{
        min-height:480px;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img src="img/logo.png" class="logo-top" alt="Tavernetta da Kevin">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="img/logo.png" class="side-logo" alt="Logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="serate.html">Serate</a>
      <a href="calendario.html">Calendario</a>
      <a href="dove.html">Dove siamo</a>
      <a href="contatti.html">Contattaci</a>
      <a href="admin.html">Admin</a>
    </nav>
  </aside>

  <main class="page">

    <section class="section">
      <h2>Serata</h2>
      <div id="eventDetail"></div>
    </section>

    <section class="section">
      <h2>Prenota i posti</h2>

      <div class="seat-legend">
        <span class="legend-dot dot-free"></span> disponibile
        <span class="legend-dot dot-selected"></span> selezionato
        <span class="legend-dot dot-taken"></span> occupato
      </div>

      <div class="booking-wrap">
        <div class="table-layout">
          <div class="zoom-controls">
            <button id="zoomInBtn" type="button" class="button secondary">+</button>
            <button id="zoomOutBtn" type="button" class="button secondary">−</button>
            <button id="zoomResetBtn" type="button" class="button secondary">Reset</button>
          </div>

          <div id="viewport" class="viewport">
            <div id="zoomSurface" class="zoom-surface">
              <div id="roomLayout" class="room-layout"></div>
            </div>
          </div>
        </div>

        <div class="card form-box">
          <h3 class="event-title">Prenotazione</h3>
          <p id="salaInfoText" class="note"></p>

          <div id="summaryBox" class="summary-box"></div>

          <input id="nomeInput" type="text" placeholder="Nome e cognome">
          <input id="telefonoInput" type="text" placeholder="Telefono (opzionale)">
          <input id="emailInput" type="email" placeholder="Email (opzionale)">
          <textarea id="allergieInput" placeholder="Allergie e intolleranze (opzionale)"></textarea>
          <textarea id="richiesteInput" placeholder="Richieste (opzionale)"></textarea>

          <div class="selected-box">
            <strong>Posti selezionati:</strong>
            <span id="selectedSeatsText">nessuno</span>
          </div>

          <div class="selected-box">
            <strong>Totale selezionati:</strong>
            <span id="selectedCountText">0</span>
          </div>

          <button id="bookBtn" class="button">Prenota</button>
          <p id="bookingMsg" class="note"></p>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/site.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const serataId = params.get("id");

    let currentEvent = null;
    let occupiedSeats = [];
    let selectedSeats = [];
    let saleConfig = {};

    const INTERNAL_EXTRA = ["D1","D2","D3","D4","D5","D6","D7","S1","D8","S2"];

    const viewport = document.getElementById("viewport");
    const zoomSurface = document.getElementById("zoomSurface");

    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let lastTouchDistance = null;
    let pinchStartScale = 1;

    function applyTransform() {
      zoomSurface.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function resetTransform() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function clampScale(nextScale) {
      return Math.min(2.5, Math.max(0.6, nextScale));
    }

    document.getElementById("zoomInBtn").addEventListener("click", () => {
      scale = clampScale(scale + 0.15);
      applyTransform();
    });

    document.getElementById("zoomOutBtn").addEventListener("click", () => {
      scale = clampScale(scale - 0.15);
      applyTransform();
    });

    document.getElementById("zoomResetBtn").addEventListener("click", resetTransform);

    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      scale = clampScale(scale + delta);
      applyTransform();
    }, { passive: false });

    viewport.addEventListener("pointerdown", (e) => {
  const seatBtn = e.target.closest(".seat");
  if (seatBtn) return;

  isDragging = true;
  dragStartX = e.clientX - translateX;
  dragStartY = e.clientY - translateY;
  viewport.setPointerCapture(e.pointerId);

    });

    viewport.addEventListener("pointermove", (e) => {
      if (!isDragging) return;
      translateX = e.clientX - dragStartX;
      translateY = e.clientY - dragStartY;
      applyTransform();
    });

    function stopDrag() {
      isDragging = false;
    }

    viewport.addEventListener("pointerup", stopDrag);
    viewport.addEventListener("pointercancel", stopDrag);
    viewport.addEventListener("click", (e) => {
  const seatBtn = e.target.closest(".seat");
  if (!seatBtn) return;
});
    viewport.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDistance = Math.hypot(dx, dy);
        pinchStartScale = scale;
      }
    }, { passive: true });

    viewport.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && lastTouchDistance) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const ratio = dist / lastTouchDistance;
        scale = clampScale(pinchStartScale * ratio);
        applyTransform();
      }
    }, { passive: true });

    viewport.addEventListener("touchend", () => {
      lastTouchDistance = null;
    });

    function isPastEvent(dateStr){
      const eventDate = new Date(dateStr + "T00:00:00");
      const today = new Date();
      today.setHours(0,0,0,0);
      return eventDate < today;
    }

    function lockPastEvent(){
      document.getElementById("nomeInput").disabled = true;
      document.getElementById("telefonoInput").disabled = true;
      document.getElementById("emailInput").disabled = true;
      document.getElementById("allergieInput").disabled = true;
      document.getElementById("richiesteInput").disabled = true;
      document.getElementById("bookBtn").disabled = true;
      document.getElementById("bookingMsg").textContent =
        "Le prenotazioni per questa serata sono chiuse.";
    }

    function seatSort(a, b) {
      const aNum = /^\d+$/.test(a);
      const bNum = /^\d+$/.test(b);

      if (aNum && bNum) return Number(a) - Number(b);
      if (aNum) return -1;
      if (bNum) return 1;
      return a.localeCompare(b, "it", { numeric: true, sensitivity: "base" });
    }

    function getSeatMeta(id) {
      if (/^\d+$/.test(id)) return { sala: "interna", tipo: "tavolo" };
      if (/^D\d+$/.test(id) || /^S\d+$/.test(id)) return { sala: "interna", tipo: "divano" };
      if (/^E\d+$/.test(id)) return { sala: "esterna", tipo: "tavolo" };
      if (/^M\d+$/.test(id)) return { sala: "esterna", tipo: "muretto" };
      if (/^G\d+$/.test(id)) return { sala: "giardino", tipo: "tavolo" };
      if (/^P\d+$/.test(id)) return { sala: "giardino", tipo: "poltrona" };
      return { sala: "", tipo: "" };
    }

    function countByType(seats) {
      const summary = { tavolo: 0, divano: 0, muretto: 0, poltrona: 0 };
      seats.forEach(id => {
        const meta = getSeatMeta(id);
        if (summary[meta.tipo] !== undefined) summary[meta.tipo]++;
      });
      return summary;
    }

    function updateSelectedInfo(){
      const ordered = [...selectedSeats].sort(seatSort);
      document.getElementById("selectedSeatsText").textContent =
        ordered.length ? ordered.join(", ") : "nessuno";
      document.getElementById("selectedCountText").textContent =
        ordered.length;
    }

    function createSeatButton(id){
      const isTaken = occupiedSeats.includes(id);

      const btn = document.createElement("button");
      btn.className = "seat " + (isTaken ? "taken" : "free");
      btn.textContent = id;
      btn.type = "button";

      if (!isTaken) {
        btn.addEventListener("click", () => {
          if (selectedSeats.includes(id)) {
            selectedSeats = selectedSeats.filter(x => x !== id);
            btn.classList.remove("selected");
            btn.classList.add("free");
          } else {
            selectedSeats.push(id);
            btn.classList.remove("free");
            btn.classList.add("selected");
          }
          updateSelectedInfo();
        });
      }

      return btn;
    }

    function buildTableSeatMap(totalSeats, prefix = "") {
      const longSide = (totalSeats - 2) / 2;
      const top = [];
      const bottom = [];

      for (let i = 0; i < longSide; i++) top.push(prefix + String(2 + i));
      for (let i = 0; i < longSide; i++) bottom.push(prefix + String(2 + longSide + i));

      return {
        left: prefix + "1",
        right: prefix + String(totalSeats),
        top,
        bottom
      };
    }

    function buildSimpleTableBlock(totalSeats, prefix = "") {
      const tableMap = buildTableSeatMap(totalSeats, prefix);
      const seatWidth = 52;
      const tableWidth = Math.max(220, tableMap.top.length * seatWidth);

      const wrap = document.createElement("div");
      wrap.className = "simple-table-wrap";

      const top = document.createElement("div");
      top.className = "top-seats";
      top.style.gridColumn = "2";
      top.style.gridRow = "1";
      tableMap.top.forEach(id => top.appendChild(createSeatButton(id)));

      const left = document.createElement("div");
      left.className = "left-seat";
      left.style.gridColumn = "1";
      left.style.gridRow = "2";
      left.appendChild(createSeatButton(tableMap.left));

      const center = document.createElement("div");
      center.className = "rect-table";
      center.style.gridColumn = "2";
      center.style.gridRow = "2";
      center.style.setProperty("--table-width", `${tableWidth}px`);

      const right = document.createElement("div");
      right.className = "right-seat";
      right.style.gridColumn = "3";
      right.style.gridRow = "2";
      right.appendChild(createSeatButton(tableMap.right));

      const bottom = document.createElement("div");
      bottom.className = "bottom-seats";
      bottom.style.gridColumn = "2";
      bottom.style.gridRow = "3";
      tableMap.bottom.forEach(id => bottom.appendChild(createSeatButton(id)));

      wrap.appendChild(top);
      wrap.appendChild(left);
      wrap.appendChild(center);
      wrap.appendChild(right);
      wrap.appendChild(bottom);

      return wrap;
    }

    function buildGardenTableSeats(totalSeats) {
      const ids = [];
      for (let i = 1; i <= totalSeats; i++) ids.push(`G${i}`);
      return ids;
    }

    function buildGardenBlock(totalSeats, extraSeats) {
      const wrap = document.createElement("div");
      wrap.className = "plan-block";

      const garden = document.createElement("div");
      garden.className = "garden-wrap";

      const tableWrap = document.createElement("div");
      tableWrap.className = "garden-table-wrap";

      const gIds = buildGardenTableSeats(totalSeats);

      const topCount = Math.max(1, Math.floor((totalSeats - 4) / 2));
      const bottomCount = Math.max(1, totalSeats - 4 - topCount);

      const topSeats = gIds.slice(0, topCount);
      const leftSeats = gIds.slice(topCount, topCount + 2);
      const rightSeats = gIds.slice(topCount + 2, topCount + 4);
      const bottomSeats = gIds.slice(topCount + 4);

      const gTop = document.createElement("div");
      gTop.className = "seat-row";
      gTop.style.gridColumn = "2";
      gTop.style.gridRow = "1";
      topSeats.forEach(id => gTop.appendChild(createSeatButton(id)));

      const gBottom = document.createElement("div");
      gBottom.className = "seat-row";
      gBottom.style.gridColumn = "2";
      gBottom.style.gridRow = "5";
      bottomSeats.forEach(id => gBottom.appendChild(createSeatButton(id)));

      const leftTopId = leftSeats[0];
      const leftBottomId = leftSeats[1];
      const rightTopId = rightSeats[0];
      const rightBottomId = rightSeats[1];

      const gLeftTop = leftTopId ? createSeatButton(leftTopId) : document.createElement("div");
      const gLeftBottom = leftBottomId ? createSeatButton(leftBottomId) : document.createElement("div");
      const gRightTop = rightTopId ? createSeatButton(rightTopId) : document.createElement("div");
      const gRightBottom = rightBottomId ? createSeatButton(rightBottomId) : document.createElement("div");

      gLeftTop.classList.add("g-left-top");
      gLeftBottom.classList.add("g-left-bottom");
      gRightTop.classList.add("g-right-top");
      gRightBottom.classList.add("g-right-bottom");

      if (!leftTopId) gLeftTop.style.visibility = "hidden";
      if (!leftBottomId) gLeftBottom.style.visibility = "hidden";
      if (!rightTopId) gRightTop.style.visibility = "hidden";
      if (!rightBottomId) gRightBottom.style.visibility = "hidden";

      const table = document.createElement("div");
      table.className = "garden-table";

      tableWrap.appendChild(gTop);
      tableWrap.appendChild(gBottom);
      tableWrap.appendChild(gLeftTop);
      tableWrap.appendChild(gLeftBottom);
      tableWrap.appendChild(gRightTop);
      tableWrap.appendChild(gRightBottom);
      tableWrap.appendChild(table);

      const poltrone = document.createElement("div");
      poltrone.className = "garden-right-poltrone";
      for (let i = 1; i <= extraSeats; i++) {
        poltrone.appendChild(createSeatButton(`P${i}`));
      }

      garden.appendChild(tableWrap);
      garden.appendChild(poltrone);

      wrap.appendChild(garden);
      return wrap;
    }

    function buildExternalBlock(totalSeats, extraSeats) {
      const wrap = document.createElement("div");
      wrap.className = "plan-block";

      const external = document.createElement("div");
      external.className = "external-wrap";

      const topExtras = document.createElement("div");
      topExtras.className = "seat-row";
      for (let i = 1; i <= extraSeats; i++) {
        topExtras.appendChild(createSeatButton(`M${i}`));
      }

      external.appendChild(topExtras);
      external.appendChild(buildSimpleTableBlock(totalSeats, "E"));

      wrap.appendChild(external);
      return wrap;
    }

    function buildInternalBlock(totalSeats) {
      const container = document.createElement("div");
      container.className = "plan-block";

      const internal = document.createElement("div");
      internal.className = "internal-wrap";

      const topDivans = document.createElement("div");
      topDivans.className = "top-divans";
      const topDivanRow = document.createElement("div");
      topDivanRow.className = "seat-row";
      ["D1","D2","D3","D4","D5"].forEach(id => topDivanRow.appendChild(createSeatButton(id)));
      topDivans.appendChild(topDivanRow);

      const tableWrap = buildSimpleTableBlock(totalSeats, "");
      tableWrap.style.gridColumn = "2";
      tableWrap.style.gridRow = "2 / span 2";

      const rightSide = document.createElement("div");
      rightSide.className = "right-side";
      const rightCol = document.createElement("div");
      rightCol.className = "seat-col";
      ["D6","D7","S1"].forEach(id => rightCol.appendChild(createSeatButton(id)));
      rightSide.appendChild(rightCol);

      const bottomDivans = document.createElement("div");
      bottomDivans.className = "bottom-divans";
      const bottomRow = document.createElement("div");
      bottomRow.className = "seat-row";
      ["D8","S2"].forEach(id => bottomRow.appendChild(createSeatButton(id)));
      bottomDivans.appendChild(bottomRow);

      internal.appendChild(topDivans);
      internal.appendChild(tableWrap);
      internal.appendChild(rightSide);
      internal.appendChild(bottomDivans);

      container.appendChild(internal);
      return container;
    }

    function renderRoom() {
      const room = document.getElementById("roomLayout");
      room.innerHTML = "";

      if (saleConfig.giardino?.attiva) {
        room.appendChild(buildGardenBlock(saleConfig.giardino.posti_totali, saleConfig.giardino.posti_extra));
      }

      if (saleConfig.esterna?.attiva) {
        room.appendChild(buildExternalBlock(saleConfig.esterna.posti_totali, saleConfig.esterna.posti_extra));
      }

      if (saleConfig.interna?.attiva) {
        room.appendChild(buildInternalBlock(saleConfig.interna.posti_totali));
      }
    }

    function getAllSeatIds() {
      let ids = [];

      if (saleConfig.interna?.attiva) {
        for (let i = 1; i <= saleConfig.interna.posti_totali; i++) ids.push(String(i));
        ids = ids.concat(INTERNAL_EXTRA);
      }

      if (saleConfig.esterna?.attiva) {
        for (let i = 1; i <= saleConfig.esterna.posti_totali; i++) ids.push(`E${i}`);
        for (let i = 1; i <= saleConfig.esterna.posti_extra; i++) ids.push(`M${i}`);
      }

      if (saleConfig.giardino?.attiva) {
        for (let i = 1; i <= saleConfig.giardino.posti_totali; i++) ids.push(`G${i}`);
        for (let i = 1; i <= saleConfig.giardino.posti_extra; i++) ids.push(`P${i}`);
      }

      return ids;
    }

    function updateAvailabilityInfo(){
      const occupiedCounts = countByType(occupiedSeats);

      const cenaTot =
        (saleConfig.interna?.attiva ? saleConfig.interna.posti_totali : 0) +
        (saleConfig.esterna?.attiva ? saleConfig.esterna.posti_totali : 0) +
        (saleConfig.giardino?.attiva ? saleConfig.giardino.posti_totali : 0);

      const dopocenaTot =
        (saleConfig.interna?.attiva ? INTERNAL_EXTRA.length : 0) +
        (saleConfig.esterna?.attiva ? saleConfig.esterna.posti_extra : 0) +
        (saleConfig.giardino?.attiva ? saleConfig.giardino.posti_extra : 0);

      const cenaOcc = occupiedCounts.tavolo;
      const dopocenaOcc = occupiedCounts.divano + occupiedCounts.muretto + occupiedCounts.poltrona;

      const cenaDisp = cenaTot - cenaOcc;
      const dopocenaDisp = dopocenaTot - dopocenaOcc;

      document.getElementById("summaryBox").innerHTML = `
        <h4>Disponibilità</h4>
        <div><strong>Posti disponibili cena:</strong> ${cenaDisp}</div>
        <div><strong>Posti occupati cena:</strong> ${cenaOcc}</div>
        <div style="margin-top:6px;"><strong>Posti disponibili dopocena:</strong> ${dopocenaDisp}</div>
        <div><strong>Posti occupati dopocena:</strong> ${dopocenaOcc}</div>
      `;
    }

    function setSalaInfoText() {
      const box = document.getElementById("salaInfoText");
      const names = [];

      if (saleConfig.interna?.attiva) names.push("all’interno");
      if (saleConfig.esterna?.attiva) names.push("all’esterno");
      if (saleConfig.giardino?.attiva) names.push("in giardino");

      if (names.length === 1) box.textContent = `La serata si svolgerà ${names[0]}.`;
      else if (names.length === 2) box.textContent = `La serata si svolgerà ${names[0]} e ${names[1]}.`;
      else if (names.length === 3) box.textContent = "La serata si svolgerà all’interno, all’esterno e in giardino.";
      else box.textContent = "";
    }

    async function loadSaleConfig() {
      const { data, error } = await supabaseClient
        .from("serata_sale")
        .select("sala_codice, attiva, posti_totali, posti_extra")
        .eq("serata_id", serataId);

      if (error) {
        console.error(error);
        return false;
      }

      saleConfig = {};
      (data || []).forEach(row => {
        saleConfig[row.sala_codice] = {
          attiva: !!row.attiva,
          posti_totali: Number(row.posti_totali || 0),
          posti_extra: Number(row.posti_extra || 0)
        };
      });

      return true;
    }

    async function loadEventAndSeats(){
      if (!serataId) {
        document.getElementById("eventDetail").innerHTML =
          `<div class="card note">Serata non trovata.</div>`;
        return;
      }

      const { data: eventData, error: eventError } = await supabaseClient
        .from("serate")
        .select("*")
        .eq("id", serataId)
        .single();

      if (eventError || !eventData) {
        console.error(eventError);
        document.getElementById("eventDetail").innerHTML =
          `<div class="card note">Errore nel caricamento della serata.</div>`;
        return;
      }

      currentEvent = eventData;
      renderEventCard(document.getElementById("eventDetail"), currentEvent);

      const salesOk = await loadSaleConfig();
      if (!salesOk) {
        document.getElementById("bookingMsg").textContent = "Errore nel caricamento sale.";
        return;
      }

      setSalaInfoText();

      if (isPastEvent(currentEvent.data)) {
        lockPastEvent();
      }

      const { data: seatRows, error: seatError } = await supabaseClient
        .from("prenotazione_posti")
        .select("posto_numero, posto_tipo")
        .eq("serata_id", serataId);

      if (seatError) {
        console.error(seatError);
        document.getElementById("bookingMsg").textContent = "Errore nel caricamento posti.";
        return;
      }

      occupiedSeats = (seatRows || []).map(r => String(r.posto_numero)).sort(seatSort);

      renderRoom();
      updateAvailabilityInfo();
      updateSelectedInfo();
      resetTransform();
    }

    async function saveBooking(){
      const nome = document.getElementById("nomeInput").value.trim();
      const telefono = document.getElementById("telefonoInput").value.trim();
      const email = document.getElementById("emailInput").value.trim();
      const allergie = document.getElementById("allergieInput").value.trim();
      const richieste = document.getElementById("richiesteInput").value.trim();
      const msg = document.getElementById("bookingMsg");

      msg.textContent = "";

      if (isPastEvent(currentEvent.data)) {
        msg.textContent = "Non puoi prenotare una serata passata.";
        return;
      }

      if (!nome) {
        msg.textContent = "Inserisci almeno il nome.";
        return;
      }

      if (!selectedSeats.length) {
        msg.textContent = "Seleziona almeno un posto.";
        return;
      }

      const overlap = selectedSeats.some(seat => occupiedSeats.includes(seat));
      if (overlap) {
        msg.textContent = "Uno dei posti selezionati non è più disponibile.";
        await loadEventAndSeats();
        selectedSeats = [];
        updateSelectedInfo();
        return;
      }

      const bookedSeats = [...selectedSeats].sort(seatSort);

      const { data: prenotazione, error: prenError } = await supabaseClient
        .from("prenotazioni")
        .insert([{
          serata_id: serataId,
          nome,
          telefono: telefono || null,
          email: email || null,
          allergie: allergie || null,
          richieste: richieste || null
        }])
        .select()
        .single();

      if (prenError || !prenotazione) {
        console.error(prenError);
        msg.textContent = "Errore nel salvataggio prenotazione.";
        return;
      }

      const postiRows = bookedSeats.map(seatId => ({
        prenotazione_id: prenotazione.id,
        serata_id: serataId,
        posto_numero: seatId,
        posto_tipo: getSeatMeta(seatId).tipo
      }));

      const { error: postiError } = await supabaseClient
        .from("prenotazione_posti")
        .insert(postiRows);

      if (postiError) {
        console.error(postiError);
        msg.textContent = "Errore nel salvataggio posti.";
        return;
      }

      msg.textContent = `Prenotazione salvata! Posti: ${bookedSeats.join(", ")}`;

      document.getElementById("nomeInput").value = "";
      document.getElementById("telefonoInput").value = "";
      document.getElementById("emailInput").value = "";
      document.getElementById("allergieInput").value = "";
      document.getElementById("richiesteInput").value = "";
      selectedSeats = [];

      await loadEventAndSeats();
    }

    document.addEventListener("DOMContentLoaded", async () => {
      setupMenu();
      await loadEventAndSeats();
      document.getElementById("bookBtn").addEventListener("click", saveBooking);
    });
  </script>
</body>
</html>
