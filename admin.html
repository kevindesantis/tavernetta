<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin – Tavernetta da Kevin</title>
  <meta name="description" content="Pannello admin per gestire le serate della Tavernetta da Kevin.">

  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="canonical" href="https://tavernettadakevin.it/admin.html">

  <meta property="og:title" content="Admin – Tavernetta da Kevin">
  <meta property="og:description" content="Pannello admin per gestire le serate della Tavernetta da Kevin.">
  <meta property="og:image" content="https://tavernettadakevin.it/img/whatsapp-preview.png">
  <meta property="og:url" content="https://tavernettadakevin.it/admin.html">
  <meta property="og:type" content="website">

  <style>
    .admin-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:20px;
    }

    .admin-form label{
      display:block;
      margin:12px 0 6px;
      font-weight:bold;
      color:var(--brown);
    }

    .admin-form input,
    .admin-form textarea{
      width:100%;
      padding:12px;
      border:1px solid rgba(107,62,38,.18);
      border-radius:10px;
      font-size:15px;
      background:#fffaf2;
    }

    .admin-form textarea{
      min-height:110px;
      resize:vertical;
    }

    .admin-list{
      display:grid;
      gap:14px;
    }

    .admin-item{
      background:var(--card);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:14px;
    }

    .admin-item h3{
      margin:0 0 8px;
      color:var(--brown);
    }

    .admin-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .small-note{
      font-size:14px;
      opacity:.8;
      margin-top:10px;
    }

    .danger{
      background:#b9382f !important;
      color:#fff !important;
      border:none !important;
    }

    .preview-box{
      margin-top:12px;
    }

    .preview-box img{
      width:100%;
      max-width:260px;
      border-radius:12px;
      display:none;
      box-shadow:var(--shadow);
    }

    @media (max-width: 900px){
      .admin-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <img src="img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="serate.html">Serate</a>
      <a href="calendario.html">Calendario</a>
      <a href="dove.html">Dove siamo</a>
      <a href="contatti.html">Contattaci</a>
      <a href="admin.html">Admin</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <h2>Admin serate</h2>

      <div class="admin-grid">
        <div class="card">
          <h3 class="event-title">Aggiungi / modifica serata</h3>

          <form id="adminEventForm" class="admin-form">
            <input type="hidden" id="eventId">
            <input type="hidden" id="locandinaCurrent">

            <label for="titolo">Titolo</label>
            <input id="titolo" type="text" placeholder="Es. Fave e Salato">

            <label for="data">Data</label>
            <input id="data" type="date">

            <label for="menu">Menù</label>
            <textarea id="menu" placeholder="Scrivi il menù della serata"></textarea>

            <label for="programma">Programma</label>
            <textarea id="programma" placeholder="Scrivi il programma della serata"></textarea>

            <label for="locandinaFile">Locandina</label>
            <input id="locandinaFile" type="file" accept="image/*">

            <div class="preview-box">
              <img id="locandinaPreview" alt="Anteprima locandina">
            </div>

            <label for="linkApple">Link Invito Apple</label>
            <input id="linkApple" type="text" placeholder="https://...">

            <label for="postiTotali">Posti totali</label>
            <input id="postiTotali" type="number" min="4" step="2" placeholder="Es. 14">

            <div class="button-row">
              <button type="submit" class="button">Salva serata</button>
              <button type="button" id="resetFormBtn" class="button secondary">Nuova serata</button>
            </div>

            <p class="small-note">
              I posti devono essere pari: 14, 16, 18, 20...
            </p>

            <p id="adminMsg" class="note"></p>
          </form>
        </div>

        <div>
          <div class="card">
            <h3 class="event-title">Serate salvate</h3>
            <div id="adminEventsList" class="admin-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin-guard.js"></script>
  <script src="js/site.js"></script>

  <script>
    const form = document.getElementById("adminEventForm");
    const adminMsg = document.getElementById("adminMsg");
    const listBox = document.getElementById("adminEventsList");
    const resetBtn = document.getElementById("resetFormBtn");
    const fileInput = document.getElementById("locandinaFile");
    const previewImg = document.getElementById("locandinaPreview");

    function showPreview(src) {
      if (!src) {
        previewImg.style.display = "none";
        previewImg.src = "";
        return;
      }
      previewImg.src = src;
      previewImg.style.display = "block";
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) {
        const current = document.getElementById("locandinaCurrent").value.trim();
        showPreview(current);
        return;
      }

      const objectUrl = URL.createObjectURL(file);
      showPreview(objectUrl);
    });

    function clearForm() {
      document.getElementById("eventId").value = "";
      document.getElementById("titolo").value = "";
      document.getElementById("data").value = "";
      document.getElementById("menu").value = "";
      document.getElementById("programma").value = "";
      document.getElementById("locandinaFile").value = "";
      document.getElementById("locandinaCurrent").value = "";
      document.getElementById("linkApple").value = "";
      document.getElementById("postiTotali").value = "";
      adminMsg.textContent = "";
      showPreview("");
    }

    function fillForm(ev) {
      document.getElementById("eventId").value = ev.id || "";
      document.getElementById("titolo").value = ev.titolo || "";
      document.getElementById("data").value = (ev.data || "").slice(0, 10);
      document.getElementById("menu").value = ev.menu || "";
      document.getElementById("programma").value = ev.programma || "";
      document.getElementById("locandinaCurrent").value = ev.locandina || "";
      document.getElementById("linkApple").value = ev.link_apple || "";
      document.getElementById("postiTotali").value = ev.posti_totali || "";
      document.getElementById("locandinaFile").value = "";
      showPreview(ev.locandina || "");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function loadAdminEvents() {
      const { data, error } = await supabaseClient
        .from("serate")
        .select("*")
        .order("data", { ascending: false });

      if (error) {
        listBox.innerHTML = `<div class="note">Errore nel caricamento serate.</div>`;
        return;
      }

      if (!data || !data.length) {
        listBox.innerHTML = `<div class="note">Nessuna serata presente.</div>`;
        return;
      }

      listBox.innerHTML = "";

      data.forEach(ev => {
        const item = document.createElement("div");
        item.className = "admin-item";

        item.innerHTML = `
          <h3>${ev.titolo || "Senza titolo"}</h3>
          <p><strong>Data:</strong> ${ev.data}</p>
          <p><strong>Posti:</strong> ${ev.posti_totali}</p>
          ${ev.locandina ? `<img src="${ev.locandina}" alt="${ev.titolo}" style="width:100%;max-width:220px;border-radius:10px;margin-top:8px;">` : ""}

          <div class="admin-actions">
            <button class="button secondary edit-btn" type="button">Modifica</button>
            <a class="button secondary" href="admin-evento.html?id=${ev.id}">Gestisci serata</a>
            <button class="button danger delete-btn" type="button">Elimina</button>
          </div>
        `;

        item.querySelector(".edit-btn").addEventListener("click", () => {
          fillForm(ev);
        });

        item.querySelector(".delete-btn").addEventListener("click", async () => {
          const conferma = confirm(`Vuoi eliminare la serata "${ev.titolo}"?`);
          if (!conferma) return;

          const { error: delError } = await supabaseClient
            .from("serate")
            .delete()
            .eq("id", ev.id);

          if (delError) {
            adminMsg.textContent = "Errore nell'eliminazione della serata.";
            return;
          }

          adminMsg.textContent = "Serata eliminata correttamente.";
          clearForm();
          loadAdminEvents();
        });

        listBox.appendChild(item);
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      adminMsg.textContent = "";

      const id = document.getElementById("eventId").value.trim();
      const titolo = document.getElementById("titolo").value.trim();
      const data = document.getElementById("data").value.trim();
      const menu = document.getElementById("menu").value.trim();
      const programma = document.getElementById("programma").value.trim();
      const linkApple = document.getElementById("linkApple").value.trim();
      const postiTotali = parseInt(document.getElementById("postiTotali").value, 10);

      const currentLocandina = document.getElementById("locandinaCurrent").value.trim();
      const selectedFile = fileInput.files[0];

      let locandinaUrl = currentLocandina;

      if (!titolo || !data || !menu || !programma || !postiTotali) {
        adminMsg.textContent = "Compila tutti i campi obbligatori.";
        return;
      }

      if (postiTotali < 4 || postiTotali % 2 !== 0) {
        adminMsg.textContent = "I posti totali devono essere pari e almeno 4.";
        return;
      }

      if (selectedFile) {
        const safeName = selectedFile.name.replace(/\s+/g, "-");
        const filePath = `serate/${Date.now()}-${safeName}`;

        const { error: uploadError } = await supabaseClient
          .storage
          .from("locandine")
          .upload(filePath, selectedFile, {
            cacheControl: "3600",
            upsert: false,
            contentType: selectedFile.type
          });

        if (uploadError) {
          console.error(uploadError);
          adminMsg.textContent = "Errore nel caricamento della locandina.";
          return;
        }

        const { data: publicData } = supabaseClient
          .storage
          .from("locandine")
          .getPublicUrl(filePath);

        locandinaUrl = publicData.publicUrl;
      }

      if (!locandinaUrl) {
        adminMsg.textContent = "Carica una locandina.";
        return;
      }

      const payload = {
        titolo,
        data,
        menu,
        programma,
        locandina: locandinaUrl,
        link_apple: linkApple,
        posti_totali: postiTotali
      };

      if (id) {
        const { error } = await supabaseClient
          .from("serate")
          .update(payload)
          .eq("id", id);

        if (error) {
          console.error(error);
          adminMsg.textContent = "Errore nella modifica della serata.";
          return;
        }

        adminMsg.textContent = "Serata modificata correttamente.";
      } else {
        const { error } = await supabaseClient
          .from("serate")
          .insert([payload]);

        if (error) {
          console.error(error);
          adminMsg.textContent = "Errore nel salvataggio della serata.";
          return;
        }

        adminMsg.textContent = "Serata aggiunta correttamente.";
      }

      clearForm();
      loadAdminEvents();
    });

    resetBtn.addEventListener("click", clearForm);

    document.addEventListener("DOMContentLoaded", () => {
      setupMenu();
      loadAdminEvents();
    });
  </script>
</body>
</html>
