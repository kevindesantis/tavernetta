<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serate – Tavernetta da Kevin</title>
  <meta name="description" content="Scopri tutte le serate della Tavernetta da Kevin e prenota il tuo posto.">

  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="canonical" href="https://tavernettadakevin.it/serate.html">

  <style>
    .serate-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .serata-card{
      background:var(--card);
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .serata-img{
      width:100%;
      aspect-ratio:4/5;
      object-fit:cover;
      background:#eee;
    }

    .serata-body{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .serata-title{
      margin:0;
      color:var(--brown);
      font-size:1.2rem;
    }

    .serata-date{
      font-weight:700;
    }

    .serata-programma{
      white-space:pre-line;
    }

    .serata-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:auto;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img src="img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="serate.html">Serate</a>
      <a href="calendario.html">Calendario</a>
      <a href="dove.html">Dove siamo</a>
      <a href="contatti.html">Contattaci</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <h2>Le nostre serate</h2>
      <p class="note">Scopri le prossime serate e prenota il tuo posto.</p>

      <div id="serateGrid" class="serate-grid"></div>
      <p id="msg" class="note"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/track-visit.js"></script>
  <script src="js/site.js"></script>

  <script>
    const serateGrid = document.getElementById("serateGrid");
    const msg = document.getElementById("msg");

    function formatDateItalian(dateStr){
      try {
        return new Date(dateStr).toLocaleDateString("it-IT", {
          weekday: "long",
          day: "2-digit",
          month: "long",
          year: "numeric"
        });
      } catch {
        return dateStr;
      }
    }

    async function shareEvent(ev){
      const url = `${window.location.origin}/evento.html?id=${ev.id}`;
      const descrizione = (ev.programma || "").trim();

      const text = `${ev.titolo}
${formatDateItalian(ev.data)}

${descrizione ? descrizione + "\n\n" : ""}Prenota qui:
${url}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: ev.titolo,
            text,
            url
          });
          return;
        } catch (err) {
          if (err && err.name === "AbortError") return;
        }
      }

      try {
        await navigator.clipboard.writeText(text);
        alert("Link della serata copiato negli appunti.");
      } catch {
        prompt("Copia questo link:", url);
      }
    }

    function createSerataCard(ev){
      const card = document.createElement("article");
      card.className = "serata-card";

      const imgSrc = ev.locandina || "img/logo.png";
      const shortProgramma = ev.programma || "Serata alla Tavernetta.";

      card.innerHTML = `
        <img class="serata-img" src="${imgSrc}" alt="${ev.titolo}">
        <div class="serata-body">
          <h3 class="serata-title">${ev.titolo}</h3>
          <div class="serata-date">${formatDateItalian(ev.data)}</div>
          <div class="serata-programma">${shortProgramma}</div>

          <div class="serata-actions">
            <a class="button secondary" href="evento.html?id=${ev.id}">Apri serata</a>
            <button class="button share-btn" type="button">Condividi</button>
          </div>
        </div>
      `;

      card.querySelector(".share-btn").addEventListener("click", () => shareEvent(ev));

      return card;
    }

    async function loadSerate(){
      msg.textContent = "";
      serateGrid.innerHTML = "";

      const today = new Date().toISOString().slice(0, 10);

      const { data, error } = await supabaseClient
        .from("serate")
        .select("*")
        .gte("data", today)
        .order("data", { ascending: true });

      if (error) {
        console.error(error);
        msg.textContent = "Errore nel caricamento delle serate.";
        return;
      }

      if (!data || !data.length) {
        msg.textContent = "Nessuna serata disponibile al momento.";
        return;
      }

      data.forEach(ev => {
        serateGrid.appendChild(createSerataCard(ev));
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      setupMenu();
      await loadSerate();
    });
  </script>
</body>
</html>
