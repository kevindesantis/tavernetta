<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Serata – Tavernetta</title>

<link rel="icon" type="image/png" href="img/logo.png">
<link rel="stylesheet" href="css/style.css">

<style>

.room-layout{
display:flex;
flex-direction:column;
gap:40px;
align-items:center;
margin-top:20px;
}

.seat{
width:42px;
height:42px;
border-radius:50%;
border:none;
font-weight:bold;
cursor:pointer;
color:white;
}

.free{background:#2e9d50}
.taken{background:#c43b2f}
.selected{background:#d4a017;color:black}

.seat-row{
display:flex;
gap:10px;
}

.rect-table{
height:80px;
background:#7b4e24;
border-radius:20px;
margin:10px 0;
}

.simple-table-wrap{
display:flex;
flex-direction:column;
align-items:center;
}

.right-col{
display:flex;
flex-direction:column;
gap:10px;
}

.top-divans{
display:flex;
gap:10px;
margin-bottom:10px;
}

.bottom-divans{
display:flex;
gap:10px;
margin-top:10px;
}

.external-extra{
display:flex;
gap:10px;
margin-bottom:10px;
}

.garden-benches{
display:flex;
gap:10px;
margin-bottom:10px;
}

.pren-list{
margin-top:40px;
display:grid;
gap:10px;
}

.pren-item{
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:var(--shadow);
}

</style>

</head>

<body>

<div class="top-bar">
<img src="img/logo.png" class="logo-top">
</div>

<main class="page">

<h2>Gestione serata</h2>

<div id="roomLayout" class="room-layout"></div>

<div class="pren-list" id="prenList"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>

<script>

const params=new URLSearchParams(location.search)
const serataId=params.get("id")

let sale={}
let occupati=[]
let selezionati=[]

function seatButton(id){

const btn=document.createElement("button")

btn.textContent=id
btn.className="seat"

if(occupati.includes(id)){
btn.classList.add("taken")
}else{
btn.classList.add("free")

btn.onclick=()=>{
if(selezionati.includes(id)){
selezionati=selezionati.filter(x=>x!==id)
btn.classList.remove("selected")
btn.classList.add("free")
}else{
selezionati.push(id)
btn.classList.remove("free")
btn.classList.add("selected")
}
}
}

return btn
}

function tavolo(posti,prefix=""){

const wrap=document.createElement("div")
wrap.className="simple-table-wrap"

const lato=(posti-2)/2

const top=document.createElement("div")
top.className="seat-row"

for(let i=0;i<lato;i++){
top.appendChild(seatButton(prefix+(2+i)))
}

const center=document.createElement("div")
center.className="rect-table"

const bottom=document.createElement("div")
bottom.className="seat-row"

for(let i=0;i<lato;i++){
bottom.appendChild(seatButton(prefix+(2+lato+i)))
}

const sides=document.createElement("div")
sides.style.display="flex"
sides.style.gap="20px"

sides.appendChild(seatButton(prefix+"1"))
sides.appendChild(seatButton(prefix+posti))

wrap.appendChild(top)
wrap.appendChild(center)
wrap.appendChild(bottom)
wrap.appendChild(sides)

return wrap
}

function salaInterna(posti){

const block=document.createElement("div")

const top=document.createElement("div")
top.className="top-divans"

;["D1","D2","D3","D4","D5"].forEach(x=>top.appendChild(seatButton(x)))

const table=tavolo(posti)

const right=document.createElement("div")
right.className="right-col"

;["D6","D7","S1"].forEach(x=>right.appendChild(seatButton(x)))

const bottom=document.createElement("div")
bottom.className="bottom-divans"

;["D8","S2"].forEach(x=>bottom.appendChild(seatButton(x)))

block.appendChild(top)
block.appendChild(table)
block.appendChild(right)
block.appendChild(bottom)

return block
}

function salaEsterna(posti){

const block=document.createElement("div")

const extra=document.createElement("div")
extra.className="external-extra"

for(let i=1;i<=10;i++){
extra.appendChild(seatButton("M"+i))
}

block.appendChild(extra)
block.appendChild(tavolo(posti,"E"))

return block
}

function salaGiardino(){

const block=document.createElement("div")

const benches=document.createElement("div")
benches.className="garden-benches"

for(let i=1;i<=10;i++){
benches.appendChild(seatButton("P"+i))
}

block.appendChild(benches)

const table=document.createElement("div")

table.appendChild(seatButton("G1"))
table.appendChild(seatButton("G2"))
table.appendChild(seatButton("G3"))
table.appendChild(seatButton("G4"))
table.appendChild(seatButton("G5"))
table.appendChild(seatButton("G6"))

block.appendChild(table)

return block
}

async function carica(){

const saleRes=await supabaseClient
.from("serata_sale")
.select("*")
.eq("serata_id",serataId)

saleRes.data.forEach(s=>{
sale[s.sala_codice]=s
})

const postiRes=await supabaseClient
.from("prenotazione_posti")
.select("posto_numero")
.eq("serata_id",serataId)

occupati=postiRes.data.map(x=>x.posto_numero)

const room=document.getElementById("roomLayout")

room.innerHTML=""

if(sale.giardino?.attiva){
room.appendChild(salaGiardino())
}

if(sale.esterna?.attiva){
room.appendChild(salaEsterna(sale.esterna.posti_totali))
}

if(sale.interna?.attiva){
room.appendChild(salaInterna(sale.interna.posti_totali))
}

}

carica()

</script>

</body>
</html><!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Tavernetta da Kevin</title>

  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .admin-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .admin-form label{
      display:block;
      margin-top:12px;
      font-weight:bold;
      color:var(--brown);
    }

    .admin-form input,
    .admin-form textarea{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-top:6px;
      font-family:inherit;
      background:#fff;
    }

    .admin-form textarea{
      min-height:100px;
      resize:vertical;
    }

    .sala-box{
      border:1px solid #ddd;
      border-radius:12px;
      padding:12px;
      margin-top:10px;
      background:#fffaf2;
    }

    .sala-box h4{
      margin:0 0 6px 0;
      color:var(--brown);
    }

    .sala-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:6px;
      flex-wrap:wrap;
    }

    .sala-row input[type="checkbox"]{
      width:auto;
      margin:0;
    }

    .sala-row input[type="number"]{
      max-width:140px;
    }

    .admin-list{
      display:grid;
      gap:12px;
    }

    .admin-item{
      background:#fff;
      border-radius:12px;
      padding:12px;
      box-shadow:0 2px 6px rgba(0,0,0,.1);
    }

    .admin-item h4{
      margin:0 0 6px 0;
      color:var(--brown);
    }

    .admin-actions{
      margin-top:8px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .danger{
      background:#b9382f !important;
      color:#fff !important;
      border:none !important;
    }

    .thumb{
      width:100%;
      max-width:220px;
      border-radius:10px;
      margin-top:8px;
      box-shadow:var(--shadow);
    }

    @media (max-width: 900px){
      .admin-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img src="img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="serate.html">Serate</a>
      <a href="calendario.html">Calendario</a>
      <a href="dove.html">Dove siamo</a>
      <a href="contatti.html">Contattaci</a>
      <a href="admin.html">Admin</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <h2>Admin serate</h2>

      <div class="admin-grid">
        <div class="card">
          <h3 class="event-title">Aggiungi / modifica serata</h3>

          <form id="formSerata" class="admin-form">
            <input type="hidden" id="serataId">

            <label for="titolo">Titolo</label>
            <input id="titolo" required>

            <label for="data">Data</label>
            <input id="data" type="date" required>

            <label for="menu">Menù</label>
            <textarea id="menu"></textarea>

            <label for="programma">Programma</label>
            <textarea id="programma"></textarea>

            <label for="locandina">Locandina URL</label>
            <input id="locandina">

            <label for="linkApple">Link Apple</label>
            <input id="linkApple">

            <hr style="margin:16px 0;">

            <h3 class="event-title">Sale attive</h3>

            <div class="sala-box">
              <h4>Sala interna</h4>
              <div class="sala-row">
                <input type="checkbox" id="internaAttiva">
                <label for="internaAttiva">Attiva</label>
              </div>
              <div class="sala-row">
                <label for="internaPosti">Posti tavolo</label>
                <input id="internaPosti" type="number" min="4" step="2">
              </div>
            </div>

            <div class="sala-box">
              <h4>Sala esterna</h4>
              <div class="sala-row">
                <input type="checkbox" id="esternaAttiva">
                <label for="esternaAttiva">Attiva</label>
              </div>
              <div class="sala-row">
                <label for="esternaPosti">Posti tavolo</label>
                <input id="esternaPosti" type="number" min="4" step="2">
              </div>
            </div>

            <div class="sala-box">
              <h4>Sala giardino</h4>
              <div class="sala-row">
                <input type="checkbox" id="giardinoAttiva">
                <label for="giardinoAttiva">Attiva</label>
              </div>
              <div class="sala-row">
                <label for="giardinoPosti">Posti tavolo</label>
                <input id="giardinoPosti" type="number" min="6" step="2" value="6">
              </div>
            </div>

            <div class="button-row" style="margin-top:14px;">
              <button type="submit" class="button">Salva serata</button>
              <button type="button" id="resetBtn" class="button secondary">Nuova serata</button>
            </div>

            <p id="msg" class="note"></p>
          </form>
        </div>

        <div class="card">
          <h3 class="event-title">Serate salvate</h3>
          <div id="listaSerate" class="admin-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin-guard.js"></script>
  <script src="js/site.js"></script>

  <script>
    const form = document.getElementById("formSerata");
    const msg = document.getElementById("msg");

    function clearForm(){
      document.getElementById("serataId").value = "";
      document.getElementById("titolo").value = "";
      document.getElementById("data").value = "";
      document.getElementById("menu").value = "";
      document.getElementById("programma").value = "";
      document.getElementById("locandina").value = "";
      document.getElementById("linkApple").value = "";

      document.getElementById("internaAttiva").checked = false;
      document.getElementById("internaPosti").value = "";

      document.getElementById("esternaAttiva").checked = false;
      document.getElementById("esternaPosti").value = "";

      document.getElementById("giardinoAttiva").checked = false;
      document.getElementById("giardinoPosti").value = "6";

      msg.textContent = "";
    }

    async function loadSerataSale(serataId){
      const { data, error } = await supabaseClient
        .from("serata_sale")
        .select("*")
        .eq("serata_id", serataId);

      if (error) {
        console.error(error);
        return [];
      }

      return data || [];
    }

    async function fillForm(ev){
      clearForm();

      document.getElementById("serataId").value = ev.id || "";
      document.getElementById("titolo").value = ev.titolo || "";
      document.getElementById("data").value = (ev.data || "").slice(0, 10);
      document.getElementById("menu").value = ev.menu || "";
      document.getElementById("programma").value = ev.programma || "";
      document.getElementById("locandina").value = ev.locandina || "";
      document.getElementById("linkApple").value = ev.link_apple || "";

      const sale = await loadSerataSale(ev.id);

      sale.forEach(s => {
        if (s.sala_codice === "interna") {
          document.getElementById("internaAttiva").checked = !!s.attiva;
          document.getElementById("internaPosti").value = s.posti_totali || "";
        }

        if (s.sala_codice === "esterna") {
          document.getElementById("esternaAttiva").checked = !!s.attiva;
          document.getElementById("esternaPosti").value = s.posti_totali || "";
        }

        if (s.sala_codice === "giardino") {
          document.getElementById("giardinoAttiva").checked = !!s.attiva;
          document.getElementById("giardinoPosti").value = s.posti_totali || 6;
        }
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function caricaSerate(){
      const { data, error } = await supabaseClient
        .from("serate")
        .select("*")
        .order("data", { ascending: false });

      const box = document.getElementById("listaSerate");
      box.innerHTML = "";

      if (error) {
        console.error(error);
        box.innerHTML = `<div class="note">Errore caricamento serate.</div>`;
        return;
      }

      if (!data || !data.length) {
        box.innerHTML = `<div class="note">Nessuna serata presente.</div>`;
        return;
      }

      for (const ev of data) {
        const sale = await loadSerataSale(ev.id);

        const saleText = sale
          .filter(s => s.attiva)
          .map(s => `${s.sala_codice} (${s.posti_totali})`)
          .join(", ") || "-";

        const div = document.createElement("div");
        div.className = "admin-item";

        div.innerHTML = `
          <h4>${ev.titolo || ""}</h4>
          <p><strong>Data:</strong> ${ev.data || ""}</p>
          <p><strong>Sale:</strong> ${saleText}</p>
          ${ev.locandina ? `<img class="thumb" src="${ev.locandina}" alt="${ev.titolo}">` : ""}

          <div class="admin-actions">
            <button class="button secondary edit-btn" type="button">Modifica</button>
            <a class="button secondary" href="admin-evento.html?id=${ev.id}">Gestisci serata</a>
            <button class="button danger delete-btn" type="button">Elimina</button>
          </div>
        `;

        div.querySelector(".edit-btn").addEventListener("click", async () => {
          await fillForm(ev);
        });

        div.querySelector(".delete-btn").addEventListener("click", async () => {
          const ok = confirm(`Eliminare la serata "${ev.titolo}"?`);
          if (!ok) return;

          const { error: delError } = await supabaseClient
            .from("serate")
            .delete()
            .eq("id", ev.id);

          if (delError) {
            console.error(delError);
            msg.textContent = "Errore eliminazione serata.";
            return;
          }

          msg.textContent = "Serata eliminata.";
          clearForm();
          await caricaSerate();
        });

        box.appendChild(div);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      const serataId = document.getElementById("serataId").value.trim();
      const titolo = document.getElementById("titolo").value.trim();
      const data = document.getElementById("data").value.trim();
      const menu = document.getElementById("menu").value.trim();
      const programma = document.getElementById("programma").value.trim();
      const locandina = document.getElementById("locandina").value.trim();
      const linkApple = document.getElementById("linkApple").value.trim();

      const internaAttiva = document.getElementById("internaAttiva").checked;
      const esternaAttiva = document.getElementById("esternaAttiva").checked;
      const giardinoAttiva = document.getElementById("giardinoAttiva").checked;

      const internaPosti = parseInt(document.getElementById("internaPosti").value || "0", 10);
      const esternaPosti = parseInt(document.getElementById("esternaPosti").value || "0", 10);
      const giardinoPosti = parseInt(document.getElementById("giardinoPosti").value || "6", 10);

      if (!titolo || !data) {
        msg.textContent = "Inserisci almeno titolo e data.";
        return;
      }

      if (!internaAttiva && !esternaAttiva && !giardinoAttiva) {
        msg.textContent = "Attiva almeno una sala.";
        return;
      }

      if (internaAttiva && (internaPosti < 4 || internaPosti % 2 !== 0)) {
        msg.textContent = "I posti tavolo della sala interna devono essere pari e almeno 4.";
        return;
      }

      if (esternaAttiva && (esternaPosti < 4 || esternaPosti % 2 !== 0)) {
        msg.textContent = "I posti tavolo della sala esterna devono essere pari e almeno 4.";
        return;
      }

      if (giardinoAttiva && giardinoPosti !== 6) {
        msg.textContent = "Il tavolo giardino è fisso a 6 posti.";
        return;
      }

      const payload = {
        titolo,
        data,
        menu,
        programma,
        locandina,
        link_apple: linkApple
      };

      let savedId = serataId;

      if (serataId) {
        const { error } = await supabaseClient
          .from("serate")
          .update(payload)
          .eq("id", serataId);

        if (error) {
          console.error(error);
          msg.textContent = "Errore modifica serata.";
          return;
        }
      } else {
        const { data: inserted, error } = await supabaseClient
          .from("serate")
          .insert([payload])
          .select()
          .single();

        if (error || !inserted) {
          console.error(error);
          msg.textContent = "Errore salvataggio serata.";
          return;
        }

        savedId = inserted.id;
      }

      await supabaseClient
        .from("serata_sale")
        .delete()
        .eq("serata_id", savedId);

      const saleRows = [];

      if (internaAttiva) {
        saleRows.push({
          serata_id: savedId,
          sala_codice: "interna",
          attiva: true,
          posti_totali: internaPosti
        });
      }

      if (esternaAttiva) {
        saleRows.push({
          serata_id: savedId,
          sala_codice: "esterna",
          attiva: true,
          posti_totali: esternaPosti
        });
      }

      if (giardinoAttiva) {
        saleRows.push({
          serata_id: savedId,
          sala_codice: "giardino",
          attiva: true,
          posti_totali: 6
        });
      }

      const { error: saleError } = await supabaseClient
        .from("serata_sale")
        .insert(saleRows);

      if (saleError) {
        console.error(saleError);
        msg.textContent = "Serata salvata, ma errore nel salvataggio sale.";
        return;
      }

      msg.textContent = serataId ? "Serata modificata." : "Serata salvata.";
      clearForm();
      await caricaSerate();
    });

    document.getElementById("resetBtn").addEventListener("click", clearForm);

    document.addEventListener("DOMContentLoaded", async () => {
      setupMenu();
      await caricaSerate();
    });
  </script>
</body>
</html>
