<!DOCTYPE html>
<html lang="it">
<head>
  <meta property="og:title" content="Tavernetta da Kevin">
<meta property="og:description" content="Scopri la prossima serata e prenota il tuo posto alla Tavernetta da Kevin.">
<meta property="og:image" content="https://www.tavernettadakevin.it/img/whatsapp-preview.png">
<meta property="og:url" content="https://www.tavernettadakevin.it/">
<meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="img/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Evento - Tavernetta da Kevin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .booking-wrap{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:20px;
    }

    .seat-legend{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin:10px 0 18px;
      font-size:14px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .legend-dot{
      width:16px;
      height:16px;
      border-radius:50%;
      display:inline-block;
    }

    .dot-free{ background:#2e9d50; }
    .dot-taken{ background:#c43b2f; }
    .dot-selected{ background:#d4a017; }

    .table-layout{
      background:var(--card);
      border-radius:16px;
      padding:24px 16px;
      box-shadow:var(--shadow);
      overflow:auto;
    }

    .table-grid{
      min-width:640px;
      display:grid;
      grid-template-columns:64px 1fr 64px;
      grid-template-rows:auto 120px auto;
      gap:16px;
      align-items:center;
    }

    .side-seat-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .top-seats,
    .bottom-seats{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:nowrap;
    }

    .rect-table{
      background:#8b5a2b;
      border-radius:18px;
      height:120px;
      box-shadow:inset 0 0 0 4px rgba(255,255,255,.15);
    }

    .seat{
      width:42px;
      height:42px;
      border-radius:50%;
      border:0;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .seat.free{ background:#2e9d50; }
    .seat.taken{ background:#c43b2f; cursor:not-allowed; }
    .seat.selected{ background:#d4a017; }

    .form-box input{
      width:100%;
      padding:12px;
      margin:0 0 12px;
      border-radius:10px;
      border:1px solid #d6b98a;
      font-size:16px;
    }

    .selected-box{
      margin:12px 0;
      font-size:15px;
    }

    .pren-list{
      display:grid;
      gap:12px;
      margin-top:20px;
    }

    .pren-item{
      background:var(--card);
      border-radius:12px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .pren-item h4{
      margin:0 0 8px;
      color:var(--brown);
    }

    .danger{
      background:#b9382f !important;
      color:#fff !important;
      border:none !important;
    }

    @media (max-width: 900px){
      .booking-wrap{
        grid-template-columns:1fr;
      }

      .table-grid{
        min-width:560px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <img src="img/logo.png" alt="Tavernetta da Kevin" class="logo-top">
    <button id="hamburger" class="hamburger" aria-label="Apri menu">☰</button>
  </div>

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar">
    <img src="img/logo.png" alt="Logo" class="side-logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="serate.html">Serate</a>
      <a href="calendario.html">Calendario</a>
      <a href="dove.html">Dove siamo</a>
      <a href="contatti.html">Contattaci</a>
      <a href="admin.html">Admin</a>
    </nav>
  </aside>

  <main class="page">
    <section class="section">
      <h2>Admin serata</h2>
      <div id="eventDetail"></div>
    </section>

    <section class="section">
      <h2>Prenota posti da admin</h2>

      <div class="seat-legend">
        <div class="legend-item"><span class="legend-dot dot-free"></span> Disponibile</div>
        <div class="legend-item"><span class="legend-dot dot-selected"></span> Selezionato</div>
        <div class="legend-item"><span class="legend-dot dot-taken"></span> Occupato</div>
      </div>

      <div class="booking-wrap">
        <div class="table-layout">
          <div id="tableGrid" class="table-grid"></div>
        </div>

        <div class="card form-box">
          <h3 class="event-title">Nuova prenotazione admin</h3>
          <input id="nomeInput" type="text" placeholder="Nome e cognome">
          <input id="telefonoInput" type="text" placeholder="Telefono">
          <div class="selected-box">
            <strong>Posti selezionati:</strong>
            <span id="selectedSeatsText">nessuno</span>
          </div>
          <div class="selected-box">
            <strong>Totale posti:</strong>
            <span id="selectedCountText">0</span>
          </div>
          <button id="bookBtn" class="button">Salva prenotazione</button>
          <p id="bookingMsg" class="note"></p>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Prenotazioni serata</h2>
      <div id="prenotazioniList" class="pren-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin-guard.js"></script>
  <script src="js/site.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const serataId = params.get("id");

    let currentEvent = null;
    let occupiedSeats = [];
    let selectedSeats = [];

    function getSeatStructure(totalSeats){
      if (totalSeats % 2 !== 0 || totalSeats < 4) {
        throw new Error("I posti totali devono essere pari e almeno 4.");
      }
      const longSide = (totalSeats - 2) / 2;
      return { left: 1, right: 1, top: longSide, bottom: longSide };
    }

    function createSeatButton(num, isTaken){
      const btn = document.createElement("button");
      btn.className = "seat " + (isTaken ? "taken" : "free");
      btn.textContent = num;

      if (!isTaken) {
        btn.addEventListener("click", () => {
          if (selectedSeats.includes(num)) {
            selectedSeats = selectedSeats.filter(x => x !== num);
            btn.classList.remove("selected");
            btn.classList.add("free");
          } else {
            selectedSeats.push(num);
            selectedSeats.sort((a,b)=>a-b);
            btn.classList.remove("free");
            btn.classList.add("selected");
          }
          updateSelectedInfo();
        });
      }

      return btn;
    }

    function updateSelectedInfo(){
      document.getElementById("selectedSeatsText").textContent =
        selectedSeats.length ? selectedSeats.join(", ") : "nessuno";
      document.getElementById("selectedCountText").textContent = selectedSeats.length;
    }

    function renderTable(totalSeats){
      const grid = document.getElementById("tableGrid");
      grid.innerHTML = "";

      const s = getSeatStructure(totalSeats);

      const top = document.createElement("div");
      top.className = "top-seats";
      top.style.gridColumn = "2";
      top.style.gridRow = "1";

      const left = document.createElement("div");
      left.className = "side-seat-wrap";
      left.style.gridColumn = "1";
      left.style.gridRow = "2";

      const center = document.createElement("div");
      center.className = "rect-table";
      center.style.gridColumn = "2";
      center.style.gridRow = "2";

      const right = document.createElement("div");
      right.className = "side-seat-wrap";
      right.style.gridColumn = "3";
      right.style.gridRow = "2";

      const bottom = document.createElement("div");
      bottom.className = "bottom-seats";
      bottom.style.gridColumn = "2";
      bottom.style.gridRow = "3";

      let seatNum = 1;

      left.appendChild(createSeatButton(seatNum, occupiedSeats.includes(seatNum)));
      seatNum++;

      for (let i = 0; i < s.top; i++) {
        top.appendChild(createSeatButton(seatNum, occupiedSeats.includes(seatNum)));
        seatNum++;
      }

      for (let i = 0; i < s.bottom; i++) {
        bottom.appendChild(createSeatButton(seatNum, occupiedSeats.includes(seatNum)));
        seatNum++;
      }

      right.appendChild(createSeatButton(seatNum, occupiedSeats.includes(seatNum)));

      grid.appendChild(top);
      grid.appendChild(left);
      grid.appendChild(center);
      grid.appendChild(right);
      grid.appendChild(bottom);
    }

    async function loadPrenotazioniList(){
      const box = document.getElementById("prenotazioniList");

      const { data, error } = await supabaseClient
        .from("prenotazioni")
        .select(`
          id,
          nome,
          telefono,
          creato_il,
          prenotazione_posti (
            posto_numero
          )
        `)
        .eq("serata_id", serataId)
        .order("creato_il", { ascending: false });

      if (error) {
        box.innerHTML = `<div class="note">Errore nel caricamento prenotazioni.</div>`;
        return;
      }

      if (!data || !data.length) {
        box.innerHTML = `<div class="card note">Nessuna prenotazione presente.</div>`;
        return;
      }

      box.innerHTML = "";

      data.forEach(pr => {
        const posti = (pr.prenotazione_posti || [])
          .map(p => p.posto_numero)
          .sort((a,b)=>a-b);

        const item = document.createElement("div");
        item.className = "pren-item";

        item.innerHTML = `
          <h4>${pr.nome}</h4>
          <p><strong>Telefono:</strong> ${pr.telefono || "-"}</p>
          <p><strong>Posti:</strong> ${posti.join(", ")}</p>
          <div class="button-row">
            <button class="button danger delete-pren-btn">Elimina prenotazione</button>
          </div>
        `;

        item.querySelector(".delete-pren-btn").addEventListener("click", async () => {
          const conferma = confirm(`Eliminare la prenotazione di ${pr.nome}?`);
          if (!conferma) return;

          const { error: delError } = await supabaseClient
            .from("prenotazioni")
            .delete()
            .eq("id", pr.id);

          if (delError) {
            document.getElementById("bookingMsg").textContent = "Errore nell'eliminazione della prenotazione.";
            return;
          }

          document.getElementById("bookingMsg").textContent = "Prenotazione eliminata.";
          await loadEventAndSeats();
          await loadPrenotazioniList();
        });

        box.appendChild(item);
      });
    }

    async function loadEventAndSeats(){
      if (!serataId) {
        document.getElementById("eventDetail").innerHTML = `<div class="card note">Serata non trovata.</div>`;
        return;
      }

      const { data: eventData, error: eventError } = await supabaseClient
        .from("serate")
        .select("*")
        .eq("id", serataId)
        .single();

      if (eventError || !eventData) {
        document.getElementById("eventDetail").innerHTML = `<div class="card note">Errore nel caricamento della serata.</div>`;
        return;
      }

      currentEvent = eventData;
      renderEventCard(document.getElementById("eventDetail"), currentEvent);

      const { data: seatRows, error: seatError } = await supabaseClient
        .from("prenotazione_posti")
        .select("posto_numero")
        .eq("serata_id", serataId);

      if (seatError) {
        document.getElementById("bookingMsg").textContent = "Errore nel caricamento posti.";
        return;
      }

      occupiedSeats = seatRows.map(r => r.posto_numero).sort((a,b)=>a-b);
      renderTable(currentEvent.posti_totali);
      updateSelectedInfo();
    }

    async function saveBooking(){
      const nome = document.getElementById("nomeInput").value.trim();
      const telefono = document.getElementById("telefonoInput").value.trim();
      const msg = document.getElementById("bookingMsg");

      msg.textContent = "";

      if (!nome || !telefono) {
        msg.textContent = "Inserisci nome e telefono.";
        return;
      }

      if (!selectedSeats.length) {
        msg.textContent = "Seleziona almeno un posto.";
        return;
      }

      const overlap = selectedSeats.some(seat => occupiedSeats.includes(seat));
      if (overlap) {
        msg.textContent = "Uno dei posti selezionati non è più disponibile.";
        await loadEventAndSeats();
        selectedSeats = [];
        updateSelectedInfo();
        return;
      }

      const { data: prenotazione, error: prenError } = await supabaseClient
        .from("prenotazioni")
        .insert([{
          serata_id: serataId,
          nome,
          telefono
        }])
        .select()
        .single();

      if (prenError || !prenotazione) {
        msg.textContent = "Errore nel salvataggio prenotazione.";
        return;
      }

      const postiRows = selectedSeats.map(n => ({
        prenotazione_id: prenotazione.id,
        serata_id: serataId,
        posto_numero: n
      }));

      const { error: postiError } = await supabaseClient
        .from("prenotazione_posti")
        .insert(postiRows);

      if (postiError) {
        msg.textContent = "Errore nel salvataggio posti.";
        return;
      }

      msg.textContent = "Prenotazione admin salvata con successo.";
      document.getElementById("nomeInput").value = "";
      document.getElementById("telefonoInput").value = "";
      selectedSeats = [];
      await loadEventAndSeats();
      await loadPrenotazioniList();
    }

    document.addEventListener("DOMContentLoaded", async () => {
      setupMenu();
      await loadEventAndSeats();
      await loadPrenotazioniList();
      document.getElementById("bookBtn").addEventListener("click", saveBooking);
    });
  </script>
</body>

</html>
