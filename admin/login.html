<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Tavernetta da Kevin</title>

  <link rel="icon" type="image/png" href="../img/logoapp.png">
  <link rel="apple-touch-icon" href="../img/logoapp.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Admin Tavernetta">
  <meta name="theme-color" content="#6b3e26">

  <style>
    :root{
      --bg:#f7e9d2;
      --card:#fffaf2;
      --brown:#6b3e26;
      --text:#2f241c;
      --shadow:0 8px 28px rgba(0,0,0,.12);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-card{
      width:min(100%, 380px);
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 22px;
      text-align:center;
    }

    .logo{
      width:92px;
      height:92px;
      object-fit:contain;
      display:block;
      margin:0 auto 16px;
      border-radius:20px;
    }

    h1{
      margin:0;
      color:var(--brown);
      font-size:28px;
    }

    .subtitle{
      margin:8px 0 22px;
      font-size:14px;
      opacity:.8;
    }

    .field{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(107,62,38,.18);
      font-size:16px;
      background:#fff;
      outline:none;
      margin-top:10px;
    }

    .field:focus{
      border-color:var(--brown);
      box-shadow:0 0 0 3px rgba(107,62,38,.12);
    }

    .button{
      width:100%;
      margin-top:14px;
      padding:14px;
      border:none;
      border-radius:12px;
      background:var(--brown);
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .secondary-link{
      display:inline-block;
      margin-top:16px;
      color:var(--brown);
      text-decoration:none;
      font-size:14px;
    }

    .msg{
      min-height:20px;
      margin-top:12px;
      font-size:14px;
      color:#b9382f;
    }

    .hint{
      margin-top:10px;
      font-size:13px;
      opacity:.75;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <img src="../img/logoapp.png" alt="Admin Tavernetta" class="logo">

    <h1>Admin Tavernetta</h1>
    <p class="subtitle">Accesso privato gestione serate</p>

    <form id="loginForm" autocomplete="on">
      <input
        id="username"
        class="field"
        type="text"
        value="Kevin"
        autocomplete="username"
        autocapitalize="none"
        spellcheck="false"
      >

      <input
        id="pwd"
        class="field"
        type="password"
        placeholder="Inserisci la password"
        autocomplete="current-password"
      >

      <button class="button" type="submit">Accedi</button>
    </form>

    <div id="loginMsg" class="msg"></div>
    <p class="hint">Su iPhone, dopo il primo accesso puoi salvare la password e sbloccarla con Face ID.</p>

    <a class="secondary-link" href="../index.html">Torna al sito</a>
  </main>

  <script>
    const USERNAME = "Kevin";
    const PASSWORD = "Kevdsant3121131";

    function doLogin() {
      const username = document.getElementById("username").value.trim();
      const input = document.getElementById("pwd").value.trim();
      const msg = document.getElementById("loginMsg");

      msg.textContent = "";

      if (!username || !input) {
        msg.textContent = "Inserisci nome utente e password.";
        return;
      }

      if (username === USERNAME && input === PASSWORD) {
        localStorage.setItem("admin_auth", "ok");
        localStorage.setItem("admin_user", username);
        window.location.href = "../admin.html";
      } else {
        msg.textContent = "Credenziali errate.";
      }
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      doLogin();
    });
  </script>
</body>
</html>
